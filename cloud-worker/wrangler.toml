name = "9-cloud-standin"
main = "src/worker.js"
compatibility_date = "2024-09-01"

[vars]
CHAT_ID = "8784022142"

# KV namespace for state sync
[[kv_namespaces]]
binding = "STATE"
id = "beaed39708284704b322b20b5190e22d"

# Cron trigger — checks Mac heartbeat every 2 min
# If Mac is down, sets Telegram webhook so cloud receives messages directly
[triggers]
crons = ["*/2 * * * *"]
