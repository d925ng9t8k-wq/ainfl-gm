<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jude Bowl - Bengals Football</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  position:fixed;
  top:0;left:0;
  touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  background:#111;
  font-family:'Arial Black',Impact,sans-serif;
}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.ctrl{pointer-events:auto}
#hud{
  position:absolute;top:0;left:0;right:0;
  height:48px;
  background:linear-gradient(180deg,rgba(0,0,0,0.9),rgba(0,0,0,0.6));
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  border-bottom:2px solid #FB4F14;
  pointer-events:none;
}
#hud *{color:#fff;font-size:14px;font-weight:900;letter-spacing:1px}
#hud .score{font-size:20px;color:#FB4F14;text-shadow:1px 1px 0 #000}
#hud .info{text-align:right;font-size:11px;line-height:1.4}

/* D-Pad */
#dpad{
  position:absolute;bottom:30px;left:20px;
  width:140px;height:140px;
  pointer-events:auto;
}
.dpad-btn{
  position:absolute;
  width:46px;height:46px;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.4);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:rgba(255,255,255,0.8);
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
}
.dpad-btn.active{background:rgba(251,79,20,0.5);border-color:#FB4F14}
#dUp{left:47px;top:0}
#dDown{left:47px;bottom:0}
#dLeft{left:0;top:47px}
#dRight{right:0;top:47px}
#dCenter{left:47px;top:47px;background:rgba(251,79,20,0.1);border-color:rgba(251,79,20,0.3);font-size:10px;font-weight:900}

/* Action buttons */
#actions{
  position:absolute;bottom:30px;right:20px;
  display:flex;flex-direction:column;gap:12px;
  pointer-events:auto;
}
.action-btn{
  width:72px;height:72px;
  border-radius:50%;
  border:3px solid;
  font-weight:900;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  pointer-events:auto;
  color:#fff;
  text-shadow:1px 1px 0 #000;
}
#btnA{background:rgba(251,79,20,0.3);border-color:#FB4F14}
#btnB{background:rgba(0,150,255,0.3);border-color:#0af}
#btnA.active{background:rgba(251,79,20,0.7)}
#btnB.active{background:rgba(0,150,255,0.7)}

/* Play select overlay */
#playSelect{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;z-index:20;
}
#playSelect h2{color:#FB4F14;font-size:28px;margin-bottom:6px;text-shadow:2px 2px 0 #000}
#playSelect .sub{color:#fff;font-size:13px;margin-bottom:24px;opacity:0.7}
.play-btn{
  width:220px;padding:16px;margin:8px;
  background:linear-gradient(135deg,#FB4F14,#d4400f);
  border:2px solid #fff;border-radius:12px;
  color:#fff;font-size:18px;font-weight:900;
  text-align:center;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
.play-btn:active{transform:scale(0.95);background:#d4400f}
.play-btn.pass-btn{background:linear-gradient(135deg,#0066cc,#004499)}
.play-btn.pass-btn:active{background:#004499}

/* Message overlay */
#msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#FB4F14;font-size:36px;font-weight:900;
  text-shadow:3px 3px 0 #000,-1px -1px 0 #000;
  letter-spacing:3px;text-align:center;
  pointer-events:none;z-index:15;
  display:none;
}

/* Splash */
#splash{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg,#111,#000);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;z-index:30;
}
#splash h1{color:#FB4F14;font-size:38px;text-shadow:3px 3px 0 #000;margin-bottom:4px}
#splash .by{color:#fff;font-size:14px;opacity:0.5;margin-bottom:30px}
#splash .tap{
  padding:18px 48px;
  background:linear-gradient(135deg,#FB4F14,#d4400f);
  border:3px solid #fff;border-radius:14px;
  color:#fff;font-size:22px;font-weight:900;
  letter-spacing:2px;animation:glow 1.5s infinite alternate;
}
@keyframes glow{0%{box-shadow:0 0 10px #FB4F14}100%{box-shadow:0 0 30px #FB4F14,0 0 60px #FB4F1466}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div>
      <div class="score" id="scoreText">BENGALS 0 - CPU 0</div>
    </div>
    <div class="info" id="downText">1st & 10<br>OWN 20</div>
  </div>

  <div id="dpad" class="ctrl">
    <div class="dpad-btn" id="dUp">&#9650;</div>
    <div class="dpad-btn" id="dDown">&#9660;</div>
    <div class="dpad-btn" id="dLeft">&#9664;</div>
    <div class="dpad-btn" id="dRight">&#9654;</div>
    <div class="dpad-btn" id="dCenter"></div>
  </div>

  <div id="actions" class="ctrl">
    <div class="action-btn" id="btnA">SPIN</div>
    <div class="action-btn" id="btnB">TURBO</div>
  </div>

  <div id="playSelect" style="display:none">
    <h2>PICK A PLAY</h2>
    <div class="sub" id="playSub">1st & 10</div>
    <div class="play-btn" data-play="run-left">&#x1F3C8; RUN LEFT</div>
    <div class="play-btn" data-play="run-middle">&#x1F3C8; RUN MIDDLE</div>
    <div class="play-btn" data-play="run-right">&#x1F3C8; RUN RIGHT</div>
    <div class="play-btn pass-btn" data-play="pass-short">&#127944; SHORT PASS</div>
    <div class="play-btn pass-btn" data-play="pass-deep">&#127944; DEEP BOMB</div>
  </div>

  <div id="msg"></div>

  <div id="splash">
    <h1>JUDE BOWL</h1>
    <div class="by">Bengals vs CPU</div>
    <div class="tap">TAP TO PLAY</div>
  </div>
</div>

<script>
'use strict';
// ===== CANVAS SETUP =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, SCALE;
const FIELD_YARDS = 100;
const ENDZONE = 10; // yards each endzone
const TOTAL_YARDS = FIELD_YARDS + ENDZONE * 2; // 120

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  SCALE = H / TOTAL_YARDS; // pixels per yard vertically
}
resize();
window.addEventListener('resize', resize);

// ===== AUDIO =====
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = vol || 0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxWhistle() { playTone(800, 0.15, 'square', 0.2); setTimeout(() => playTone(800, 0.3, 'square', 0.2), 180); }
function sfxTD() {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'square', 0.25), i * 120));
}
function sfxHit() { playTone(120, 0.12, 'sawtooth', 0.3); }
function sfxCatch() { playTone(660, 0.08, 'sine', 0.2); playTone(880, 0.08, 'sine', 0.2); }
function sfxCrowd() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.08;
  const s = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  s.buffer = buf; g.gain.value = 0.1;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  s.connect(g); g.connect(audioCtx.destination);
  s.start();
}

// ===== GAME STATE =====
const BENGALS_ORANGE = '#FB4F14';
const BENGALS_BLACK = '#000000';
const CPU_BLUE = '#003594';
const CPU_WHITE = '#FFFFFF';
const FIELD_GREEN = '#2d7a3a';
const ENDZONE_COLOR = '#1a5c28';
const LINE_WHITE = 'rgba(255,255,255,0.5)';

let gameState = 'splash'; // splash, playSelect, playing, passing, celebration, turnover
let score = { bengals: 0, cpu: 0 };
let down = 1;
let yardsToGo = 10;
let ballOn = 20; // yard line (0=own endzone, 100=opponent endzone)
let lineOfScrimmage = 20;
let quarter = 1;

// Player positions (in yard-coordinates: x = 0 to ~53.3 yards wide, y = 0 to 120 yards)
const FIELD_W = 53.3;

// Input state
const input = { up: false, down: false, left: false, right: false, spin: false, turbo: false };

// Players
let offensePlayers = [];
let defensePlayers = [];
let ballCarrier = null;
let ball = { x: 0, y: 0, visible: false, targetIdx: -1, speed: 0, dx: 0, dy: 0 };
let playType = null; // 'run-left', 'run-middle', 'run-right', 'pass-short', 'pass-deep'
let playActive = false;
let playTimer = 0;
let tackled = false;
let spinCooldown = 0;
let passThrown = false;
let passTarget = -1;
let receiverControlled = false;
let afterCatchTimer = 0;

// Camera offset (vertical scroll to follow ball carrier)
let camY = 0;

// ===== PLAYER FACTORY =====
function makePlayer(x, y, color, outline, num, role, team) {
  return {
    x, y, color, outline, num, role, team,
    vx: 0, vy: 0,
    speed: 2.0 + Math.random() * 0.4,
    targetX: x, targetY: y,
    juked: 0, // frames of being juked
  };
}

// ===== FORMATION SETUP =====
function setupFormation() {
  offensePlayers = [];
  defensePlayers = [];
  const scrY = ENDZONE + (FIELD_YARDS - lineOfScrimmage); // convert to field coords (top=opponent endzone)
  const cx = FIELD_W / 2;

  // Offense (going UP = toward y=0 = opponent endzone)
  // O-line
  for (let i = -2; i <= 2; i++) {
    offensePlayers.push(makePlayer(cx + i * 2.2, scrY + 1, BENGALS_ORANGE, BENGALS_BLACK, 60 + i + 2, 'line', 'off'));
  }
  // QB (index 5)
  offensePlayers.push(makePlayer(cx, scrY + 5, BENGALS_ORANGE, '#fff', 9, 'qb', 'off'));
  // RB (index 6)
  offensePlayers.push(makePlayer(cx - 3, scrY + 7, BENGALS_ORANGE, '#fff', 28, 'rb', 'off'));
  // WR left (index 7)
  offensePlayers.push(makePlayer(cx - 18, scrY - 0.5, BENGALS_ORANGE, '#fff', 1, 'wr', 'off'));
  // WR right (index 8)
  offensePlayers.push(makePlayer(cx + 18, scrY - 0.5, BENGALS_ORANGE, '#fff', 17, 'wr', 'off'));
  // TE (index 9)
  offensePlayers.push(makePlayer(cx + 6, scrY + 0.5, BENGALS_ORANGE, '#fff', 85, 'te', 'off'));
  // Slot WR (index 10)
  offensePlayers.push(makePlayer(cx - 10, scrY - 0.5, BENGALS_ORANGE, '#fff', 11, 'wr', 'off'));

  // Defense
  // D-line
  for (let i = -2; i <= 2; i++) {
    defensePlayers.push(makePlayer(cx + i * 2.5, scrY - 1.5, CPU_BLUE, CPU_WHITE, 90 + i + 2, 'dline', 'def'));
  }
  // Linebackers
  defensePlayers.push(makePlayer(cx - 8, scrY - 6, CPU_BLUE, CPU_WHITE, 55, 'lb', 'def'));
  defensePlayers.push(makePlayer(cx, scrY - 5, CPU_BLUE, CPU_WHITE, 50, 'lb', 'def'));
  defensePlayers.push(makePlayer(cx + 8, scrY - 6, CPU_BLUE, CPU_WHITE, 56, 'lb', 'def'));
  // DBs
  defensePlayers.push(makePlayer(cx - 18, scrY - 3, CPU_BLUE, CPU_WHITE, 24, 'db', 'def'));
  defensePlayers.push(makePlayer(cx + 18, scrY - 3, CPU_BLUE, CPU_WHITE, 21, 'db', 'def'));
  // Safety
  defensePlayers.push(makePlayer(cx, scrY - 15, CPU_BLUE, CPU_WHITE, 14, 'safety', 'def'));

  passThrown = false;
  passTarget = -1;
  receiverControlled = false;
  afterCatchTimer = 0;
  ball.visible = false;
  tackled = false;
  spinCooldown = 0;
  playTimer = 0;
}

// ===== PLAY LOGIC =====
function startPlay(type) {
  playType = type;
  playActive = true;
  tackled = false;
  playTimer = 0;
  passThrown = false;
  receiverControlled = false;

  const isRun = type.startsWith('run');
  const isPass = type.startsWith('pass');

  if (isRun) {
    ballCarrier = offensePlayers[6]; // RB
    document.getElementById('btnA').textContent = 'SPIN';
    document.getElementById('btnB').textContent = 'TURBO';
    // Set initial run direction
    const scrY = ENDZONE + (FIELD_YARDS - lineOfScrimmage);
    if (type === 'run-left') {
      ballCarrier.targetX = FIELD_W / 2 - 12;
      ballCarrier.targetY = scrY - 3;
    } else if (type === 'run-right') {
      ballCarrier.targetX = FIELD_W / 2 + 12;
      ballCarrier.targetY = scrY - 3;
    } else {
      ballCarrier.targetY = scrY - 2;
    }
    sfxWhistle();
  }

  if (isPass) {
    ballCarrier = offensePlayers[5]; // QB
    document.getElementById('btnA').textContent = 'THROW';
    document.getElementById('btnB').textContent = 'TURBO';
    sfxWhistle();
  }

  document.getElementById('playSelect').style.display = 'none';
}

function endPlay(result) {
  playActive = false;
  sfxWhistle();

  // Calculate yards gained
  const scrY = ENDZONE + (FIELD_YARDS - lineOfScrimmage);
  const carrierYardLine = FIELD_YARDS - (ballCarrier.y - ENDZONE);
  const yardsGained = Math.round(carrierYardLine - lineOfScrimmage);

  // Touchdown check
  if (carrierYardLine >= 100) {
    score.bengals += 7;
    showMsg('TOUCHDOWN!!', 2500);
    sfxTD();
    sfxCrowd();
    setTimeout(() => {
      lineOfScrimmage = 20;
      ballOn = 20;
      down = 1;
      yardsToGo = 10;
      showPlaySelect();
    }, 2800);
    return;
  }

  // Safety check (pushed back into own endzone)
  if (carrierYardLine <= 0) {
    score.cpu += 2;
    showMsg('SAFETY!', 2000);
    setTimeout(() => {
      lineOfScrimmage = 20;
      ballOn = 20;
      down = 1;
      yardsToGo = 10;
      showPlaySelect();
    }, 2200);
    return;
  }

  // Update line of scrimmage
  lineOfScrimmage = Math.max(1, Math.min(99, carrierYardLine));
  ballOn = lineOfScrimmage;
  yardsToGo -= yardsGained;

  let msgText = '';
  if (result === 'incomplete') {
    msgText = 'INCOMPLETE';
  } else {
    msgText = yardsGained > 0 ? `GAIN OF ${yardsGained}` : (yardsGained < 0 ? `LOSS OF ${Math.abs(yardsGained)}` : 'NO GAIN');
    sfxHit();
  }

  // First down check
  if (yardsToGo <= 0 && result !== 'incomplete') {
    down = 1;
    yardsToGo = 10;
    msgText += '\nFIRST DOWN!';
    sfxCrowd();
  } else if (result === 'incomplete') {
    down++;
  } else {
    down++;
  }

  // Turnover on downs
  if (down > 4) {
    showMsg('TURNOVER ON DOWNS', 2000);
    setTimeout(() => {
      // CPU "scores" — simplified, just reset
      score.cpu += 3;
      lineOfScrimmage = 20;
      ballOn = 20;
      down = 1;
      yardsToGo = 10;
      showPlaySelect();
    }, 2200);
    return;
  }

  showMsg(msgText, 1800);
  setTimeout(showPlaySelect, 2000);
}

function showMsg(text, dur) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, dur || 2000);
}

function showPlaySelect() {
  setupFormation();
  gameState = 'playSelect';
  const el = document.getElementById('playSelect');
  const sub = document.getElementById('playSub');
  const ordinals = ['1st','2nd','3rd','4th'];
  sub.textContent = `${ordinals[down-1]} & ${yardsToGo} on the ${ballOn}`;
  el.style.display = 'flex';
  updateHUD();
}

function updateHUD() {
  const ordinals = ['1st','2nd','3rd','4th'];
  document.getElementById('scoreText').textContent = `BENGALS ${score.bengals} - CPU ${score.cpu}`;
  document.getElementById('downText').innerHTML = `${ordinals[down-1]} & ${yardsToGo}<br>${ballOn > 50 ? 'OPP ' + (100 - ballOn) : 'OWN ' + ballOn}`;
}

// ===== D-PAD TOUCH HANDLING =====
function setupControls() {
  // Prevent all default touch behavior on document
  document.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
  document.addEventListener('touchstart', e => {
    if (e.target.closest('#splash') || e.target.closest('#playSelect')) return;
    e.preventDefault();
  }, { passive: false });

  // D-pad
  const dirs = ['Up','Down','Left','Right'];
  dirs.forEach(d => {
    const el = document.getElementById('d' + d);
    const key = d.toLowerCase();
    el.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      input[key] = true;
      el.classList.add('active');
    }, { passive: false });
    el.addEventListener('touchend', e => {
      e.preventDefault(); e.stopPropagation();
      input[key] = false;
      el.classList.remove('active');
    }, { passive: false });
    el.addEventListener('touchcancel', e => {
      input[key] = false;
      el.classList.remove('active');
    }, { passive: false });
  });

  // Action buttons
  ['btnA','btnB'].forEach(id => {
    const el = document.getElementById(id);
    const key = id === 'btnA' ? 'spin' : 'turbo';
    el.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      input[key] = true;
      el.classList.add('active');
    }, { passive: false });
    el.addEventListener('touchend', e => {
      e.preventDefault(); e.stopPropagation();
      input[key] = false;
      el.classList.remove('active');
    }, { passive: false });
    el.addEventListener('touchcancel', e => {
      input[key] = false;
      el.classList.remove('active');
    }, { passive: false });
  });

  // Keyboard (for desktop testing)
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') input.up = true;
    if (e.key === 'ArrowDown') input.down = true;
    if (e.key === 'ArrowLeft') input.left = true;
    if (e.key === 'ArrowRight') input.right = true;
    if (e.key === 'z' || e.key === 'Z') input.spin = true;
    if (e.key === 'x' || e.key === 'X') input.turbo = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp') input.up = false;
    if (e.key === 'ArrowDown') input.down = false;
    if (e.key === 'ArrowLeft') input.left = false;
    if (e.key === 'ArrowRight') input.right = false;
    if (e.key === 'z' || e.key === 'Z') input.spin = false;
    if (e.key === 'x' || e.key === 'X') input.turbo = false;
  });

  // Play select buttons
  document.querySelectorAll('.play-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      initAudio();
      const play = btn.dataset.play;
      if (play) {
        gameState = 'playing';
        startPlay(play);
      }
    }, { passive: false });
    btn.addEventListener('click', e => {
      e.preventDefault();
      initAudio();
      const play = btn.dataset.play;
      if (play) {
        gameState = 'playing';
        startPlay(play);
      }
    });
  });

  // Splash
  const splash = document.getElementById('splash');
  function startGame(e) {
    e.preventDefault();
    initAudio();
    splash.style.display = 'none';
    gameState = 'playSelect';
    setupFormation();
    showPlaySelect();
  }
  splash.addEventListener('touchstart', startGame, { passive: false });
  splash.addEventListener('click', startGame);

  // Receiver selection (tap on canvas during pass play)
  canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing' || !playActive) return;
    if (!playType || !playType.startsWith('pass')) return;
    if (passThrown) return;
    e.preventDefault();
    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;
    // Check if tap is near a receiver
    const receivers = [7, 8, 9, 10]; // WR, WR, TE, Slot
    let closest = -1;
    let closestDist = 60; // px threshold
    receivers.forEach(idx => {
      const p = offensePlayers[idx];
      const sx = yardToScreenX(p.x);
      const sy = yardToScreenY(p.y);
      const d = Math.hypot(tx - sx, ty - sy);
      if (d < closestDist) {
        closestDist = d;
        closest = idx;
      }
    });
    if (closest >= 0) {
      throwBall(closest);
    }
  }, { passive: false });
}

// ===== COORDINATE CONVERSION =====
function yardToScreenX(yx) {
  // yx is 0 to 53.3
  return (yx / FIELD_W) * W;
}
function yardToScreenY(yy) {
  // yy is field yards (0=top endzone, 120=bottom endzone)
  return (yy - camY) * SCALE;
}

// ===== DRAWING =====
function drawField() {
  ctx.fillStyle = FIELD_GREEN;
  ctx.fillRect(0, 0, W, H);

  // Endzones
  const topEZ = yardToScreenY(0);
  const topEZEnd = yardToScreenY(ENDZONE);
  const botEZStart = yardToScreenY(ENDZONE + FIELD_YARDS);
  const botEZEnd = yardToScreenY(TOTAL_YARDS);

  ctx.fillStyle = '#c44200'; // opponent endzone (orange-ish)
  ctx.fillRect(0, topEZ, W, topEZEnd - topEZ);
  ctx.fillStyle = '#004080'; // cpu endzone
  ctx.fillRect(0, botEZStart, W, botEZEnd - botEZStart);

  // Endzone text
  ctx.save();
  ctx.font = `bold ${Math.max(14, SCALE * 4)}px Arial Black`;
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#fff';
  const ezMidTop = (topEZ + topEZEnd) / 2;
  ctx.fillText('BENGALS', W / 2, ezMidTop + SCALE * 1.5);
  const ezMidBot = (botEZStart + botEZEnd) / 2;
  ctx.fillText('CPU', W / 2, ezMidBot + SCALE * 1.5);
  ctx.restore();

  // Yard lines every 5 yards
  ctx.strokeStyle = LINE_WHITE;
  ctx.lineWidth = 1;
  ctx.font = `bold ${Math.max(8, SCALE * 1.5)}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'center';
  for (let yd = 0; yd <= 100; yd += 5) {
    const y = yardToScreenY(ENDZONE + (FIELD_YARDS - yd));
    if (y < -20 || y > H + 20) continue;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
    // Yard numbers
    if (yd > 0 && yd < 100 && yd % 10 === 0) {
      const label = yd <= 50 ? yd : 100 - yd;
      ctx.fillText(label, W * 0.08, y - 2);
      ctx.fillText(label, W * 0.92, y - 2);
    }
  }

  // Hash marks every yard
  for (let yd = 0; yd <= 100; yd++) {
    const y = yardToScreenY(ENDZONE + (FIELD_YARDS - yd));
    if (y < -5 || y > H + 5) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(W * 0.33, y - 0.5, 3, 1);
    ctx.fillRect(W * 0.66, y - 0.5, 3, 1);
  }

  // Line of scrimmage
  const losY = yardToScreenY(ENDZONE + (FIELD_YARDS - lineOfScrimmage));
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, losY);
  ctx.lineTo(W, losY);
  ctx.stroke();
  ctx.setLineDash([]);

  // First down line
  const fdYard = Math.min(100, lineOfScrimmage + yardsToGo);
  const fdY = yardToScreenY(ENDZONE + (FIELD_YARDS - fdYard));
  ctx.strokeStyle = '#ff0';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, fdY);
  ctx.lineTo(W, fdY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlayer(p, highlight) {
  const sx = yardToScreenX(p.x);
  const sy = yardToScreenY(p.y);
  const r = Math.max(8, SCALE * 1.3);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx + 1, sy + 2, r, r * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Highlight ring for ball carrier
  if (highlight) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx, sy, r + 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Number
  ctx.fillStyle = p.team === 'off' ? '#000' : '#fff';
  ctx.font = `bold ${Math.max(7, r * 0.9)}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.num, sx, sy + 1);

  // Receiver target indicator during pass play (pulsing circle)
  if (playActive && playType && playType.startsWith('pass') && !passThrown && (p.role === 'wr' || p.role === 'te')) {
    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
    ctx.strokeStyle = `rgba(255,255,0,${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawBall() {
  if (!ball.visible) return;
  const sx = yardToScreenX(ball.x);
  const sy = yardToScreenY(ball.y);
  // Brown football
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(sx, sy, 5, 3, Math.atan2(ball.dy, ball.dx), 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Laces
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - 2, sy);
  ctx.lineTo(sx + 2, sy);
  ctx.stroke();
}

// ===== GAME UPDATE =====
function updateCamera() {
  if (!ballCarrier) return;
  // Camera follows ball carrier, keep them roughly center-ish
  const targetCamY = ballCarrier.y - (H / SCALE) * 0.5;
  const minCam = -5;
  const maxCam = TOTAL_YARDS - H / SCALE + 5;
  camY += (Math.max(minCam, Math.min(maxCam, targetCamY)) - camY) * 0.08;
}

function updateRunPlay(dt) {
  if (!ballCarrier || tackled) return;
  playTimer += dt;

  const speed = ballCarrier.speed * (input.turbo ? 1.6 : 1.0);

  // Player movement — ONLY when D-pad is held
  let dx = 0, dy = 0;
  if (input.up) dy = -speed * dt;
  if (input.down) dy = speed * dt * 0.6; // slower backwards
  if (input.left) dx = -speed * dt * 0.85;
  if (input.right) dx = speed * dt * 0.85;

  // If no input at all in first 0.5s, give a tiny auto-advance so it doesn't feel stuck
  if (dx === 0 && dy === 0 && playTimer < 0.5) {
    dy = -speed * dt * 0.3;
  }

  ballCarrier.x += dx;
  ballCarrier.y += dy;

  // Clamp to field
  ballCarrier.x = Math.max(1, Math.min(FIELD_W - 1, ballCarrier.x));
  ballCarrier.y = Math.max(0, Math.min(TOTAL_YARDS, ballCarrier.y));

  // Spin move
  if (input.spin && spinCooldown <= 0) {
    spinCooldown = 1.5;
    sfxCatch();
    // Juke nearby defenders
    defensePlayers.forEach(d => {
      const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
      if (dist < 5) {
        d.juked = 30; // 30 frames of being stunned
      }
    });
    // Quick lateral burst
    if (input.left) ballCarrier.x -= 3;
    else if (input.right) ballCarrier.x += 3;
    else ballCarrier.x += (Math.random() > 0.5 ? 3 : -3);
    ballCarrier.x = Math.max(1, Math.min(FIELD_W - 1, ballCarrier.x));
  }
  if (spinCooldown > 0) spinCooldown -= dt;

  // O-line blocking
  offensePlayers.forEach((p, i) => {
    if (i >= 5) return; // only linemen
    // Move to block nearest defender in front of ball carrier
    let nearDef = null;
    let nearDist = 15;
    defensePlayers.forEach(d => {
      const dist = Math.hypot(d.x - p.x, d.y - p.y);
      if (dist < nearDist && d.y < ballCarrier.y + 3) {
        nearDist = dist;
        nearDef = d;
      }
    });
    if (nearDef) {
      const angle = Math.atan2(nearDef.y - p.y, nearDef.x - p.x);
      p.x += Math.cos(angle) * p.speed * dt * 0.5;
      p.y += Math.sin(angle) * p.speed * dt * 0.5;
    } else {
      // Run upfield ahead of ball carrier
      p.y += (ballCarrier.y - 4 - p.y) * 0.03;
    }
  });

  // Defenders chase ball carrier
  updateDefense(dt);

  // Tackle check
  checkTackle();

  // Touchdown check
  const yd = FIELD_YARDS - (ballCarrier.y - ENDZONE);
  if (yd >= 100) {
    endPlay('td');
  }
}

function updatePassPlay(dt) {
  if (tackled) return;
  playTimer += dt;

  if (!passThrown) {
    // QB pocket movement
    const speed = ballCarrier.speed * 0.7 * (input.turbo ? 1.3 : 1.0);
    if (input.up) ballCarrier.y -= speed * dt * 0.5;
    if (input.down) ballCarrier.y += speed * dt * 0.7;
    if (input.left) ballCarrier.x -= speed * dt;
    if (input.right) ballCarrier.x += speed * dt;
    ballCarrier.x = Math.max(3, Math.min(FIELD_W - 3, ballCarrier.x));

    // Receivers run routes
    runReceiverRoutes(dt);

    // Throw on button press
    if (input.spin) {
      // Auto-throw to best open receiver
      const receivers = [7, 8, 9, 10];
      let bestIdx = receivers[0];
      let bestScore = -Infinity;
      receivers.forEach(idx => {
        const r = offensePlayers[idx];
        // Score: prefer further downfield, open receivers
        let nearestDef = Infinity;
        defensePlayers.forEach(d => {
          nearestDef = Math.min(nearestDef, Math.hypot(d.x - r.x, d.y - r.y));
        });
        const downfield = (ENDZONE + FIELD_YARDS - lineOfScrimmage) - r.y;
        const sc = downfield * 2 + nearestDef * 3;
        if (sc > bestScore) { bestScore = sc; bestIdx = idx; }
      });
      throwBall(bestIdx);
    }

    // QB sack check (after a small grace period)
    if (playTimer > 1.0) {
      updateDefense(dt);
      checkTackle();
    } else {
      // D-line rushes but doesn't tackle yet
      defensePlayers.forEach((d, i) => {
        if (i < 5 && d.juked <= 0) { // d-line only
          const angle = Math.atan2(ballCarrier.y - d.y, ballCarrier.x - d.x);
          d.x += Math.cos(angle) * d.speed * dt * 0.4;
          d.y += Math.sin(angle) * d.speed * dt * 0.4;
        }
      });
    }
  } else {
    // Ball in air
    ball.x += ball.dx * dt;
    ball.y += ball.dy * dt;

    const target = offensePlayers[passTarget];
    const distToTarget = Math.hypot(ball.x - target.x, ball.y - target.y);

    if (distToTarget < 2) {
      // Caught!
      ball.visible = false;
      sfxCatch();
      ballCarrier = target;
      receiverControlled = true;
      afterCatchTimer = 0;
      document.getElementById('btnA').textContent = 'SPIN';

      // Run after catch
      updateDefense(dt);
    } else if (ball.y < -5 || ball.y > TOTAL_YARDS + 5 || ball.x < -5 || ball.x > FIELD_W + 5) {
      // Out of bounds — incomplete
      ball.visible = false;
      endPlay('incomplete');
      return;
    }

    // Check interception (defender near ball)
    defensePlayers.forEach(d => {
      if (!ball.visible) return;
      const distBall = Math.hypot(d.x - ball.x, d.y - ball.y);
      if (distBall < 2.5 && Math.random() < 0.15) {
        // Interception!
        ball.visible = false;
        showMsg('INTERCEPTED!', 2000);
        sfxHit();
        playActive = false;
        score.cpu += 7;
        setTimeout(() => {
          lineOfScrimmage = 20;
          ballOn = 20;
          down = 1;
          yardsToGo = 10;
          showPlaySelect();
        }, 2200);
      }
    });

    if (receiverControlled) {
      // Control receiver after catch
      const speed = ballCarrier.speed * (input.turbo ? 1.6 : 1.0);
      if (input.up) ballCarrier.y -= speed * dt;
      if (input.down) ballCarrier.y += speed * dt * 0.6;
      if (input.left) ballCarrier.x -= speed * dt * 0.85;
      if (input.right) ballCarrier.x += speed * dt * 0.85;
      ballCarrier.x = Math.max(1, Math.min(FIELD_W - 1, ballCarrier.x));

      // Spin move
      if (input.spin && spinCooldown <= 0) {
        spinCooldown = 1.5;
        sfxCatch();
        defensePlayers.forEach(d => {
          const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
          if (dist < 5) d.juked = 30;
        });
        if (input.left) ballCarrier.x -= 3;
        else if (input.right) ballCarrier.x += 3;
        else ballCarrier.x += (Math.random() > 0.5 ? 3 : -3);
        ballCarrier.x = Math.max(1, Math.min(FIELD_W - 1, ballCarrier.x));
      }
      if (spinCooldown > 0) spinCooldown -= dt;

      updateDefense(dt);
      checkTackle();

      const yd = FIELD_YARDS - (ballCarrier.y - ENDZONE);
      if (yd >= 100) endPlay('td');
    }

    // Receivers keep running
    if (!receiverControlled) {
      runReceiverRoutes(dt);
      // Defenders cover
      defensePlayers.forEach((d, i) => {
        if (d.juked > 0) { d.juked--; return; }
        if (i >= 8) { // DBs and safety chase the ball
          const angle = Math.atan2(ball.y - d.y, ball.x - d.x);
          d.x += Math.cos(angle) * d.speed * dt * 0.8;
          d.y += Math.sin(angle) * d.speed * dt * 0.8;
        }
      });
    }
  }
}

function throwBall(targetIdx) {
  if (passThrown) return;
  passThrown = true;
  passTarget = targetIdx;
  ball.visible = true;
  ball.x = ballCarrier.x;
  ball.y = ballCarrier.y;

  const target = offensePlayers[targetIdx];
  // Lead the receiver slightly
  const leadY = target.y - 4;
  const dist = Math.hypot(target.x - ball.x, leadY - ball.y);
  const ballSpeed = 40; // yards per second
  ball.dx = (target.x - ball.x) / dist * ballSpeed;
  ball.dy = (leadY - ball.y) / dist * ballSpeed;
  sfxWhistle();
}

function runReceiverRoutes(dt) {
  const scrY = ENDZONE + (FIELD_YARDS - lineOfScrimmage);
  const isDeep = playType === 'pass-deep';
  const routeSpeed = 2.2;

  // WR left (idx 7) — slant or go
  const wr1 = offensePlayers[7];
  if (isDeep) {
    wr1.y -= routeSpeed * dt;
  } else {
    if (playTimer < 1.0) wr1.y -= routeSpeed * dt;
    else { wr1.y -= routeSpeed * dt * 0.3; wr1.x += routeSpeed * dt * 0.8; }
  }

  // WR right (idx 8) — out or go
  const wr2 = offensePlayers[8];
  if (isDeep) {
    wr2.y -= routeSpeed * dt;
  } else {
    if (playTimer < 0.8) wr2.y -= routeSpeed * dt;
    else { wr2.x += routeSpeed * dt * 0.6; wr2.y -= routeSpeed * dt * 0.4; }
  }

  // TE (idx 9) — crossing
  const te = offensePlayers[9];
  if (playTimer < 0.6) te.y -= routeSpeed * dt * 0.8;
  else { te.x -= routeSpeed * dt * 0.9; te.y -= routeSpeed * dt * 0.3; }

  // Slot WR (idx 10) — short cross
  const slot = offensePlayers[10];
  if (playTimer < 0.5) slot.y -= routeSpeed * dt * 0.7;
  else { slot.x += routeSpeed * dt * 0.8; slot.y -= routeSpeed * dt * 0.2; }
}

function updateDefense(dt) {
  if (!ballCarrier) return;
  defensePlayers.forEach((d, i) => {
    if (d.juked > 0) { d.juked--; return; }

    let targetX = ballCarrier.x;
    let targetY = ballCarrier.y;

    // Pursuit angles — don't all beeline, some try to cut off
    const pursuitVariance = ((i * 137) % 7 - 3) * 1.5; // deterministic spread
    targetX += pursuitVariance;

    // D-line are slower but more direct
    let chaseSpeed = d.speed;
    if (d.role === 'dline') chaseSpeed *= 0.7;
    if (d.role === 'lb') chaseSpeed *= 0.85;
    if (d.role === 'db' || d.role === 'safety') chaseSpeed *= 0.95;

    // Add difficulty scaling — defenders get a bit slower to make it fun
    chaseSpeed *= 0.72;

    const angle = Math.atan2(targetY - d.y, targetX - d.x);
    d.x += Math.cos(angle) * chaseSpeed * dt;
    d.y += Math.sin(angle) * chaseSpeed * dt;
  });
}

function checkTackle() {
  if (!ballCarrier || tackled) return;

  // Grace period at start of play (no instant tackles)
  if (playTimer < 0.8) return;

  defensePlayers.forEach(d => {
    if (tackled || d.juked > 0) return;
    const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
    // Tackle radius
    if (dist < 1.8) {
      // Broken tackle chance (20% normally, higher with turbo)
      if (input.turbo && Math.random() < 0.35) {
        d.juked = 20;
        return;
      }
      if (Math.random() < 0.2) {
        d.juked = 15;
        return;
      }
      tackled = true;
      sfxHit();
      setTimeout(() => endPlay('tackled'), 600);
    }
  });
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = timestamp;

  if (gameState === 'splash') {
    drawSplash();
    return;
  }

  // Update camera
  updateCamera();

  // Update game
  if (gameState === 'playing' && playActive) {
    if (playType && playType.startsWith('run')) {
      updateRunPlay(dt);
    } else if (playType && playType.startsWith('pass')) {
      updatePassPlay(dt);
    }
    updateHUD();
  }

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawField();

  // Draw players
  offensePlayers.forEach(p => drawPlayer(p, p === ballCarrier));
  defensePlayers.forEach(p => drawPlayer(p, false));
  drawBall();
}

function drawSplash() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Draw a simple field preview
  const oldCamY = camY;
  camY = 30;
  drawField();
  camY = oldCamY;

  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
}

// ===== INIT =====
setupFormation();
setupControls();
requestAnimationFrame(gameLoop);
</script>
