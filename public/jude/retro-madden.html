let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, delay) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(Math.min(vol || 0.1, 0.25), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start(t);
  o.stop(t + dur);
}

function playNoise(dur, vol, filterFreq) {
  if (!audioCtx) return;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();
  s.buffer = buf;
  f.type = 'lowpass';
  f.frequency.value = filterFreq || 3000;
  g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  s.connect(f);
  f.connect(g);
  g.connect(audioCtx.destination);
  s.start();
}

// =========================================================================
// 5. PARTICLE SYSTEM
// =========================================================================

let particles = [];

function spawnSparks(x, y, count, color1, color2) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4.5;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1.0, decay: 0.018 + Math.random() * 0.025,
      color: i % 2 === 0 ? (color1 || ORANGE) : (color2 || WHITE),
      size: 1.5 + Math.random() * 3.5, type: 'spark'
    });
  }
}

function spawnTDBurst(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 7;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2.5,
      life: 1.0, decay: 0.01 + Math.random() * 0.015,
      color: [ORANGE, ORANGE_GLOW, ORANGE_EMBER, WHITE, GOLD, FIRE_RED][Math.floor(Math.random() * 6)],
      size: 2 + Math.random() * 5, type: 'burst'
    });
  }
}

function spawnEmber(x, y) {
  particles.push({
    x: x + (Math.random() - 0.5) * 4, y: y + Math.random() * 3,
    vx: (Math.random() - 0.5) * 0.5, vy: Math.random() * 0.5 + 0.3,
    life: 0.7, decay: 0.04 + Math.random() * 0.02,
    color: Math.random() > 0.5 ? ORANGE : ORANGE_GLOW,
    size: 1 + Math.random() * 2, type: 'ember'
  });
}

function spawnFireAura(x, y) {
  for (let i = 0; i < 3; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 10, y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 1.5, vy: -1 - Math.random() * 2,
      life: 0.6, decay: 0.04 + Math.random() * 0.03,
      color: [FIRE_RED, FIRE_ORANGE, ORANGE, GOLD_BRIGHT][Math.floor(Math.random() * 4)],
      size: 2 + Math.random() * 4, type: 'fire'
    });
  }
}

let screenFlash = 0, screenFlashColor = WHITE;
function triggerFlash(color, intensity) {
  screenFlash = intensity || 0.6;
  screenFlashColor = color || WHITE;
}

let shakeX = 0, shakeY = 0, shakeMag = 0;
function triggerShake(mag) { shakeMag = mag || 5; }

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.type === 'burst') p.vy += 0.12;
    if (p.type === 'ember') { p.vy -= 0.02; p.vx *= 0.98; }
    if (p.type === 'fire') { p.vy -= 0.05; p.vx *= 0.95; p.size *= 0.97; }
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (screenFlash > 0) screenFlash *= 0.86;
  if (screenFlash < 0.01) screenFlash = 0;
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag;
    shakeY = (Math.random() - 0.5) * shakeMag;
    shakeMag *= 0.86;
    if (shakeMag < 0.3) { shakeMag = 0; shakeX = 0; shakeY = 0; }
  }
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      ctx.fillRect(-p.size * 2, -p.size * 0.25, p.size * 4, p.size * 0.5);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function showCommentary(pool) {
  commentary.text = pool[Math.floor(Math.random() * pool.length)];
  commentary.timer = 2.0;
}

function drawCommentary(dt) {
  if (commentary.timer <= 0) return;
  commentary.timer -= dt;
  const alpha = Math.min(1, commentary.timer * 1.5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = '500 ' + Math.min(11, W * 0.026) + 'px ' + FONT_UI;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(commentary.text).width + 20;
  const th = 22;
  const tx = W / 2 - tw / 2;
  const ty = 56;
  ctx.fillStyle = 'rgba(5,5,5,0.85)';
  roundRect(ctx, tx, ty, tw, th, 4); ctx.fill();
  ctx.fillStyle = METALLIC_LIGHT;
  ctx.fillText(commentary.text, W / 2, ty + th / 2);
  ctx.restore();
}

// --- Daily Login Bonus ---
function checkDailyBonus() {
  const today = new Date().toISOString().split('T')[0];
  if (store.lastDailyLogin === today) return null;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (store.lastDailyLogin === yesterday) { store.dailyStreak++; }
  else { store.dailyStreak = 1; }
  store.lastDailyLogin = today;
  const bonus = Math.min(store.dailyStreak * 15, 150);
  store.coins += bonus;
  store.totalCoins += bonus;
  saveStore();
  analyticsEvent('daily_bonus', { streak: store.dailyStreak, bonus });

}

// Route runner — per play type
function runReceiverRoutes(dt) {
  const speed = 2.7;
  const wr1 = offensePlayers[7], wr2 = offensePlayers[8];
  const te = offensePlayers[9], slot = offensePlayers[10];

  if (playType === 'pass-deep' || playType === 'trick-flea') {
    wr1.y -= speed * dt; wr1.x += 0.2 * dt;
    wr2.y -= speed * dt; wr2.x -= 0.2 * dt;
    te.y -= speed * dt * 0.7; te.x -= speed * dt * 0.4;
    slot.y -= speed * dt * 0.9; slot.x += speed * dt * 0.3;
  } else if (playType === 'pass-screen') {
    // Receivers run shallow, RB swings out
    wr1.y -= speed * dt * 0.3; wr1.x += speed * dt * 0.2;
    wr2.y -= speed * dt * 0.3; wr2.x -= speed * dt * 0.2;
    te.y -= speed * dt * 0.4;
    slot.y -= speed * dt * 0.5; slot.x += speed * dt * 0.5;
    // RB swings out to flat
    const rb = offensePlayers[6];
    rb.y -= speed * dt * 0.2; rb.x -= speed * dt * 0.8;
  } else {
    // Short pass routes
    if (playTimer < 0.9) { wr1.y -= speed * dt; }
    else { wr1.y -= speed * dt * 0.3; wr1.x += speed * dt * 0.65; }
    if (playTimer < 0.75) { wr2.y -= speed * dt; }
    else { wr2.x += speed * dt * 0.55; wr2.y -= speed * dt * 0.35; }
    if (playTimer < 0.55) { te.y -= speed * dt * 0.8; }
    else { te.x -= speed * dt * 0.85; te.y -= speed * dt * 0.3; }
    if (playTimer < 0.35) { slot.y -= speed * dt * 0.7; }
    else { slot.x += speed * dt * 0.7; slot.y -= speed * dt * 0.2; }
  }
}

// Random blitz flag per play (set in startPlay)
let defenseBlitzing = false;

function updateDefense(dt) {
  if (!ballCarrier) return;
  const diff = getDiff();
  const diffScale = DIFF_DEFENSE_SPEED[diff];
  const blitzBoost = defenseBlitzing ? 1.18 : 1.0;

  defensePlayers.forEach(function(d, i) {
    if (d.juked > 0) { d.juked--; return; }
    if (d.knockdown > 0) { d.knockdown -= dt; return; }

    let targetX = ballCarrier.x, targetY = ballCarrier.y;
    let chaseSpeed = d.speed;

    if (d.role === 'dline') {
      chaseSpeed *= 0.72;
    } else if (d.role === 'lb') {
      chaseSpeed *= 0.82;
      if (input.left) targetX -= 3;
      if (input.right) targetX += 3;
      targetX += (ballCarrier.x > FIELD_WIDTH / 2 ? 2.5 : -2.5);
    } else if (d.role === 'cb') {
      chaseSpeed *= 0.85;
    } else if (d.role === 'safety') {
      chaseSpeed *= 0.84;
      targetY -= 1.5;
    }

    // All-Madden: anticipate direction
    if (diff === 2) {
      if (input.up) targetY -= 4;
      if (input.left) targetX -= 2;
      if (input.right) targetX += 2;
    }

    targetX += Math.sin(i * 3.7 + playTimer * 2.8) * (diff === 0 ? 2.0 : 1.0);
    chaseSpeed *= diffScale * blitzBoost;

    // ON FIRE makes defenders slightly slower
    if (onFire) chaseSpeed *= 0.85;

    const angle = Math.atan2(targetY - d.y, targetX - d.x);
    d.x += Math.cos(angle) * chaseSpeed * dt;
    d.y += Math.sin(angle) * chaseSpeed * dt;
  });
}

function updatePassCoverage(dt) {
  const diff = getDiff();
  const diffScale = DIFF_DEFENSE_SPEED[diff];

  defensePlayers.forEach(function(d, i) {
    if (d.juked > 0) { d.juked--; return; }
    if (d.knockdown > 0) { d.knockdown -= dt; return; }

    if (d.role === 'dline') {
      const angle = Math.atan2(ballCarrier.y - d.y, ballCarrier.x - d.x);
      d.x += Math.cos(angle) * d.speed * 0.6 * diffScale * dt;
      d.y += Math.sin(angle) * d.speed * 0.6 * diffScale * dt;
    } else if (d.role === 'cb') {
      let nearWR = null, nearDist = Infinity;
      [7, 8, 9, 10].forEach(function(idx) {
        const r = offensePlayers[idx];
        const dist = Math.hypot(r.x - d.x, r.y - d.y);
        if (dist < nearDist) { nearDist = dist; nearWR = r; }
      });
      if (nearWR) {
        const covSpeed = d.speed * (0.7 + diff * 0.06);
        const angle = Math.atan2(nearWR.y - d.y, nearWR.x - d.x);
        d.x += Math.cos(angle) * covSpeed * dt;
        d.y += Math.sin(angle) * covSpeed * dt;
      }
    } else if (d.role === 'lb') {
      const angle = Math.atan2(ballCarrier.y - d.y, ballCarrier.x - d.x);
      d.x += Math.cos(angle) * d.speed * 0.4 * diffScale * dt;
      d.y += Math.sin(angle) * d.speed * 0.4 * diffScale * dt;
    } else if (d.role === 'safety') {
      const scrY = yardLineToFieldY(lineOfScrimmage);
      d.y += (scrY - 20 - d.y) * 0.03;
      if (ball.visible) {
        const angle = Math.atan2(ball.y - d.y, ball.x - d.x);
        d.x += Math.cos(angle) * d.speed * (0.4 + diff * 0.08) * dt;
        d.y += Math.sin(angle) * d.speed * (0.4 + diff * 0.08) * dt;
      }
    }
  });
}


// =========================================================================
// 14. PLAY LOGIC
// =========================================================================

// Trick play state
let trickPhase = 0; // 0=not started, 1=RB has ball, 2=pitch back to QB, 3=pass

function startPlay(type) {
  playType = type;
  tackled = false; playTimer = 0; passThrown = false;
  receiverControlled = false; ball.visible = false; ball.airTime = 0;
  hitStop = 0; drivePlays++; trickPhase = 0;
  lateHitWindow = 0; lateHitTarget = null;

  // Special teams handling
  if (type === 'punt') {
    sfxPunt();
    showCommentary(COMMENTARY_PUNT);
    // Punt pushes opponent back, they start further from our endzone
    const puntYards = 30 + Math.floor(Math.random() * 20);
    const windBonus = gameWeather === 'wind' ? (windDirection * 8) : 0;
    playsRun++; playsThisQuarter++;
    gameStats.plays++;
    gameStats.drives++;
    gameStats.driveResults.push('punt');
    resultMsg = 'PUNT — ' + (puntYards + Math.round(windBonus)) + ' YARDS';
    resultSubMsg = gameWeather === 'wind' ? (windBonus > 0 ? 'Wind helped!' : 'Into the wind!') : '';
    gameState = 'result'; resultTimer = 0;
    // After result, CPU drives then we get ball back at 25
    setTimeout(function() {
      simulateCPUDrive();
      gameState = 'result'; resultTimer = 0;
      setTimeout(function() {
        if (!checkQuarterEnd()) startNewDrive();
      }, 2200);
    }, 2000);
    drivePlays = 0; driveYards = 0;
    return;
  }

  if (type === 'field-goal') {
    sfxFieldGoalAttempt();
    // FG chance based on distance (ballOn = yard line, distance = 100 - ballOn + 17)
    const fgDistance = (100 - ballOn) + 17; // endzone + 7 yard snap
    let fgChance = fgDistance <= 30 ? 0.92 : (fgDistance <= 40 ? 0.78 : (fgDistance <= 50 ? 0.55 : 0.30));
    if (gameWeather === 'wind') fgChance -= 0.15;
    if (gameWeather === 'rain') fgChance -= 0.05;
    if (onFire) fgChance += 0.1;
    const fgGood = Math.random() < fgChance;
    playsRun++; playsThisQuarter++;
    gameStats.plays++;
    gameStats.drives++;

    if (fgGood) {
      score.bengals += 3;
      sfxFieldGoal();
      showCommentary(COMMENTARY_FG_GOOD);
      triggerFlash(GOLD, 0.35);
      vibrate(100);
      resultMsg = 'FIELD GOAL!';
      resultSubMsg = fgDistance + ' YARDS — 3 POINTS';
      gameStats.driveResults.push('fg');
      const fgCoins = 10;
      store.coins += fgCoins; store.totalCoins += fgCoins;
      addStylePoints(15, 'field_goal');
      saveStore();
    } else {
      sfxIncomplete();
      showCommentary(COMMENTARY_FG_MISS);
      triggerShake(3);
      resultMsg = 'NO GOOD';
      resultSubMsg = fgDistance + ' YARD ATTEMPT';
      gameStats.driveResults.push('fg_miss');
    }
    gameState = 'result'; resultTimer = 0;
    setTimeout(function() {
      if (fgGood) {
        simulateCPUDrive();
        gameState = 'result'; resultTimer = 0;
        setTimeout(function() {
          if (!checkQuarterEnd()) startNewDrive();
        }, 2200);
      } else {
        simulateCPUDrive();
        gameState = 'result'; resultTimer = 0;
        setTimeout(function() {
          if (!checkQuarterEnd()) startNewDrive();
        }, 2200);
      }
    }, 2000);
    drivePlays = 0; driveYards = 0;
    return;
  }

  // Random blitz (more likely on higher difficulty and 3rd/4th down)
  const blitzChance = (getDiff() === 0 ? 0.1 : (getDiff() === 1 ? 0.2 : 0.35)) + (down >= 3 ? 0.15 : 0);
  defenseBlitzing = Math.random() < blitzChance;

  if (type === 'trick-flea') {
    ballCarrier = offensePlayers[6]; // RB starts
    trickPhase = 1;
    gameStats.trickPlaysRun++;
    sfxTrickPlay();
    showCommentary(COMMENTARY_TRICKPLAY);
  } else if (type === 'trick-reverse') {
    ballCarrier = offensePlayers[6]; // RB starts
    trickPhase = 1;
    gameStats.trickPlaysRun++;
    sfxTrickPlay();
    showCommentary(COMMENTARY_TRICKPLAY);
  } else if (type === 'run-qb') {
    ballCarrier = offensePlayers[5]; // QB scramble
    gameStats.rushAttempts++;
  } else if (type.indexOf('run') === 0) {
    ballCarrier = offensePlayers[6];
    gameStats.rushAttempts++;
  } else if (type === 'pass-screen') {
    ballCarrier = offensePlayers[5];
    gameStats.attempts++;
  } else {
    ballCarrier = offensePlayers[5];
    gameStats.attempts++;
  }

  sfxSnap();
  showCommentary(COMMENTARY_SNAP);
  gameState = 'snap'; stateTimer = 0;
  analyticsEvent('play_start', { type, down, yardsToGo, fieldPos: ballOn });
}

function transitionToPlaying() {
  gameState = 'playing'; stateTimer = 0;
  sfxWhistle();
}

function endPlay(result) {
  if (gameState === 'result' || gameState === 'celebration' || gameState === 'turnover') return;

  const carrierYardLine = fieldYToYardLine(ballCarrier.y);
  const yardsGained = Math.round(carrierYardLine - lineOfScrimmage);

  gameStats.plays++;
  driveYards += Math.max(0, yardsGained);

  if (playType && (playType.indexOf('run') === 0 || playType === 'run-qb' || playType === 'trick-reverse')) {
    gameStats.rushYards += Math.max(0, yardsGained);
  } else if (receiverControlled) {
    gameStats.passYards += Math.max(0, yardsGained);
  }
  gameStats.totalYards += Math.max(0, yardsGained);
  if (yardsGained > gameStats.longestPlay) gameStats.longestPlay = yardsGained;
  if (yardsGained >= 20) gameStats.bigPlays.push({ yards: yardsGained, type: playType, quarter });

  // Style points for yards gained
  if (yardsGained >= 5) addStylePoints(yardsGained, 'yards');
  if (yardsGained >= 20) addStylePoints(20, 'big_play');
  if (yardsGained >= 40) addStylePoints(30, 'explosive');

  if (playType && playType.indexOf('pass') === 0 && !passThrown && yardsGained < 0) {
    gameStats.sacks++;
    showCommentary(COMMENTARY_SACK);
  }
  if (down === 3) { gameStats.thirdDownAtt++; if (yardsGained >= yardsToGo) gameStats.thirdDownConv++; }
  if (down === 4) { gameStats.fourthDownAtt++; if (yardsGained >= yardsToGo) gameStats.fourthDownConv++; }

  // Enable late hit window for Blitz-style after-whistle hits
  lateHitWindow = 1.0;
  lateHitTarget = ballCarrier;

  // Touchdown
  if (carrierYardLine >= 100) {
    score.bengals += 7;
    gameStats.touchdowns++;
    gameStats.drives++;
    gameStats.driveResults.push('td');
    store.totalTDs++;
    playsRun++; playsThisQuarter++;
    gameState = 'celebration'; celebTimer = 0;
    resultMsg = 'TOUCHDOWN';
    resultSubMsg = yardsGained + ' YARD ' + (playType.indexOf('pass') === 0 || playType === 'trick-flea' ? 'PASS' : 'RUN');
    sfxTD();
    showCommentary(COMMENTARY_TD);
    triggerFlash(ORANGE, 0.55);
    triggerShake(10);
    vibrate(200);
    spawnTDBurst(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y));
    // Extra fireworks bursts for TDs
    setTimeout(function() { spawnTDBurst(Math.random() * W, Math.random() * H * 0.3); }, 300);
    setTimeout(function() { spawnTDBurst(Math.random() * W, Math.random() * H * 0.3); }, 600);
    setTimeout(sfxWhoDey, 600);
    setTimeout(sfxCrowdRoar, 200);
    addStylePoints(50, 'touchdown');
    if (playType.indexOf('trick') === 0) addStylePoints(30, 'trick_td');
    const tdCoins = 20 + Math.min(yardsGained, 50);
    store.coins += tdCoins; store.totalCoins += tdCoins;
    saveStore();
    analyticsEvent('touchdown', { yards: yardsGained, coins: tdCoins });
    drivePlays = 0; driveYards = 0;
    return;
  }

  // Safety
  if (carrierYardLine <= 0) {
    score.cpu += 2;
    playsRun++; playsThisQuarter++;
    gameState = 'result'; resultMsg = 'SAFETY'; resultSubMsg = 'CPU scores 2';
    resultTimer = 0; sfxTurnover(); triggerShake(5);
    return;
  }

  lineOfScrimmage = Math.max(1, Math.min(99, carrierYardLine));
  ballOn = lineOfScrimmage;

  if (result === 'incomplete') {
    resultMsg = 'INCOMPLETE'; resultSubMsg = '';
    sfxIncomplete(); showCommentary(COMMENTARY_INCOMPLETE);
    down++;
  } else if (result === 'interception') {
    return;
  } else {
    yardsToGo -= yardsGained;
    if (yardsGained > 0) {
      resultMsg = yardsGained + ' YARD GAIN';
      if (yardsGained >= 20) {
        resultSubMsg = 'BIG PLAY!';
        sfxBigPlay(); showCommentary(COMMENTARY_BIGPLAY);
        triggerShake(6);
        spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 18, GOLD_BRIGHT, ORANGE);
      } else {
        resultSubMsg = '';
        showCommentary(COMMENTARY_TACKLE);
      }
    } else if (yardsGained < 0) {
      resultMsg = 'LOSS OF ' + Math.abs(yardsGained); resultSubMsg = '';
    } else {
      resultMsg = 'NO GAIN'; resultSubMsg = '';
      showCommentary(COMMENTARY_TACKLE);
    }
    sfxHit(); hitStop = 0.12; triggerShake(3.5);
    spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 12, WHITE, METALLIC);
    down++;
  }

  if (yardsToGo <= 0 && result !== 'incomplete') {
    down = 1; yardsToGo = 10;
    gameStats.firstDowns++;
    resultSubMsg = 'FIRST DOWN';
    sfxFirstDown(); sfxCrowd();
    showCommentary(COMMENTARY_FIRSTDOWN);
    addStylePoints(10, 'first_down');
    store.coins += 5; store.totalCoins += 5; saveStore();
  }

  if (down > 4) {
    playsRun++; playsThisQuarter++;
    gameStats.turnovers++; gameStats.drives++;
    gameStats.driveResults.push('turnover');
    gameState = 'turnover'; resultMsg = 'TURNOVER ON DOWNS'; resultSubMsg = '';
    resultTimer = 0; sfxTurnover(); triggerShake(5);
    drivePlays = 0; driveYards = 0;
    return;
  }

  playsRun++; playsThisQuarter++;
  gameState = 'result'; resultTimer = 0;
}

// --- Passing ---
function throwBall(targetIdx) {
  if (passThrown) return;
  passThrown = true; passTarget = targetIdx;
  ball.visible = true; ball.x = ballCarrier.x; ball.y = ballCarrier.y; ball.airTime = 0;

  const target = offensePlayers[targetIdx];
  const leadY = target.y - 5.5;
  const leadX = target.x + (target.vx || 0) * 9;
  const dist = Math.hypot(leadX - ball.x, leadY - ball.y);
  const ballSpeed = 46;
  ball.dx = ((leadX - ball.x) / dist) * ballSpeed;
  ball.dy = ((leadY - ball.y) / dist) * ballSpeed;
  // Wind affects the ball
  if (gameWeather === 'wind') {
    ball.dx += windDirection * 6;
  }
  // Rain makes the ball slightly less accurate
  if (gameWeather === 'rain') {
    ball.dx += (Math.random() - 0.5) * 4;
    ball.dy += (Math.random() - 0.5) * 2;
  }
  sfxCatch();
  showCommentary(COMMENTARY_PASS_THROWN);
}

function findBestReceiver() {
  const receivers = playType === 'pass-screen' ? [6, 7, 8, 9, 10] : [7, 8, 9, 10];
  let bestIdx = receivers[0], bestScore = -Infinity;
  receivers.forEach(function(idx) {
    const r = offensePlayers[idx];
    let nearestDef = Infinity;
    defensePlayers.forEach(function(d) {
      nearestDef = Math.min(nearestDef, Math.hypot(d.x - r.x, d.y - r.y));
    });
    const downfieldBonus = yardLineToFieldY(lineOfScrimmage) - r.y;
    const sc = downfieldBonus * 2 + nearestDef * 3.5;
    if (sc > bestScore) { bestScore = sc; bestIdx = idx; }
  });
  return bestIdx;
}

// --- Tackle Check ---
function checkTackle() {
  if (!ballCarrier || tackled) return;
  if (playTimer < 0.7) return;

  const diff = getDiff();
  const brokenTackleChance = DIFF_BROKEN_TACKLE[diff];
  const onFireBonus = onFire ? 0.15 : 0;

  defensePlayers.forEach(function(d) {
    if (tackled || d.juked > 0 || d.knockdown > 0) return;
    const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
    if (dist < 2.0) {
      // Turbo break tackle
      if (input.turbo && turboMeter > 10 && Math.random() < brokenTackleChance + onFireBonus) {
        d.juked = 20;
        d.knockdown = 0.5;
        sfxSpin();
        showCommentary(COMMENTARY_JUKE);
        addStylePoints(15, 'broken_tackle');
        return;
      }
      // Base break tackle
      if (Math.random() < 0.12 + onFireBonus) {
        d.juked = 14;
        return;
      }
      tackled = true;
      vibrate(30);

      // Big hit detection (NFL Blitz style)
      const hitForce = d.speed + (d.role === 'lb' || d.role === 'safety' ? 0.5 : 0);
      if (hitForce > 2.2 || (input.turbo && Math.random() < 0.3)) {
        sfxBigHit();
        hitStop = 0.2;
        triggerShake(8);
        vibrate(60);
        spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 22, WHITE, GOLD_BRIGHT);
        addStylePoints(5, 'big_hit_taken');

        // Fumble chance on big hits (weather increases chance)
        const fumbleChance = gameWeather === 'rain' ? 0.14 : (gameWeather === 'snow' ? 0.10 : 0.06);
        if (Math.random() < fumbleChance && playTimer > 1.0) {
          // Fumble! 50/50 recovery
          if (Math.random() < 0.5) {
            // Offense recovers
            sfxFumble();
            showCommentary(COMMENTARY_FUMBLE);
            triggerFlash(DANGER_RED, 0.3);
            vibrate(100);
            showNotification('FUMBLE - Bengals recover!', ORANGE);
            // Still end play as tackle
          } else {
            // Defense recovers - turnover!
            sfxFumble();
            showCommentary(COMMENTARY_FUMBLE);
            triggerFlash(DANGER_RED, 0.5);
            triggerShake(10);
            vibrate(150);
            spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 30, DANGER_RED, ORANGE);
            score.cpu += 7;
            gameStats.turnovers++; gameStats.drives++;
            gameStats.driveResults.push('fumble');
            playsRun++; playsThisQuarter++;
            gameState = 'turnover'; resultMsg = 'FUMBLE LOST!'; resultSubMsg = '';
            resultTimer = 0;
            styleCombo = 0;
            drivePlays = 0; driveYards = 0;
            return;
          }
        }
      } else {
        sfxHit();
        hitStop = 0.12;
        triggerShake(4.5);
        spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 14, WHITE, METALLIC);
      }
      setTimeout(function() { endPlay('tackled'); }, 350);
    }
  });
}

// --- O-Line Blocking ---
function updateOLine(dt) {
  for (let i = 0; i < 5; i++) {
    const lineman = offensePlayers[i];
    let nearDef = null, nearDist = 13;
    defensePlayers.forEach(function(d) {
      const dist = Math.hypot(d.x - lineman.x, d.y - lineman.y);
      if (dist < nearDist) { nearDist = dist; nearDef = d; }
    });
    if (nearDef) {
      const angle = Math.atan2(nearDef.y - lineman.y, nearDef.x - lineman.x);
      lineman.x += Math.cos(angle) * 1.4 * dt;
      lineman.y += Math.sin(angle) * 1.4 * dt;
      if (nearDist < 2.5) {
        nearDef.x += Math.cos(angle) * 1.0 * dt;
        nearDef.y += Math.sin(angle) * 1.0 * dt;
      }
    } else if (ballCarrier) {
      lineman.y += (ballCarrier.y - 3 - lineman.y) * 0.03;
    }
  }
}

// --- Ball Carrier Movement (shared) ---
function moveBallCarrier(dt, isPassRush) {
  if (!ballCarrier || tackled) return;

  const fireBoost = onFire ? 1.15 : 1.0;
  const stamina = getStaminaFactor();
  const weatherPenalty = (gameWeather === 'rain' || gameWeather === 'snow') ? 0.95 : 1.0;
  const turboActive = input.turbo && turboMeter > 0;
  const speed = ballCarrier.speed * (turboActive ? TURBO_SPEED_MULT : 1.0) * fireBoost * stamina * weatherPenalty;

  let dx = 0, dy = 0;
  if (input.up) dy = -speed * dt;
  if (input.down) dy = speed * dt * 0.5;
  if (input.left) dx = -speed * dt * 0.85;
  if (input.right) dx = speed * dt * 0.85;

  if (isPassRush) {
    // Slower QB movement pre-throw
    dx *= 0.7; dy *= 0.7;
  }

  ballCarrier.x += dx; ballCarrier.y += dy;
  ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));
  ballCarrier.y = Math.max(0, Math.min(TOTAL_YARDS, ballCarrier.y));

  // Particle trails
  if (turboActive && Math.random() < 0.4) {
    if (store.unlockedItems.indexOf('speed_skin') >= 0) {
      spawnEmber(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y));
    }
    if (store.unlockedItems.indexOf('blitz_skin') >= 0 && Math.random() < 0.3) {
      spawnSparks(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y), 2, CYAN, WHITE);
    }
  }
  if (onFire && Math.random() < 0.6) {
    spawnFireAura(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y));
  }

  // Spin/Juke move OR Stiff Arm (turbo + spin = stiff arm)
  if (input.spin && spinCooldown <= 0) {
    if (turboActive && stiffArmCooldown <= 0) {
      // STIFF ARM — pushes defenders away harder, no spin animation
      stiffArmCooldown = 1.5;
      sfxStiffArm(); showCommentary(COMMENTARY_STIFFARM);
      vibrate(40);
      addStylePoints(15, 'stiff_arm');
      gameStats.spinsUsed++;
      defensePlayers.forEach(function(d) {
        const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
        if (dist < 7) {
          d.juked = 32;
          d.knockdown = 0.4;
          // Push defender away
          const angle = Math.atan2(d.y - ballCarrier.y, d.x - ballCarrier.x);
          d.x += Math.cos(angle) * 4;
          d.y += Math.sin(angle) * 4;
          spawnSparks(fieldToScreenX(d.x), fieldToScreenY(d.y), 6, WHITE, ORANGE);
        }
      });
      triggerShake(3);
    } else {
      // Regular juke/spin
      spinCooldown = 1.0;
      gameStats.spinsUsed++;
      sfxSpin(); showCommentary(COMMENTARY_JUKE);
      ballCarrier.spinAnim = 1.0;
      addStylePoints(10, 'juke');
      defensePlayers.forEach(function(d) {
        if (Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y) < 6) d.juked = 26;
      });
      if (input.left) ballCarrier.x -= 3.5;
      else if (input.right) ballCarrier.x += 3.5;
      else ballCarrier.x += (Math.random() > 0.5 ? 3.0 : -3.0);
      ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));
    }
  }
  if (spinCooldown > 0) spinCooldown -= dt;
  if (stiffArmCooldown > 0) stiffArmCooldown -= dt;
}

// --- Update: Run Play ---
function updateRunPlay(dt) {
  if (!ballCarrier || tackled) return;
  playTimer += dt;

  // Auto-advance direction if no input — faster and lasts longer so RB feels responsive
  if (!input.up && !input.down && !input.left && !input.right && playTimer < 1.2) {
    const autoSpeed = ballCarrier.speed * (playTimer < 0.4 ? 0.65 : 0.45);
    if (playType === 'run-left') { ballCarrier.x -= autoSpeed * dt * 0.7; ballCarrier.y -= autoSpeed * dt * 0.5; }
    else if (playType === 'run-right') { ballCarrier.x += autoSpeed * dt * 0.7; ballCarrier.y -= autoSpeed * dt * 0.5; }
    else if (playType === 'run-qb') { ballCarrier.y -= autoSpeed * dt * 0.6; }
    else { ballCarrier.y -= autoSpeed * dt * 0.55; }
  }

  if (playTimer > 0.5 && playTimer < 0.55) showCommentary(COMMENTARY_RUN);

  moveBallCarrier(dt, false);
  updateOLine(dt);
  updateDefense(dt);
  checkTackle();
  if (fieldYToYardLine(ballCarrier.y) >= 100) endPlay('td');
}

// --- Update: Trick Play ---
function updateTrickPlay(dt) {
  if (tackled) return;
  playTimer += dt;

  if (playType === 'trick-flea') {
    if (trickPhase === 1) {
      // RB runs forward briefly then pitches back
      ballCarrier.y -= 2.0 * dt;
      if (playTimer > 0.6) {
        trickPhase = 2;
        ballCarrier = offensePlayers[5]; // QB gets it back
        addStylePoints(15, 'flea_flicker');
      }
      updateOLine(dt);
      updateDefense(dt);
    } else {
      // Now it's a deep pass play
      if (!passThrown) {
        moveBallCarrier(dt, true);
        runReceiverRoutes(dt);
        updatePassCoverage(dt);
        if (input.spin) throwBall(findBestReceiver());
        if (playTimer > DIFF_SACK_TIMER[getDiff()] + 0.5) checkTackle();
        updateOLine(dt);
      } else {
        updatePassInAir(dt);
      }
    }
  } else if (playType === 'trick-reverse') {
    if (trickPhase === 1) {
      // RB runs toward WR1
      const wr1 = offensePlayers[7];
      ballCarrier.x += (wr1.x - ballCarrier.x) * 0.04;
      ballCarrier.y -= 1.5 * dt;
      wr1.x += 2.0 * dt;
      wr1.y -= 0.5 * dt;
      if (playTimer > 0.7 || Math.hypot(wr1.x - ballCarrier.x, wr1.y - ballCarrier.y) < 4) {
        trickPhase = 2;
        ballCarrier = wr1;
        addStylePoints(15, 'reverse');
      }
      updateOLine(dt);
      updateDefense(dt);
    } else {
      // WR1 runs with ball
      moveBallCarrier(dt, false);
      updateOLine(dt);
      updateDefense(dt);
      checkTackle();
      if (fieldYToYardLine(ballCarrier.y) >= 100) endPlay('td');
    }
  }
}

// --- Update: Pass Play ---
function updatePassPlay(dt) {
  if (tackled) return;
  playTimer += dt;

  if (!passThrown) {
    moveBallCarrier(dt, true);
    runReceiverRoutes(dt);
    updatePassCoverage(dt);
    if (input.spin) throwBall(findBestReceiver());
    if (playTimer > DIFF_SACK_TIMER[getDiff()]) checkTackle();
    updateOLine(dt);
  } else {
    updatePassInAir(dt);
  }
}

function updatePassInAir(dt) {
  ball.x += ball.dx * dt;
  ball.y += ball.dy * dt;
  ball.airTime += dt;

  const target = offensePlayers[passTarget];
  const distToTarget = Math.hypot(ball.x - target.x, ball.y - target.y);

  if (distToTarget < 3.0) {
    ball.visible = false;
    sfxCatch(); showCommentary(COMMENTARY_CATCH);
    gameStats.completions++;
    ballCarrier = target;
    receiverControlled = true;
    spawnSparks(fieldToScreenX(target.x), fieldToScreenY(target.y), 8, ORANGE, WHITE);
    addStylePoints(8, 'completion');
  }

  if (ball.y < -10 || ball.y > TOTAL_YARDS + 10 || ball.x < -10 || ball.x > FIELD_WIDTH + 10) {
    ball.visible = false; endPlay('incomplete'); return;
  }
  if (ball.airTime > 2.5 && ball.visible) {
    ball.visible = false; endPlay('incomplete'); return;
  }

  // Interception check
  const diff = getDiff();
  if (ball.visible) {
    defensePlayers.forEach(function(d) {
      if (!ball.visible) return;
      const distBall = Math.hypot(d.x - ball.x, d.y - ball.y);
      if (distBall < 2.0 && Math.random() < DIFF_INT_CHANCE[diff]) {
        ball.visible = false; tackled = true;
        score.cpu += 7;
        gameStats.turnovers++; gameStats.drives++;
        gameStats.driveResults.push('turnover');
        playsRun++; playsThisQuarter++;
        gameState = 'turnover'; resultMsg = 'INTERCEPTED'; resultSubMsg = '';
        resultTimer = 0; sfxTurnover();
        showCommentary(COMMENTARY_INTERCEPTION);
        triggerFlash('#ff0000', 0.35); triggerShake(7);
        spawnSparks(fieldToScreenX(ball.x), fieldToScreenY(ball.y), 18, '#ff3333', WHITE);
        styleCombo = 0; // Reset combo on turnover
        drivePlays = 0; driveYards = 0;
      }
    });
  }

  if (receiverControlled && !tackled) {
    moveBallCarrier(dt, false);
    updateDefense(dt);
    checkTackle();
    if (fieldYToYardLine(ballCarrier.y) >= 100) endPlay('td');
  }

  if (!receiverControlled && ball.visible) {
    runReceiverRoutes(dt);
    defensePlayers.forEach(function(d) {
      if (d.juked > 0) { d.juked--; return; }
      if (d.role === 'cb' || d.role === 'safety') {
        const angle = Math.atan2(ball.y - d.y, ball.x - d.x);
        d.x += Math.cos(angle) * d.speed * 0.88 * dt;
        d.y += Math.sin(angle) * d.speed * 0.88 * dt;
      }
    });
  }
}

// --- CPU Drive ---
function simulateCPUDrive() {
  const diff = getDiff();
  const roll = Math.random();
  if (roll < DIFF_CPU_TD_CHANCE[diff]) {
    score.cpu += 7;
    resultMsg = 'CPU TOUCHDOWN';
    resultSubMsg = 'Defense couldn\'t hold';
  } else if (roll < DIFF_CPU_TD_CHANCE[diff] + DIFF_CPU_FG_CHANCE[diff]) {
    score.cpu += 3;
    resultMsg = 'CPU FIELD GOAL';
    resultSubMsg = '';
  } else {
    resultMsg = 'DEFENSE HOLDS';
    resultSubMsg = 'Your ball';
  }
}

function checkQuarterEnd() {
  if (playsThisQuarter >= PLAYS_PER_QUARTER) {
    playsThisQuarter = 0;
    if (quarter === 2) {
      gameState = 'halftime'; stateTimer = 0; return true;
    } else if (quarter >= 4) {
      gameState = 'gameOver'; stateTimer = 0;
      sfxGameOver();
      store.totalGames++;
      store.totalYards += gameStats.totalYards;
      if (gameStats.longestPlay > store.longestPlay) store.longestPlay = gameStats.longestPlay;
      if (score.bengals > store.bestScore) store.bestScore = score.bengals;
      gameStats.stylePointsEarned = stylePoints;
      if (stylePoints > store.bestStylePoints) store.bestStylePoints = stylePoints;
      store.totalStylePoints += stylePoints;
      let gameCoins = 25;
      if (score.bengals > score.cpu) gameCoins += 40;
      gameCoins += Math.floor(stylePoints / 10);
      store.coins += gameCoins; store.totalCoins += gameCoins;
      // Season mode tracking
      if (store.seasonActive && store.seasonWeek < 16) {
        advanceSeason(score.bengals > score.cpu);
      } else if (store.seasonActive && store.playoffRound > 0) {
        if (score.bengals > score.cpu) {
          store.playoffRound++;
          if (store.playoffRound > 3) {
            // Won the championship
            store.coins += 500;
            store.totalCoins += 500;
          }
        } else {
          store.playoffRound = 0;
          store.seasonActive = false;
        }
      }
      saveStore();
      analyticsEvent('game_complete', {
        score: score.bengals + '-' + score.cpu,
        win: score.bengals > score.cpu,
        totalYards: gameStats.totalYards,
        tds: gameStats.touchdowns,
        style: stylePoints
      });
      return true;
    }
    quarter++;
  }
  return false;
}

function updateCamera() {
  if (!ballCarrier) return;
  const targetCam = ballCarrier.y - (H / pixelsPerYard) * 0.45;
  camTargetY = Math.max(-5, Math.min(TOTAL_YARDS - H / pixelsPerYard + 5, targetCam));
  camY += (camTargetY - camY) * 0.09;
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function drawTigerStripes(x, y, w, h, alpha, spacing) {
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.strokeStyle = 'rgba(251,79,20,' + (alpha || 0.04) + ')';
  ctx.lineWidth = Math.max(8, w * 0.03);
  const sp = spacing || 55;
  for (let s = -w; s < w * 2; s += sp) {
    ctx.beginPath(); ctx.moveTo(x + s, y); ctx.lineTo(x + s + h * 0.45, y + h); ctx.stroke();
  }
  ctx.restore();
}

function drawField() {
  pixelsPerYard = H / (TOTAL_YARDS * 0.55);

  let fieldMain = FIELD_GREEN, fieldAlt = FIELD_DARK;
  if (store.equippedField === 'night_field') { fieldMain = '#124B16'; fieldAlt = '#0E3D12'; }
  else if (store.equippedField === 'snow_field') { fieldMain = '#4A7A4E'; fieldAlt = '#3E6E42'; }
  else if (store.equippedField === 'prime_field') { fieldMain = '#1A5E22'; fieldAlt = '#14521C'; }
  else if (store.equippedField === 'fire_field') { fieldMain = '#1A4A1E'; fieldAlt = '#143E18'; }

  ctx.fillStyle = '#0B320E';
  ctx.fillRect(0, 0, W, H);

  for (let yd = 0; yd <= 100; yd += 5) {
    const y1 = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    const y2 = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd - 5));
    if (y2 < -50 || y1 > H + 50) continue;
    ctx.fillStyle = (Math.floor(yd / 5) % 2 === 0) ? fieldMain : fieldAlt;
    ctx.fillRect(0, Math.min(y1, y2), W, Math.abs(y2 - y1));
  }

  if (store.equippedField === 'snow_field') {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137 + Date.now() / 35) % W);
      const sy = ((i * 89 + Date.now() / 22) % H);
      ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Weather visual effects (game weather, independent of equipped field)
  if (gameWeather === 'rain') {
    ctx.strokeStyle = 'rgba(150,180,255,0.25)';
    ctx.lineWidth = 1;
    for (let i = 0; i < weatherParticles.length; i++) {
      const wp = weatherParticles[i];
      wp.x += wp.drift + windDirection * 2;
      wp.y += wp.speed;
      if (wp.y > H) { wp.y = -5; wp.x = Math.random() * W; }
      if (wp.x > W) wp.x = 0;
      if (wp.x < 0) wp.x = W;
      ctx.beginPath();
      ctx.moveTo(wp.x, wp.y);
      ctx.lineTo(wp.x + windDirection * 2, wp.y + wp.speed * 3);
      ctx.stroke();
    }
  } else if (gameWeather === 'snow') {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < weatherParticles.length; i++) {
      const wp = weatherParticles[i];
      wp.x += wp.drift + Math.sin(Date.now() / 1000 + i) * 0.3;
      wp.y += wp.speed;
      if (wp.y > H) { wp.y = -5; wp.x = Math.random() * W; }
      if (wp.x > W) wp.x = 0;
      if (wp.x < 0) wp.x = W;
      ctx.beginPath();
      ctx.arc(wp.x, wp.y, wp.size, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (gameWeather === 'fog') {
    const fogGrad = ctx.createLinearGradient(0, 0, 0, H);
    fogGrad.addColorStop(0, 'rgba(180,180,180,0.15)');
    fogGrad.addColorStop(0.5, 'rgba(180,180,180,0.08)');
    fogGrad.addColorStop(1, 'rgba(180,180,180,0.12)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, 0, W, H);
  }

  if (store.equippedField === 'prime_field') {
    const spotGrad = ctx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, W * 0.6);
    spotGrad.addColorStop(0, 'rgba(255,255,200,0.04)');
    spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotGrad; ctx.fillRect(0, 0, W, H);
  }

  if (store.equippedField === 'fire_field') {
    // Furnace glow from endzones
    const fireGrad = ctx.createLinearGradient(0, fieldToScreenY(0), 0, fieldToScreenY(ENDZONE_YARDS));
    fireGrad.addColorStop(0, 'rgba(255,40,0,0.08)');
    fireGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fireGrad; ctx.fillRect(0, fieldToScreenY(0), W, fieldToScreenY(ENDZONE_YARDS) - fieldToScreenY(0));
  }

  // Opponent endzone
  const ezTop = fieldToScreenY(0), ezBottom = fieldToScreenY(ENDZONE_YARDS);
  if (ezBottom > -50 && ezTop < H + 50) {
    ctx.fillStyle = ENDZONE_ORANGE;
    ctx.fillRect(0, ezTop, W, ezBottom - ezTop);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, ezTop, W, ezBottom - ezTop); ctx.clip();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = Math.max(6, pixelsPerYard * 1.3);
    for (let s = -W; s < W * 2; s += 26) {
      ctx.beginPath(); ctx.moveTo(s, ezTop); ctx.lineTo(s + 40, ezBottom); ctx.stroke();
    }
    ctx.restore();
    ctx.save();
    ctx.font = '700 ' + Math.max(12, pixelsPerYard * 3.2) + 'px ' + FONT_UI;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('B E N G A L S', W / 2, (ezTop + ezBottom) / 2);
    ctx.restore();
  }

  // CPU endzone
  const ownTop = fieldToScreenY(ENDZONE_YARDS + FIELD_YARDS);
  const ownBottom = fieldToScreenY(TOTAL_YARDS);
  if (ownBottom > -50 && ownTop < H + 50) {
    const cpuC = getCPUColors();
    ctx.fillStyle = cpuC.main;
    ctx.fillRect(0, ownTop, W, ownBottom - ownTop);
    ctx.save();
    ctx.font = '700 ' + Math.max(12, pixelsPerYard * 3.2) + 'px ' + FONT_UI;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText(currentOpponent ? currentOpponent.abbr : 'C P U', W / 2, (ownTop + ownBottom) / 2);
    ctx.restore();
  }

  // Sidelines
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(fieldToScreenX(0), 0); ctx.lineTo(fieldToScreenX(0), H);
  ctx.moveTo(fieldToScreenX(FIELD_WIDTH), 0); ctx.lineTo(fieldToScreenX(FIELD_WIDTH), H);
  ctx.stroke();

  // Yard lines and numbers
  ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 1;
  for (let yd = 0; yd <= 100; yd += 5) {
    const y = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    if (y < -20 || y > H + 20) continue;
    ctx.beginPath();
    ctx.moveTo(fieldToScreenX(1), y); ctx.lineTo(fieldToScreenX(FIELD_WIDTH - 1), y);
    ctx.stroke();
    if (yd > 0 && yd < 100 && yd % 10 === 0) {
      const label = yd <= 50 ? yd : 100 - yd;
      ctx.font = '700 ' + Math.max(8, pixelsPerYard * 1.5) + 'px ' + FONT_UI;
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, fieldToScreenX(5), y);
      ctx.fillText(label, fieldToScreenX(FIELD_WIDTH - 5), y);
    }
  }

  // Hash marks
  for (let yd = 0; yd <= 100; yd++) {
    const y = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    if (y < -5 || y > H + 5) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(fieldToScreenX(FIELD_WIDTH / 3), y - 0.5, 3, 1);
    ctx.fillRect(fieldToScreenX(FIELD_WIDTH * 2 / 3), y - 0.5, 3, 1);
  }

  // LOS
  const losY = fieldToScreenY(yardLineToFieldY(lineOfScrimmage));
  ctx.strokeStyle = 'rgba(46,134,222,0.55)'; ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(0, losY); ctx.lineTo(W, losY); ctx.stroke();
  ctx.setLineDash([]);

  // First down line
  const fdY = fieldToScreenY(yardLineToFieldY(Math.min(100, lineOfScrimmage + yardsToGo)));
  ctx.strokeStyle = 'rgba(232,197,38,0.55)'; ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, fdY); ctx.lineTo(W, fdY); ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlayer(p, isBallCarrier) {
  const sx = fieldToScreenX(p.x);
  const sy = fieldToScreenY(p.y);
  const r = Math.max(9, pixelsPerYard * 1.35);
  if (sy < -30 || sy > H + 30) return;

  ctx.save();

  // Knockdown animation
  if (p.knockdown > 0) {
    ctx.globalAlpha = 0.5;
    ctx.translate(sx, sy);
    ctx.rotate(Math.PI * 0.3 * p.knockdown);
    ctx.translate(-sx, -sy);
  }

  if (p.spinAnim > 0) {
    ctx.translate(sx, sy);
    ctx.rotate(p.spinAnim * Math.PI * 4);
    ctx.translate(-sx, -sy);
    p.spinAnim -= 0.05;
    if (p.spinAnim < 0) p.spinAnim = 0;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(sx + 1, sy + 2.5, r * 0.9, r * 0.4, 0, 0, Math.PI * 2); ctx.fill();

  const sw = r * (p.shoulderW || 0.95);
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.outline;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(sx, sy, sw, r, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Helmet
  const helmR = r * (p.helmet || 0.45);
  ctx.fillStyle = p.team === 'off' ? p.outline : (currentOpponent ? currentOpponent.color : CPU_NAVY);
  ctx.beginPath(); ctx.arc(sx, sy - r * 0.65, helmR, Math.PI, 0); ctx.fill();

  // Facemask
  ctx.strokeStyle = 'rgba(200,200,200,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx - helmR * 0.4, sy - r * 0.55); ctx.lineTo(sx + helmR * 0.4, sy - r * 0.55); ctx.stroke();

  // Tiger stripe on Bengals helmet
  if (p.team === 'off') {
    ctx.strokeStyle = 'rgba(251,79,20,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, sy - r * 0.65 - helmR); ctx.lineTo(sx, sy - r * 0.55); ctx.stroke();
  }

  // Ball carrier indicator
  if (isBallCarrier) {
    const pulse = Math.sin(Date.now() / 100) * 0.2 + 0.8;
    const ringColor = onFire ? FIRE_ORANGE : GOLD;
    ctx.shadowColor = ringColor; ctx.shadowBlur = onFire ? 12 : 6;
    ctx.strokeStyle = onFire ? ('rgba(255,136,0,' + pulse + ')') : ('rgba(200,168,78,' + pulse + ')');
    ctx.lineWidth = onFire ? 3.5 : 2.5;
    ctx.beginPath(); ctx.arc(sx, sy, r + 3.5, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Juked indicator
  if (p.juked > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let d = 0; d < 3; d++) {
      const dotAngle = (d / 3) * Math.PI * 2 + Date.now() / 180;
      ctx.beginPath();
      ctx.arc(sx + Math.cos(dotAngle) * (r + 4), sy - r - 4 + Math.sin(dotAngle) * 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Jersey number
  ctx.fillStyle = p.team === 'off' ? (p.color === '#F0F0F0' || p.color === METALLIC ? '#000' : WHITE) : '#ccc';
  ctx.font = '700 ' + Math.max(6, r * 0.7) + 'px ' + FONT_UI;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.num, sx, sy + 1);

  // Receiver target indicator
  if (gameState === 'playing' && playType && (playType.indexOf('pass') === 0 || playType === 'trick-flea') && !passThrown &&
      (p.role === 'wr' || p.role === 'te' || (playType === 'pass-screen' && p.role === 'rb'))) {
    const tp = Math.sin(Date.now() / 180) * 0.2 + 0.5;
    ctx.strokeStyle = 'rgba(232,197,38,' + tp + ')';
    ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.arc(sx, sy, r + 9, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawBall() {
  if (!ball.visible) return;
  const sx = fieldToScreenX(ball.x), sy = fieldToScreenY(ball.y);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(sx + 2, sy + 4, 5, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  const angle = Math.atan2(ball.dy, ball.dx);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(angle);
  const spiralPhase = (Date.now() / 40) % (Math.PI * 2);
  ctx.scale(1, 0.85 + Math.sin(spiralPhase) * 0.15);
  ctx.fillStyle = '#5A2D0C';
  ctx.beginPath(); ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(3, 0); ctx.stroke();
  for (let l = -2; l <= 2; l++) {
    ctx.beginPath(); ctx.moveTo(l * 1.3, -1.2); ctx.lineTo(l * 1.3, 1.2); ctx.stroke();
  }
  ctx.restore();
}

function drawHUD() {
  const hudH = 50;
  ctx.fillStyle = 'rgba(5,5,5,0.94)';
  ctx.fillRect(0, 0, W, hudH);

  const grad = ctx.createLinearGradient(0, hudH - 2, W, hudH - 2);
  grad.addColorStop(0, 'rgba(251,79,20,0)');
  grad.addColorStop(0.2, ORANGE_DIM);
  grad.addColorStop(0.8, ORANGE_DIM);
  grad.addColorStop(1, 'rgba(251,79,20,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, hudH - 2, W, 2);

  // Score
  ctx.font = '700 14px ' + FONT_UI;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillStyle = ORANGE;
  ctx.fillText('CIN', 10, hudH / 2 - 10);
  ctx.font = '700 18px ' + FONT_UI;
  ctx.fillStyle = WHITE;
  ctx.fillText('' + score.bengals, 44, hudH / 2 - 10);

  ctx.font = '600 12px ' + FONT_UI;
  ctx.fillStyle = currentOpponent ? currentOpponent.color2 : CPU_SILVER;
  ctx.fillText(currentOpponent ? currentOpponent.abbr : 'CPU', 10, hudH / 2 + 10);
  ctx.font = '700 15px ' + FONT_UI;
  ctx.fillStyle = METALLIC;
  ctx.fillText('' + score.cpu, 44, hudH / 2 + 10);

  // Down & distance
  const ordinals = ['1st', '2nd', '3rd', '4th'];
  ctx.font = '700 13px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.fillStyle = down >= 3 ? FIRST_DOWN_YELLOW : WHITE;
  ctx.fillText(ordinals[Math.min(down - 1, 3)] + ' & ' + yardsToGo, W / 2, hudH / 2 - 8);

  const posStr = ballOn > 50 ? 'OPP ' + (100 - ballOn) : 'OWN ' + ballOn;
  ctx.font = '500 10px ' + FONT_UI;
  ctx.fillStyle = METALLIC;
  ctx.fillText(posStr, W / 2, hudH / 2 + 9);

  // Quarter + difficulty
  ctx.textAlign = 'right';
  ctx.font = '700 13px ' + FONT_UI;
  ctx.fillStyle = WHITE;
  ctx.fillText('Q' + quarter, W - 10, hudH / 2 - 8);

  ctx.font = '500 10px ' + FONT_UI;
  ctx.fillStyle = DIFF_COLORS[getDiff()];
  ctx.fillText(DIFF_NAMES[getDiff()], W - 10, hudH / 2 + 9);

  // Weather indicator
  if (gameWeather !== 'clear') {
    const weatherIcons = { rain: 'RAIN', snow: 'SNOW', wind: 'WIND', fog: 'FOG' };
    const weatherColors = { rain: '#6699CC', snow: '#CCDDEE', wind: '#88AACC', fog: '#999999' };
    ctx.font = '500 8px ' + FONT_UI;
    ctx.textAlign = 'right';
    ctx.fillStyle = weatherColors[gameWeather] || METALLIC;
    ctx.fillText(weatherIcons[gameWeather] || '', W - 10, hudH / 2 + 20);
  }

  // Blitz warning
  if (defenseBlitzing && (gameState === 'playing' || gameState === 'snap') && playTimer < 1.5) {
    const blitzFlash = Math.sin(Date.now() / 100) * 0.3 + 0.7;
    ctx.font = '700 10px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(224,48,48,' + blitzFlash + ')';
    ctx.fillText('BLITZ!', W / 2, hudH + 20);
  }

  // Turbo meter bar (below HUD)
  const tmW = Math.min(120, W * 0.28);
  const tmX = W / 2 - tmW / 2;
  const tmY = hudH + 4;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, tmX - 2, tmY - 1, tmW + 4, 8, 3); ctx.fill();
  const fill = (turboMeter / 100) * tmW;
  const turboColor = turboMeter > 30 ? CYAN : DANGER_RED;
  ctx.fillStyle = turboColor;
  if (fill > 0) { roundRect(ctx, tmX, tmY, fill, 6, 2); ctx.fill(); }
  ctx.font = '600 6px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('TURBO', W / 2, tmY + 3);

  // Style points + ON FIRE indicator
  if (stylePoints > 0 || onFire) {
    const spY = tmY + 12;
    ctx.font = '600 9px ' + FONT_UI;
    ctx.textAlign = 'center';
    if (onFire) {
      const fireFlicker = Math.sin(Date.now() / 80) * 0.3 + 0.7;
      ctx.fillStyle = 'rgba(255,32,32,' + fireFlicker + ')';
      ctx.fillText('ON FIRE! ' + stylePoints + ' PTS', W / 2, spY);
    } else {
      ctx.fillStyle = GOLD;
      ctx.fillText('STYLE: ' + stylePoints + '/' + STYLE_THRESHOLD, W / 2, spY);
    }
    // Combo indicator
    if (styleCombo > 1 && styleComboTimer > 0) {
      ctx.font = '700 8px ' + FONT_UI;
      ctx.fillStyle = ORANGE_GLOW;
      ctx.fillText(styleCombo + 'x COMBO', W / 2, spY + 11);
    }
  }
}

function drawControls() {
  if (gameState !== 'playing' && gameState !== 'snap') return;

  const padSize = Math.min(135, W * 0.27);
  const btnSize = padSize * 0.32;
  const padX = 20 + padSize / 2;
  const padY = H - 28 - padSize / 2;
  dpadCenterX = padX; dpadCenterY = padY; dpadRadius = padSize / 2;

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.beginPath(); ctx.arc(padX, padY, padSize / 2 + 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; ctx.stroke();

  const dirs = [
    { key: 'up', ox: 0, oy: -1, label: '\u25B2' },
    { key: 'down', ox: 0, oy: 1, label: '\u25BC' },
    { key: 'left', ox: -1, oy: 0, label: '\u25C0' },
    { key: 'right', ox: 1, oy: 0, label: '\u25B6' }
  ];

  dirs.forEach(function(d) {
    const bx = padX + d.ox * (btnSize + 3);
    const by = padY + d.oy * (btnSize + 3);
    const active = input[d.key];
    ctx.fillStyle = active ? 'rgba(251,79,20,0.5)' : 'rgba(255,255,255,0.06)';
    ctx.strokeStyle = active ? ORANGE : 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, bx - btnSize / 2, by - btnSize / 2, btnSize, btnSize, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = active ? WHITE : 'rgba(255,255,255,0.45)';
    ctx.font = Math.max(12, btnSize * 0.45) + 'px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.label, bx, by);
  });

  // Action buttons
  const abtnR = Math.min(40, W * 0.088);
  const rightMargin = 22;

  btnSpinX = W - rightMargin - abtnR;
  btnSpinY = H - 28 - abtnR * 2 - 16 - abtnR;
  btnSpinR = abtnR;

  const spinActive = input.spin;
  ctx.fillStyle = spinActive ? 'rgba(251,79,20,0.65)' : 'rgba(251,79,20,0.15)';
  ctx.strokeStyle = 'rgba(251,79,20,0.55)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(btnSpinX, btnSpinY, abtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  if (spinActive) {
    ctx.shadowColor = ORANGE; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(btnSpinX, btnSpinY, abtnR, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = WHITE;
  ctx.font = '700 ' + Math.max(9, abtnR * 0.35) + 'px ' + FONT_UI;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const isPassMode = playType && (playType.indexOf('pass') === 0 || (playType === 'trick-flea' && trickPhase >= 2)) && !passThrown;
  const spinLabel = isPassMode ? 'PASS' : (input.turbo && turboMeter > 0 && stiffArmCooldown <= 0 ? 'STIFF' : 'JUKE');
  ctx.fillText(spinLabel, btnSpinX, btnSpinY);

  btnTurboX = W - rightMargin - abtnR;
  btnTurboY = H - 28 - abtnR;
  btnTurboR = abtnR;

  const turboActive = input.turbo;
  const turboAvail = turboMeter > 0;
  ctx.fillStyle = turboActive && turboAvail ? 'rgba(0,229,255,0.65)' : 'rgba(0,229,255,0.12)';
  ctx.strokeStyle = turboAvail ? 'rgba(0,229,255,0.45)' : 'rgba(100,100,100,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(btnTurboX, btnTurboY, abtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  if (turboActive && turboAvail) {
    ctx.shadowColor = CYAN; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(btnTurboX, btnTurboY, abtnR, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = WHITE;
  ctx.fillText('TURBO', btnTurboX, btnTurboY);
}

function drawScreenEffects() {
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlash * 0.4;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

function drawNotification(dt) {
  if (notification.timer <= 0) return;
  notification.timer -= dt;
  const alpha = Math.min(1, notification.timer * 2);
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = DARK_CARD; ctx.strokeStyle = notification.color; ctx.lineWidth = 2;
  const nw = Math.min(280, W * 0.7), nh = 38;
  const nx = W / 2 - nw / 2, ny = H - 82;
  roundRect(ctx, nx, ny, nw, nh, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle = WHITE;
  ctx.font = '600 12px ' + FONT_UI;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(notification.text, W / 2, ny + nh / 2);
  ctx.restore();
}

                       (item.type === 'helmet' && store.equippedHelmet === item.id);

      roundRect(ctx, 10, iy, itemW, itemH, 8); ctx.fill(); ctx.stroke();

      ctx.textAlign = 'left'; ctx.font = '600 12px ' + FONT_UI; ctx.fillStyle = WHITE;
      ctx.fillText(item.name, 20, iy + 20);
      ctx.font = '400 9px ' + FONT_UI; ctx.fillStyle = METALLIC;
      ctx.fillText(item.desc + (item.proOnly ? ' [PRO]' : ''), 20, iy + 38);

      shopButtons.push({ x: 10, y: iy, w: itemW, h: itemH, action: 'item_' + item.id });
    });
  }
}

function getDpadDirection(tx, ty) {
  const dx = tx - dpadCenterX, dy = ty - dpadCenterY;
  const dist = Math.hypot(dx, dy);
  if (dist < dpadRadius * 0.2 || dist > dpadRadius * 1.6) return null;
  const deg = Math.atan2(dy, dx) * 180 / Math.PI;
  const result = { up: false, down: false, left: false, right: false };
  if (deg > -67.5 && deg < 67.5) result.right = true;
  if (deg > 22.5 && deg < 157.5) result.down = true;
  if (deg > 112.5 || deg < -112.5) result.left = true;
  if (deg > -157.5 && deg < -22.5) result.up = true;
  return result;
}

function isInCircle(tx, ty, cx, cy, r) { return Math.hypot(tx - cx, ty - cy) <= r * 1.4; }
function isInRect(tx, ty, rx, ry, rw, rh) { return tx >= rx && tx <= rx + rw && ty >= ry && ty <= ry + rh; }

function handleTouchStart(e) {
  e.preventDefault(); e.stopPropagation();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    const tx = touch.clientX, ty = touch.clientY;

    if (gameState === 'splash') {
      initAudio();
      for (let m = 0; m < menuButtons.length; m++) {
        const mb = menuButtons[m];
        if (isInRect(tx, ty, mb.x, mb.y, mb.w, mb.h)) {
          sfxMenuSelect();
          if (mb.action === 'shop') { gameState = 'shop'; shopButtons = []; return; }
          if (mb.action === 'quickgame') {
            currentOpponent = NFL_TEAMS[Math.floor(Math.random() * NFL_TEAMS.length)];
            dailyBonusData = checkDailyBonus();
            if (dailyBonusData) { gameState = 'dailyBonus'; stateTimer = 0; }
            else newGame();
            return;
          }
          if (mb.action.indexOf('diff_') === 0) {
            store.difficulty = parseInt(mb.action.split('_')[1]);
            saveStore(); return;
          }
        }
      }
      if (isInRect(tx, ty, splashBtnBounds.x, splashBtnBounds.y, splashBtnBounds.w, splashBtnBounds.h)) {
        sfxMenuSelect();
        dailyBonusData = checkDailyBonus();
        if (!store.seasonActive || store.seasonWeek >= 16) {
          generateSeason();
        }
        if (dailyBonusData) { gameState = 'dailyBonus'; stateTimer = 0; }
        else { gameState = 'seasonHub'; menuButtons = []; }
        return;
      }
      return;
    }

    if (gameState === 'dailyBonus') {
      if (store.seasonActive) { gameState = 'seasonHub'; menuButtons = []; }
      else newGame();
      return;
    }

    if (gameState === 'seasonHub') {
      for (let m = 0; m < menuButtons.length; m++) {
        const mb = menuButtons[m];
        if (isInRect(tx, ty, mb.x, mb.y, mb.w, mb.h)) {
          sfxMenuSelect();
          if (mb.action === 'back') { gameState = 'splash'; menuButtons = []; return; }
          if (mb.action === 'play_week') {
            currentOpponent = seasonSchedule[store.seasonWeek];
            newGame(); return;
          }
          if (mb.action === 'playoffs') {
            store.playoffRound = 1;
            currentOpponent = NFL_TEAMS[Math.floor(Math.random() * NFL_TEAMS.length)];
            newGame(); return;
          }
        }
      }
      return;
    }

    if (gameState === 'shop') {
      for (let b = 0; b < shopButtons.length; b++) {
        const btn = shopButtons[b];
        if (isInRect(tx, ty, btn.x, btn.y, btn.w, btn.h)) {
          sfxMenuSelect();
          if (btn.action === 'back') { gameState = 'splash'; return; }
          if (btn.action.indexOf('tab_') === 0) { shopTab = btn.action.replace('tab_', ''); shopButtons = []; return; }
          if (btn.action === 'watch_ad') {
            showRewardedAd(function(watched) {
              if (watched) showNotification('+' + claimAdReward() + ' Coins!', GOLD);
            });
            return;
          }
          if (btn.action === 'propass_7day') { const r = purchaseProPass('7day'); showNotification(r.msg, r.ok ? GOLD : DANGER_RED); return; }
          if (btn.action === 'propass_perm') { const r = purchaseProPass('permanent'); showNotification(r.msg, r.ok ? GOLD : DANGER_RED); return; }
          if (btn.action.indexOf('item_') === 0) {
            const itemId = btn.action.replace('item_', '');
            if (store.unlockedItems.indexOf(itemId) >= 0) {
              equipItem(itemId); showNotification('Equipped!', ORANGE);
            } else {
              const r = purchaseItem(itemId);
              showNotification(r.msg, r.ok ? GOLD : DANGER_RED);
              if (r.ok) equipItem(itemId);
            }
            shopButtons = []; return;
          }
        }
      }
      return;
    }

    if (gameState === 'halftime' && stateTimer > 1.5) {
      quarter = 3; playsThisQuarter = 0; startNewDrive(); return;
    }

    if (gameState === 'gameOver') {
      for (let m = 0; m < menuButtons.length; m++) {
        const mb = menuButtons[m];
        if (isInRect(tx, ty, mb.x, mb.y, mb.w, mb.h)) {
          sfxMenuSelect();
          if (mb.action === 'newgame') { gameState = 'splash'; stateTimer = 0; menuButtons = []; return; }
          if (mb.action === 'season_continue') { gameState = 'seasonHub'; menuButtons = []; return; }
        }
      }
      return;
    }

    if (gameState === 'playSelect') {
      initAudio();
      for (let b = 0; b < playButtons.length; b++) {
        const btn = playButtons[b];
        if (isInRect(tx, ty, btn.x, btn.y, btn.w, btn.h)) {
          sfxMenuSelect(); startPlay(btn.play); return;
        }
      }
      return;
    }

    if (gameState === 'playing' || gameState === 'snap') {
      const ddir = getDpadDirection(tx, ty);
      if (ddir) {
        dpadTouchId = touch.identifier;
        input.up = ddir.up; input.down = ddir.down; input.left = ddir.left; input.right = ddir.right;
        continue;
      }
      if (isInCircle(tx, ty, btnSpinX, btnSpinY, btnSpinR)) {
        spinTouchId = touch.identifier; input.spin = true; continue;
      }
      if (isInCircle(tx, ty, btnTurboX, btnTurboY, btnTurboR)) {
        turboTouchId = touch.identifier; input.turbo = true; continue;
      }
      // Tap on receiver
      if (gameState === 'playing' && playType &&
          (playType.indexOf('pass') === 0 || (playType === 'trick-flea' && trickPhase >= 2)) && !passThrown) {
        const recvIdxs = playType === 'pass-screen' ? [6, 7, 8, 9, 10] : [7, 8, 9, 10];
        let closest = -1, closestDist = 75;
        recvIdxs.forEach(function(idx) {
          const p = offensePlayers[idx];
          const d = Math.hypot(tx - fieldToScreenX(p.x), ty - fieldToScreenY(p.y));
          if (d < closestDist) { closestDist = d; closest = idx; }
        });
        if (closest >= 0) throwBall(closest);
      }
    }

    // Late hit (Blitz style) - tap on screen during result to attempt late hit
    if (gameState === 'result' && lateHitWindow > 0 && lateHitTarget) {
      sfxLateHit();
      triggerShake(6);
      const lsx = fieldToScreenX(lateHitTarget.x);
      const lsy = fieldToScreenY(lateHitTarget.y);
      spawnSparks(lsx, lsy, 20, FIRE_RED, ORANGE);
      showCommentary(COMMENTARY_LATEHIT);
      addStylePoints(25, 'late_hit');
      gameStats.lateHits++;
      lateHitWindow = 0;
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault(); e.stopPropagation();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    if (touch.identifier === dpadTouchId) {
      const ddir = getDpadDirection(touch.clientX, touch.clientY);
      if (ddir) { input.up = ddir.up; input.down = ddir.down; input.left = ddir.left; input.right = ddir.right; }
      else { input.up = false; input.down = false; input.left = false; input.right = false; }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault(); e.stopPropagation();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    if (touch.identifier === dpadTouchId) {
      dpadTouchId = -1; input.up = false; input.down = false; input.left = false; input.right = false;
    }
    if (touch.identifier === spinTouchId) { spinTouchId = -1; input.spin = false; }
    if (touch.identifier === turboTouchId) { turboTouchId = -1; input.turbo = false; }
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// Mouse fallback
let mouseDown = false;
canvas.addEventListener('mousedown', function(e) {
  mouseDown = true;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }], preventDefault: function(){}, stopPropagation: function(){} };
  handleTouchStart(fake);
});
canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }], preventDefault: function(){}, stopPropagation: function(){} };
  handleTouchMove(fake);
});
canvas.addEventListener('mouseup', function(e) {
  mouseDown = false;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }], preventDefault: function(){}, stopPropagation: function(){} };
  handleTouchEnd(fake);
});

// Keyboard
window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = true;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = true;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = true;
  if (e.key === 'z' || e.key === 'Z' || e.key === 'j' || e.key === 'J') input.spin = true;
  if (e.key === 'x' || e.key === 'X' || e.key === 'k' || e.key === 'K') input.turbo = true;
  if (e.key === ' ') {
    if (gameState === 'splash') {
      initAudio();
      currentOpponent = NFL_TEAMS[Math.floor(Math.random() * NFL_TEAMS.length)];
      dailyBonusData = checkDailyBonus();
      if (dailyBonusData) { gameState = 'dailyBonus'; stateTimer = 0; }
      else newGame();
    }
  }
  if (gameState === 'playSelect') {
    const playMap = { '1':'run-left','2':'run-middle','3':'run-right','4':'pass-short','5':'pass-deep',
                      '6':'pass-screen','7':'trick-flea','8':'trick-reverse','9':'run-qb' };
    if (down === 4 && e.key === '0') { initAudio(); sfxMenuSelect(); startPlay('punt'); }
    else if (down === 4 && e.key === '-') { initAudio(); sfxMenuSelect(); startPlay('field-goal'); }
    else if (playMap[e.key]) { initAudio(); sfxMenuSelect(); startPlay(playMap[e.key]); }
  }
  // Late hit on spacebar during result
  if (gameState === 'result' && e.key === ' ' && lateHitWindow > 0 && lateHitTarget) {
    sfxLateHit(); triggerShake(6);
    spawnSparks(fieldToScreenX(lateHitTarget.x), fieldToScreenY(lateHitTarget.y), 20, FIRE_RED, ORANGE);
    showCommentary(COMMENTARY_LATEHIT);
    addStylePoints(25, 'late_hit');
    gameStats.lateHits++;
    lateHitWindow = 0;
  }
});
window.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = false;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = false;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = false;
  if (e.key === 'z' || e.key === 'Z' || e.key === 'j' || e.key === 'J') input.spin = false;
  if (e.key === 'x' || e.key === 'X' || e.key === 'k' || e.key === 'K') input.turbo = false;
});


// =========================================================================
// 19. MAIN GAME LOOP — 60fps locked
// =========================================================================

let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  let dt = Math.min((timestamp - lastTime) / 1000, 0.035);
  lastTime = timestamp;

  // Hit-stop freeze
  if (hitStop > 0) { hitStop -= dt; dt = 0; }

  // Turbo meter management
  if ((gameState === 'playing' || gameState === 'snap') && !tackled) {
    if (input.turbo && turboMeter > 0) {
      turboMeter = Math.max(0, turboMeter - TURBO_DRAIN * dt);
    } else if (!input.turbo) {
      turboMeter = Math.min(100, turboMeter + TURBO_REFILL * dt);
    }
  }

  // Style combo decay
  if (styleComboTimer > 0) {
    styleComboTimer -= dt;
    if (styleComboTimer <= 0) { styleCombo = 0; }
  }

  // ON FIRE timer
  if (onFire) {
    onFireTimer -= dt;
    if (onFireTimer <= 0) { onFire = false; }
  }

  // Late hit window decay
  if (lateHitWindow > 0) lateHitWindow -= dt;

  ctx.fillStyle = BLACK; ctx.fillRect(0, 0, W, H);

  switch (gameState) {
    case 'splash': drawSplash(); break;
    case 'dailyBonus': drawDailyBonus(dt); break;
    case 'shop': drawShop(); break;
    case 'seasonHub': drawSeasonHub(); break;

    case 'playSelect':
      updateCamera(); drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, false); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawPlaySelect();
      break;

    case 'snap':
      stateTimer += dt;
      updateCamera(); drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawHUD(); drawControls();
      ctx.font = '400 ' + Math.min(26, W * 0.06) + 'px ' + (fontsLoaded ? FONT_TITLE : '"Arial Black"');
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
      ctx.fillStyle = GOLD_BRIGHT;
      ctx.fillText('HIKE', W / 2, H * 0.38);
      ctx.shadowBlur = 0;
      // Show weather on first snap of game
      if (playsRun === 0 && gameWeather !== 'clear') {
        ctx.font = '500 10px ' + FONT_UI;
        const weatherColors = { rain: '#6699CC', snow: '#CCDDEE', wind: '#88AACC', fog: '#999999' };
        ctx.fillStyle = weatherColors[gameWeather] || METALLIC;
        const weatherLabels = { rain: 'RAINY CONDITIONS', snow: 'SNOW GAME!', wind: 'WINDY CONDITIONS', fog: 'FOGGY CONDITIONS' };
        ctx.fillText(weatherLabels[gameWeather], W / 2, H * 0.48);
      }
      drawCommentary(dt);
      if (stateTimer > 0.35) transitionToPlaying();
      break;

    case 'playing':
      if (playType && playType.indexOf('trick') === 0) {
        updateTrickPlay(dt);
      } else if (playType && (playType.indexOf('run') === 0 || playType === 'run-qb')) {
        updateRunPlay(dt);
      } else if (playType && playType.indexOf('pass') === 0) {
        updatePassPlay(dt);
      }
      updateCamera(); drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawBall();
      updateParticles(dt); drawParticles(); drawScreenEffects();
      drawHUD(); drawControls(); drawCommentary(dt);
      break;

    case 'result':
      resultTimer += dt;
      updateCamera(); drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      updateParticles(dt); drawParticles(); drawScreenEffects();
      drawHUD(); drawResultMsg(); drawCommentary(dt);
      if (resultTimer > 2.0) {
        if (!checkQuarterEnd()) {
          setupFormation(); gameState = 'playSelect';
          resultMsg = ''; resultSubMsg = '';
        }
      }
      break;

    case 'celebration':
      updateCamera(); updateParticles(dt);
      drawCelebration(dt); drawHUD(); drawCommentary(dt);
      break;

    case 'turnover': drawTurnoverScreen(dt); drawCommentary(dt); break;
    case 'halftime': drawHalftime(dt); break;
    case 'gameOver': drawGameOver(dt); break;
  }

  drawNotification(dt);
}

requestAnimationFrame(gameLoop);


// =========================================================================
// 20. ADMIN PANEL
// =========================================================================

window.JUDEBOWL_ADMIN = {
  getStore: function() { return JSON.parse(JSON.stringify(store)); },
  setCoins: function(n) { store.coins = n; saveStore(); console.log('Coins set to ' + n); },
  addCoins: function(n) { store.coins += n; store.totalCoins += n; saveStore(); console.log('Added ' + n + '. Total: ' + store.coins); },
  grantProPass: function() { store.proPassExpiry = -1; store.proPas = true; saveStore(); console.log('Pro Pass granted.'); },
  revokeProPass: function() { store.proPassExpiry = 0; store.proPas = false; saveStore(); console.log('Pro Pass revoked.'); },
  unlockAll: function() {
    Object.keys(SHOP_ITEMS).forEach(function(key) {
      if (store.unlockedItems.indexOf(key) < 0) store.unlockedItems.push(key);
    });
    saveStore(); console.log('All items unlocked.');
  },
  resetStore: function() { store = defaultStore(); saveStore(); console.log('Store reset.'); },
  resetDailyBonus: function() { store.lastDailyLogin = ''; store.dailyStreak = 0; saveStore(); console.log('Daily bonus reset.'); },
  testAd: function() {
    showRewardedAd(function(w) { console.log('Ad: watched=' + w); if (w) console.log('+' + claimAdReward() + ' coins'); });
  },
  getStats: function() { return JSON.parse(JSON.stringify(gameStats)); },
  forceState: function(s) { gameState = s; stateTimer = 0; console.log('State: ' + s); },
  setDifficulty: function(d) { store.difficulty = Math.max(0, Math.min(2, d)); saveStore(); console.log('Difficulty: ' + DIFF_NAMES[d]); },
  resetSeason: function() { store.seasonActive = false; store.seasonWeek = 0; store.seasonWins = 0; store.seasonLosses = 0; saveStore(); console.log('Season reset.'); },
  setStylePoints: function(n) { stylePoints = n; console.log('Style: ' + n); },
  triggerOnFire: function() { onFire = true; onFireTimer = ON_FIRE_DURATION; sfxOnFire(); console.log('ON FIRE!'); },
  setTurbo: function(n) { turboMeter = Math.max(0, Math.min(100, n)); console.log('Turbo: ' + turboMeter); },
  help: function() {
    console.log([
      'JUDE BOWL v4.0 Admin Panel',
      '---------------------------',
      'JUDEBOWL_ADMIN.setCoins(n)        - Set coins',
      'JUDEBOWL_ADMIN.addCoins(n)        - Add coins',
      'JUDEBOWL_ADMIN.grantProPass()     - Grant Pro Pass',
      'JUDEBOWL_ADMIN.revokeProPass()    - Revoke Pro Pass',
      'JUDEBOWL_ADMIN.unlockAll()        - Unlock all items',
      'JUDEBOWL_ADMIN.resetStore()       - Reset all data',
      'JUDEBOWL_ADMIN.resetDailyBonus()  - Reset daily bonus',
      'JUDEBOWL_ADMIN.testAd()           - Test ad flow',
      'JUDEBOWL_ADMIN.getStats()         - Game stats',
      'JUDEBOWL_ADMIN.getStore()         - Full store',
      'JUDEBOWL_ADMIN.forceState(s)      - Force state',
      'JUDEBOWL_ADMIN.setDifficulty(0-2) - Rookie/Pro/All-Madden',
      'JUDEBOWL_ADMIN.resetSeason()      - Reset season',
      'JUDEBOWL_ADMIN.setStylePoints(n)  - Set style points',
      'JUDEBOWL_ADMIN.triggerOnFire()    - Trigger ON FIRE mode',
      'JUDEBOWL_ADMIN.setTurbo(0-100)    - Set turbo meter'
    ].join('\n'));
  }
};

console.log('[JUDE BOWL v4.0 Best-in-Class] Admin: JUDEBOWL_ADMIN.help()');

analyticsEvent('session_start', {
  coins: store.coins, proPas: hasProPass(),
  totalGames: store.totalGames, difficulty: DIFF_NAMES[getDiff()]
});
