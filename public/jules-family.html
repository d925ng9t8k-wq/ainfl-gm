// в”Ђв”Ђ State в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let currentActivity   = null;
let currentCatFilter  = null;
let favorites         = JSON.parse(localStorage.getItem('jules-fav') || '[]');
let lastPickedIds     = [];

const catLabels = {
  'date-night':  'рџ’• Date Night',
  'family-fun':  'рџ‘ЁвЂЌрџ‘©вЂЌрџ‘§вЂЌрџ‘¦ Family Fun',
  'outdoor':     'рџЊї Outdoor',
  'budget':      'рџ’› Budget-Friendly',
  'special':     'рџЋ‰ Special Occasion'
};

// в”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function saveFavorites() {
  localStorage.setItem('jules-fav', JSON.stringify(favorites));
}

function pickRandom(pool) {
  // Avoid repeating recent picks
  let filtered = pool.filter(a => !lastPickedIds.includes(a.id));
  if (!filtered.length) { lastPickedIds = []; filtered = pool; }
  const pick = filtered[Math.floor(Math.random() * filtered.length)];
  lastPickedIds.push(pick.id);
  if (lastPickedIds.length > 4) lastPickedIds.shift();
  return pick;
}

function showActivity(activity) {
  currentActivity = activity;

  const card  = document.getElementById('resultCard');
  const cat   = document.getElementById('resultCat');
  const title = document.getElementById('resultTitle');
  const desc  = document.getElementById('resultDesc');
  const tags  = document.getElementById('resultTags');
  const save  = document.getElementById('btnSave');

  // Reset animation
  card.classList.remove('visible');
  void card.offsetWidth; // force reflow

  card.className = 'result-card ' + activity.cat + ' visible';
  cat.innerHTML  = activity.icon + ' ' + catLabels[activity.cat];
  title.textContent = activity.title;
  desc.textContent  = activity.desc;

  tags.innerHTML = '';
  activity.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tags.appendChild(span);
  });

  const isSaved = favorites.some(f => f.id === activity.id);
  save.textContent = isSaved ? 'Saved!' : 'Save it';
  save.className = 'btn-save' + (isSaved ? ' saved' : '');
  save.disabled = false;
}

function surprise() {
  clearCatButtons();
  currentCatFilter = null;
  const pick = pickRandom(activities);
  showActivity(pick);
}

function pickFromCat(cat) {
  // Toggle same category
  if (currentCatFilter === cat) {
    clearCatButtons();
    currentCatFilter = null;
    surprise();
    return;
  }
  currentCatFilter = cat;
  clearCatButtons();
  document.querySelector('[data-cat="' + cat + '"]').classList.add('active-' + cat);

  const pool = activities.filter(a => a.cat === cat);
  const pick = pickRandom(pool);
  showActivity(pick);
}

function clearCatButtons() {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.className = 'cat-btn';
  });
}

function saveActivity() {
  if (!currentActivity) return;
  const btn = document.getElementById('btnSave');
  const already = favorites.findIndex(f => f.id === currentActivity.id);

  if (already >= 0) {
    favorites.splice(already, 1);
    btn.textContent = 'Save it';
    btn.className = 'btn-save';
  } else {
    favorites.push({ id: currentActivity.id, title: currentActivity.title, cat: currentActivity.cat });
    btn.textContent = 'Saved!';
    btn.className = 'btn-save saved';
  }
  saveFavorites();
  renderFavorites();
}

function renderFavorites() {
  const container = document.getElementById('favoritesContainer');
  container.innerHTML = '';

  if (!favorites.length) {
    container.innerHTML = '<div class="favorites-empty"><div class="empty-icon">рџЊё</div>Tap "Save it" on any idea to keep it here</div>';
    return;
  }

  favorites.forEach(fav => {
    const el = document.createElement('div');
    el.className = 'fav-item';
    el.innerHTML =
      '<div class="fav-dot ' + fav.cat + '"></div>' +
      '<div class="fav-text">' +
        '<div class="fav-name">' + fav.title + '</div>' +
        '<div class="fav-cat">' + catLabels[fav.cat] + '</div>' +
      '</div>' +
      '<button class="btn-fav-remove" onclick="removeFavorite(\'' + fav.id + '\')" aria-label="Remove">Г—</button>';
    container.appendChild(el);
  });
}

function removeFavorite(id) {
  favorites = favorites.filter(f => f.id !== id);
  saveFavorites();
  renderFavorites();
  // Update save button if currently showing this activity
  if (currentActivity && currentActivity.id === id) {
    const btn = document.getElementById('btnSave');
    btn.textContent = 'Save it';
    btn.className = 'btn-save';
  }
}

function clearFavorites() {
  if (!favorites.length) return;
  favorites = [];
  saveFavorites();
  renderFavorites();
  // Reset save button
  if (currentActivity) {
    const btn = document.getElementById('btnSave');
    btn.textContent = 'Save it';
    btn.className = 'btn-save';
  }
}

// в”Ђв”Ђ Event listeners в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
document.getElementById('btnSurprise').addEventListener('click', surprise);
document.getElementById('btnSave').addEventListener('click', saveActivity);
document.getElementById('btnAnother').addEventListener('click', function() {
  if (currentCatFilter) {
    const pool = activities.filter(a => a.cat === currentCatFilter);
    showActivity(pickRandom(pool));
  } else {
    surprise();
  }
});

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
renderFavorites();
// Auto-show a seasonal suggestion on load
setTimeout(function() {
  // Spring opening: lead with an outdoor pick
  const springPick = activities.find(a => a.id === 'out2') || activities[0];
  showActivity(springPick);
}, 200);
</script>
