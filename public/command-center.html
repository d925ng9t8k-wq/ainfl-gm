<style>
/* ═══════════════════════════════════════════
   GLOBAL TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:      #060810;
  --surface: #0d1117;
  --sur2:    #111820;
  --sur3:    #161e28;
  --border:  rgba(255,255,255,0.07);
  --gold:    #f5c542;
  --cyan:    #00e5ff;
  --green:   #00ff88;
  --red:     #ff3b5c;
  --orange:  #ff7a2f;
  --purple:  #9b6dff;
  --pink:    #ff9de2;
  --blue:    #4da6ff;
  --muted:   rgba(255,255,255,0.35);
  --text:    rgba(255,255,255,0.88);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body {
background:var(--bg);
color:var(--text);
font-family:'DM Mono',monospace;
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:'';position:fixed;top:-40%;left:-20%;
width:80%;height:80%;
background:radial-gradient(ellipse,rgba(245,197,66,0.04) 0%,transparent 70%);
pointer-events:none;z-index:0;
}
body::after{
content:'';position:fixed;bottom:-30%;right:-10%;
width:60%;height:60%;
background:radial-gradient(ellipse,rgba(0,229,255,0.03) 0%,transparent 70%);
pointer-events:none;z-index:0;
}

.noise{
position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.35;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════
SHELL / NAV
═══════════════════════════════════════════ */
.shell{position:relative;z-index:2;display:flex;}
.section-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);
margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.status-pill{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:4px 9px;border-radius:20px;font-weight:500;white-space:nowrap;}
.s-active  {background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.s-running {background:rgba(0,229,255,0.1);color:var(--cyan);border:1px solid rgba(0,229,255,0.2);}
.s-standby {background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);}
.s-pending {background:rgba(255,122,47,0.1);color:var(--orange);border:1px solid rgba(255,122,47,0.2);}
.s-blocked {background:rgba(255,59,92,0.1);color:var(--red);border:1px solid rgba(255,59,92,0.2);}
.s-live    {background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.s-building{background:rgba(0,229,255,0.1);color:var(--cyan);border:1px solid rgba(0,229,255,0.2);}

/* ═══════════════════════════════════════════
TAB 1 -- OPERATIONS DASHBOARD
═══════════════════════════════════════════ */

/* Stat bar */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.stat-card{
background:var(--surface);border:1px solid var(--border);border-radius:12px;
padding:20px 22px;position:relative;overflow:hidden;transition:border-color 0.2s;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--gold));opacity:0.7;}
.stat-card:hover{border-color:rgba(255,255,255,0.12);}
.stat-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:#fff;letter-spacing:1px;}
.stat-detail{font-size:11px;color:var(--muted);margin-top:6px;}

/* Agent9 hero */
.a9agent-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:0.04;filter:blur(20px);transition:opacity 0.3s;}
.agent-card:hover .agent-glow{opacity:0.08;}
.agent-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.agent-id{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;letter-spacing:1px;}
.agent-role{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.agent-summary{font-size:11px;line-height:1.65;color:rgba(255,255,255,0.55);}
.agent-tasks{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;}
.task-tag{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:3px 8px;border-radius:4px;color:var(--muted);}

/* Right panel */
.right-panel{display:flex;flex-direction:column;gap:18px;}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}

.revenue-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.revenue-item:last-child{border-bottom:none;}
.rev-left{display:flex;align-items:center;gap:10px;}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rev-name{font-size:12px;color:var(--text);}
.rev-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.rev-status{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}

.todo-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.todo-item:last-child{border-bottom:none;}
.todo-num{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--gold);min-width:20px;}
.todo-text{font-size:12px;color:var(--text);line-height:1.5;}
.todo-detail{font-size:10px;color:var(--muted);margin-top:2px;}

TAB 2 -- ORG CHART
═══════════════════════════════════════════ */
.org-wrapper{overflow-x:auto;padding-bottom:20px;}
.org-chart{display:flex;flex-direction:column;align-items:center;}

.owner-node{
background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
border:1px solid rgba(255,255,255,0.15);border-radius:14px;
padding:16px 36px;text-align:center;width:210px;
}
.owner-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.owner-name{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:3px;}
.owner-sub{font-size:9px;color:var(--muted);margin-top:2px;}

.conn-v{width:2px;background:var(--border);margin:0 auto;}
.conn-gold{background:rgba(245,197,66,0.3);}
.conn-s{height:24px;}.conn-m{height:32px;}

.ceo-node{
background:linear-gradient(135deg,rgba(245,197,66,0.12),rgba(245,197,66,0.04));
border:1.5px solid rgba(245,197,66,0.35);border-radius:16px;
padding:20px 36px;text-align:center;width:270px;
box-shadow:0 0 40px rgba(245,197,66,0.07);
position:relative;
}
.ceo-node::before{
content:'PRIMARY ORCHESTRATOR';
position:absolute;top:-10px;left:50%;transform:translateX(-50%);
background:var(--gold);color:#000;
font-family:'Syne',sans-serif;font-size:8px;font-weight:800;letter-spacing:0.15em;
padding:2px 10px;border-radius:20px;white-space:nowrap;
}
.ceo-id{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--gold);letter-spacing:2px;text-shadow:0 0 28px rgba(245,197,66,0.5);}
.ceo-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;color:#fff;margin-top:2px;}
.ceo-desc{font-size:10px;color:rgba(245,197,66,0.55);margin-top:6px;line-height:1.6;}

.wave-label{
font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
color:rgba(245,197,66,0.45);text-align:center;margin:4px 0 0;
}

/* Divisions row */
.divs-row{
display:flex;gap:14px;justify-content:center;
position:relativ1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.type-t{position:absolute;top:-6px;right:6px;font-size:7px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 5px;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);}

/* Future waves */
.future-section{margin-top:48px;width:100%;}
.future-wave-label{
text-align:center;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
color:var(--muted);margin-bottom:20px;
display:flex;align-items:center;gap:14px;justify-content:center;
}
.future-wave-label::before,.future-wave-label::after{content:'';flex:1;max-width:160px;height:1px;background:var(--border);}
.future-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.future-card{
border:1px dashed rgba(255,255,255,0.1);border-radius:12px;
padding:14px 16px;width:148px;text-align:center;
opacity:0.5;transition:opacity 0.2s,transform 0.2s;cursor:default;
}
.future-card:hover{opacity:0.85;transform:translateY(-2px);}
.future-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,0.18);}
.future-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:5px;}
.future-desc{font-size:9px;color:var(--muted);line-height:1.5;}
.slot-card{border:1px dashed rgba(255,255,255,0.05);border-radius:12px;padding:14px 16px;width:148px;text-align:center;opacity:0.2;}
.slot-txt{font-size:10px;color:var(--muted);letter-spacing:0.08em;}

/* Org legend */
.org-legend{
display:flex;gap:28px;justify-content:center;flex-wrap:wrap;
margin-top:36px;padding:18px 24px;
background:var(--surface);border:1px solid var(--border);border-radius:12px;
}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);}
.leg-badge{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:7px;}

/* ═══════════════════════════════════════════
TAB 3 -- TERMINAL
═══════════════════════════════════════════ */
.terminaqp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.qp-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

.cmd-btn{
width:100%;text-align:left;
background:var(--sur2);border:1px solid var(--border);
border-radius:8px;padding:10px 12px;
font-family:'DM Mono',monospace;font-size:11px;
color:var(--text);cursor:pointer;
transition:background 0.15s,border-color 0.15s;
margin-bottom:6px;display:flex;align-items:center;gap:10px;
}
.cmd-btn:last-child{margin-bottom:0;}
.cmd-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.12);}
.cmd-btn.danger:hover{background:rgba(255,59,92,0.08);border-color:rgba(255,59,92,0.2);color:var(--red);}
.cmd-btn.success:hover{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.2);color:var(--green);}
.cmd-btn.warn:hover{background:rgba(255,122,47,0.08);border-color:rgba(255,122,47,0.2);color:var(--orange);}
.cmd-icon{font-size:14px;flex-shrink:0;}
.cmd-text{flex:1;}
.cmd-text strong{display:block;font-size:11px;color:var(--text);}
.cmd-text span{display:block;font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:0.04em;}

/* Agent selector */
.agent-select-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.agent-sel-btn{
background:var(--sur2);border:1px solid var(--border);border-radius:7px;
padding:8px 6px;text-align:center;
font-family:'Bebas Neue',sans-serif;font-size:16px;
cursor:pointer;transition:all 0.15s;
color:var(--muted);letter-spacing:1px;
}
.agent-sel-btn:hover,.agent-sel-btn.sel{
border-color:rgba(245,197,66,0.3);
color:var(--gold);background:rgba(245,197,66,0.06);
}
.agent-sel-btn .asel-role{font-family:'DM Mono',sans-serif;font-size:8px;color:var(--muted);letter-spacing:0.05em;display:block;margin-top:1px;text-transform:uppercase;}

/* ═══════════════════════════════════════════
TELEGRAM CHAT PANEL
═══════════════════════════════════════════ */
.tg-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;height:420px;overflow:hidden;}
.tg-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tg-dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:tgPulse 2s infinite;}
@keyframes tgPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.tg-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--cyan);}
.tg-refresh-lbl{font-size:9px;color:var(--muted);margin-left:auto;}
.tg-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.tg-messages::-webkit-scrollbar{width:4px;}
.tg-messages::-webkit-scrollbar-track{background:transparent;}
.tg-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.tg-msg{max-width:80%;padding:9px 13px;border-radius:12px;font-size:11px;line-height:1.55;}
.tg-msg.inbound{background:var(--sur3);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.tg-msg.outbound{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);color:var(--cyan);align-self:flex-end;border-bottom-right-radius:4px;}
.tg-msg-meta{font-size:9px;color:var(--muted);margin-top:4px;}
.tg-msg.inbound .tg-msg-meta{text-align:left;}
.tg-msg.outbound .tg-msg-meta{text-align:right;}
.tg-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.tg-input{flex:1;background:var(--sur2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);outline:none;transition:border-color 0.15s;}
.tg-input:focus{border-color:rgba(0,229,255,0.35);}
.tg-input::placeholder{color:var(--muted);}
.tg-send{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.25);border-radius:8px;padding:9px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--cyan);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tg-send:hover{background:rgba(0,229,255,0.18);border-color:rgba(0,229,255,0.4);}
.tg-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 0;}

/* ═══════════════════════════════════════════
HUB STATUS PANEL
═══════════════════════════════════════════ */
.hub-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.hub-channel{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sur2);border:1px solid var(--border);border-radius:8px;}
.hub-ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hub-ch-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.hub-ch-dot.off{background:var(--red);}
.hub-ch-dot.unknown{background:var(--muted);}
.hub-ch-name{font-size:10px;color:var(--text);}
.hub-ch-state{font-size:9px;color:var(--muted);margin-left:auto;}
.hub-uptime{font-size:11px;color:var(--text);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between;}
.hub-uptime span{color:var(--green);}
@media(max-width:768px){
  .bottom-panel-row{grid-template-columns:1fr !important;}
  .tg-panel{grid-column:1 !important;height:360px;}
  .stat-bar{grid-template-columns:repeat(2,1fr) !important;}
}

/* ── TELEGRAM CHAT PANEL ── */
const HUB = 'http://localhost:3457';
const _isLocal = location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.hostname==='';
let tgLastMessages = [];

function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return ''; }
}

function renderTgMessages(msgs) {
  const el = document.getElementById('tg-messages');
  if (!el) return;
  if (!msgs || !msgs.length) {
    el.innerHTML = '<div class="tg-empty">No recent messages.</div>';
    return;
  }
  const html = msgs.map(m => {
    const dir = m.direction === 'out' ? 'outbound' : 'inbound';
    const sender = dir === 'outbound' ? '9' : (m.sender || 'Owner');
    const text = (m.text || m.message || m.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const t = fmtTime(m.timestamp || m.time);
    return `<div class="tg-msg ${dir}"><div>${text}</div><div class="tg-msg-meta">${sender} · ${t}</div></div>`;
  }).join('');
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

async function tgFetch() {
  const lbl = document.getElementById('tg-refresh-lbl');
  if(!_isLocal){
    const el=document.getElementById('tg-messages');
    if(el) el.innerHTML='<div class="tg-empty">Feed available on local network only</div>';
    if(lbl) lbl.textContent='Remote access';
    return;
  }
  try {
    const r = await fetch(HUB + '/state', {signal: AbortSignal.timeout(5000)});
    if (!r.ok) throw new Error('bad status');
    const data = await r.json();
    // Pull messages from state — try multiple possible keys
    let msgs = data.recentMessages || data.messages || data.inbox || [];
    // Filter to Telegram channel if channel info available
    if (msgs.length && msgs[0].channel) {
      const tgMsgs = msgs.filter(m => m.channel === 'telegram');
      if (tgMsgs.length) msgs = tgMsgs;
    }
    // Show last 30
    msgs = msgs.slice(-30);
    renderTgMessages(msgs);
    const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    if (lbl) lbl.textContent = 'Updated ' + now;
  } catch(e) {
    if (lbl) lbl.textContent = 'Hub offline';
    const el = document.getElementById('tg-messages');
    if (el && el.children.length <= 1) {
      el.innerHTML = '<div class="tg-empty">Hub not reachable · localhost:3457</div>';
    }
  }
}

async function tgSend() {
  const input = document.getElementById('tg-input');
  const btn = document.getElementById('tg-send');
  const text = input.value.trim();
  if (!text) return;
  if(!_isLocal){return;}
  input.disabled = true;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const r = await fetch(HUB + '/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({channel:'telegram', message: text}),
      signal: AbortSignal.timeout(6000)
    });
    if (r.ok) {
      // Optimistically add outbound msg
      const el = document.getElementById('tg-messages');
      const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      const msgEl = document.createElement('div');
      msgEl.className = 'tg-msg outbound';
      msgEl.innerHTML = `<div>${text.replace(/</g,'&lt;')}</div><div class="tg-msg-meta">You · ${now}</div>`;
      el.appendChild(msgEl);
      el.scrollTop = el.scrollHeight;
      input.value = '';
    }
  } catch(e) {
    // silently fail — hub may be offline
  } finally {
    input.disabled = false;
    btn.disabled = false;
    btn.textContent = 'Send';
    input.focus();
  }
}

// Enter to send in Telegram input
const tgInputEl = document.getElementById('tg-input');
if (tgInputEl) {
  tgInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tgSend();
  });
}

/* ── HUB STATUS FEED ── */
async function hubStatusFetch() {
  if(!_isLocal){
    const statState=document.getElementById('stat-hub-state');
    const statDetail=document.getElementById('stat-hub-detail');
    if(statState){statState.textContent='REMOTE';statState.style.color='var(--orange)';}
    if(statDetail){statDetail.textContent='Local access required for live status';}
    return;
  }
  try {
    const r = await fetch(HUB + '/health', {signal: AbortSignal.timeout(5000)});
    if (!r.ok) throw new Error('bad');
    const data = await r.json();

    // Uptime
    const uptimeEl = document.getElementById('hub-uptime-val');
    if (uptimeEl && data.uptime != null) {
      const s = Math.floor(data.uptime);
      if (s < 3600) uptimeEl.textContent = Math.floor(s/60) + 'm';
      else uptimeEl.textContent = Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
    }

    // Stat card
    const statState = document.getElementById('stat-hub-state');
    const statDetail = document.getElementById('stat-hub-detail');
    if (statState) { statState.textContent = 'LIVE'; statState.style.color = 'var(--green)'; }
    if (statDetail) statDetail.textContent = 'All channels reporting';

    // Channels — try common shapes
    const channels = data.channels || data.channelStatus || {};
    const chMap = {telegram: 'ch-telegram', imessage: 'ch-imessage', email: 'ch-email', voice: 'ch-voice'};
    const dotMap = {telegram: 'dot-telegram', imessage: 'dot-imessage', email: 'dot-email', voice: 'dot-voice'};
    for (const [key, elId] of Object.entries(chMap)) {
      const el = document.getElementById(elId);
      if (!el) continue;
      const raw = channels[key];
      if (raw == null) { el.textContent = '--'; continue; }
      const ok = (typeof raw === 'boolean') ? raw : (raw === 'ok' || raw === 'active' || raw === 'online' || raw === true);
      el.textContent = ok ? 'OK' : 'Down';
      el.style.color = ok ? 'var(--green)' : 'var(--red)';
      const dot = el.closest('.hub-channel')?.querySelector('.hub-ch-dot');
      if (dot) { dot.className = 'hub-ch-dot ' + (ok ? 'on' : 'off'); }
    }

    const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const lc = document.getElementById('hub-last-check');
    if (lc) lc.textContent = 'Last check: ' + now;
  } catch(e) {
    const statState = document.getElementById('stat-hub-state');
    const statDetail = document.getElementById('stat-hub-detail');
    if (statState) { statState.textContent = 'OFF'; statState.style.color = 'var(--red)'; }
    if (statDetail) { statDetail.textContent = 'Hub not reachable'; }
    const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const lc = document.getElementById('hub-last-check');
    if (lc) lc.textContent = 'Last check: ' + now + ' (offline)';
  }
}
