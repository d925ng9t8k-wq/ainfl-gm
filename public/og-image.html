<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: radial-gradient(ellipse at 30% 45%, #001838 0%, #000a1e 50%, #000510 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  body::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(400px 350px at 28% 42%, rgba(0,180,255,0.12), transparent),
      radial-gradient(250px 250px at 72% 55%, rgba(130,0,255,0.06), transparent);
  }
  .container { position: relative; z-index: 2; display: flex; align-items: center; gap: 40px; padding: 0 50px; width: 100%; }

  /* === AGGRESSIVE FOX-STYLE ROBOT HEAD === */
  .robot { flex-shrink: 0; width: 340px; height: 400px; position: relative; }

  /* Head/Helmet - angular, aggressive shape */
  .head {
    position: absolute; top: 30px; left: 30px; width: 280px; height: 270px;
    background: linear-gradient(170deg, #4a5a7a 0%, #1a2540 25%, #2a3a58 40%, #0f1a2e 60%, #1a2845 80%, #3a4a68 100%);
    border-radius: 40px 40px 20px 20px;
    clip-path: polygon(10% 0%, 90% 0%, 100% 35%, 95% 75%, 85% 100%, 15% 100%, 5% 75%, 0% 35%);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 60px rgba(0,150,255,0.1);
    overflow: visible;
  }

  /* Metal plate lines */
  .plate { position: absolute; background: rgba(100,140,200,0.12); }
  .p1 { top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(100,160,255,0.3), transparent); }
  .p2 { top: 50px; left: 20px; width: 240px; height: 1px; background: rgba(80,120,180,0.15); }
  .p3 { top: 180px; left: 15px; width: 250px; height: 1px; background: rgba(80,120,180,0.12); }
  /* Rivets/bolts */
  .rivet { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, #5a7090 30%, #2a3a50 70%); border-radius: 50%; box-shadow: inset 0 -1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(100,160,255,0.1); }
  .r1 { top: 20px; left: 25px; }
  .r2 { top: 20px; right: 25px; }
  .r3 { top: 55px; left: 20px; }
  .r4 { top: 55px; right: 20px; }
  .r5 { bottom: 30px; left: 40px; }
  .r6 { bottom: 30px; right: 40px; }

  /* Helmet stripe - center */
  .hstripe {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 290px;
    background: linear-gradient(180deg, #00E0FF 0%, #0090DD 30%, #00B8FF 60%, #007ACC 100%);
    clip-path: polygon(20% 0%, 80% 0%, 90% 100%, 10% 100%);
    box-shadow: 0 0 25px rgba(0,220,255,0.7), 0 0 50px rgba(0,220,255,0.3);
  }

  /* Angry visor - V-shaped, aggressive */
  .visor-wrap { position: absolute; top: 85px; left: 20px; width: 240px; height: 65px; }
  .visor {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, #000208 0%, #001030 40%, #000510 100%);
    clip-path: polygon(0% 45%, 15% 15%, 42% 0%, 50% 5%, 58% 0%, 85% 15%, 100% 45%, 95% 100%, 5% 100%);
    border: 2px solid rgba(0,200,255,0.35);
    box-shadow: inset 0 0 30px rgba(0,200,255,0.15);
  }

  /* Glowing angry eyes */
  .eye {
    position: absolute; top: 22px; width: 50px; height: 18px;
    background: radial-gradient(ellipse, #00F0FF 30%, #0060FF 70%, transparent 100%);
    clip-path: polygon(0% 50%, 15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%);
    box-shadow: 0 0 30px rgba(0,240,255,1), 0 0 60px rgba(0,200,255,0.6), 0 0 90px rgba(0,180,255,0.3);
  }
  .eye::before {
    content: ''; position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 12px; background: radial-gradient(circle, #fff 30%, #80FFFF 60%, transparent 80%);
    border-radius: 50%;
  }
  .eye-l { left: 30px; transform: rotate(-8deg); }
  .eye-r { right: 30px; transform: rotate(8deg); }

  /* Eye glow beams */
  .glow-beam {
    position: absolute; top: 28px; width: 80px; height: 6px;
    background: linear-gradient(90deg, rgba(0,240,255,0.4), transparent);
    filter: blur(3px);
  }
  .glow-l { left: -20px; transform: rotate(-5deg); }
  .glow-r { right: -20px; transform: rotate(5deg) scaleX(-1); }

  /* Jaw / chin armor */
  .jaw {
    position: absolute; top: 170px; left: 35px; width: 210px; height: 80px;
    background: linear-gradient(180deg, #1a2845 0%, #0f1a30 50%, #1a2540 100%);
    clip-path: polygon(5% 0%, 95% 0%, 85% 100%, 15% 100%);
    border-top: 2px solid rgba(0,200,255,0.2);
  }
  /* Jaw vents */
  .vent { position: absolute; height: 3px; background: linear-gradient(90deg, transparent, rgba(0,200,255,0.4), transparent); border-radius: 2px; }
  .v1 { top: 15px; left: 20px; width: 170px; }
  .v2 { top: 27px; left: 30px; width: 150px; }
  .v3 { top: 39px; left: 38px; width: 134px; }
  .v4 { top: 51px; left: 46px; width: 118px; }

  /* Neck/base */
  .neck {
    position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 40px;
    background: linear-gradient(180deg, #1a2540, #0a1225);
    border-radius: 0 0 20px 20px;
    border: 1px solid rgba(0,200,255,0.15);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .neck-light {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 4px; background: #00D4FF; border-radius: 2px;
    box-shadow: 0 0 12px rgba(0,220,255,0.6);
  }

  /* Shoulder armor hints */
  .shoulder {
    position: absolute; bottom: 10px; width: 60px; height: 25px;
    background: linear-gradient(180deg, #2a3a58, #1a2540);
    border: 1px solid rgba(0,200,255,0.12);
    border-radius: 4px;
  }
  .sh-l { left: 20px; border-radius: 10px 4px 4px 10px; }
  .sh-r { right: 20px; border-radius: 4px 10px 10px 4px; }

  /* === TEXT === */
  .text-side { flex: 1; }
  .title { font-size: 78px; font-weight: 900; letter-spacing: 0.02em; line-height: 0.85; margin-bottom: 10px; }
  .t-main {
    background: linear-gradient(135deg, #00F0FF, #80F8FF, #E2E8F0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)) drop-shadow(0 0 25px rgba(0,240,255,0.5));
  }
  .t-gm {
    background: linear-gradient(135deg, #C300FF, #E060FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(195,0,255,0.5));
  }
  .subtitle { font-size: 17px; color: #7A8BA8; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; margin-bottom: 26px; }
  .features { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; }
  .feat {
    background: rgba(0,200,255,0.06); border: 1px solid rgba(0,200,255,0.20);
    color: #B0C4DE; padding: 7px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.04em; font-family: Arial, sans-serif;
  }
  .url {
    font-size: 30px; font-weight: 900;
    background: linear-gradient(90deg, #00F0FF, #80F8FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(0,240,255,0.4));
  }
  .frame {
    position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px solid rgba(0,200,255,0.08); border-radius: 6px; pointer-events: none; z-index: 3;
  }
  .frame::before { content: ''; position: absolute; top: -1px; left: 40px; width: 120px; height: 2px; background: linear-gradient(90deg, transparent, #00D4FF, transparent); }
  .frame::after { content: ''; position: absolute; bottom: -1px; right: 40px; width: 120px; height: 2px; background: linear-gradient(90deg, transparent, #C300FF, transparent); }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="container">
    <div class="robot">
      <div class="head">
        <div class="plate p1"></div><div class="plate p2"></div><div class="plate p3"></div>
        <div class="rivet r1"></div><div class="rivet r2"></div><div class="rivet r3"></div>
        <div class="rivet r4"></div><div class="rivet r5"></div><div class="rivet r6"></div>
        <div class="hstripe"></div>
        <div class="visor-wrap">
          <div class="visor"></div>
          <div class="eye eye-l"></div>
          <div class="eye eye-r"></div>
          <div class="glow-beam glow-l"></div>
          <div class="glow-beam glow-r"></div>
        </div>
        <div class="jaw">
          <div class="vent v1"></div><div class="vent v2"></div><div class="vent v3"></div><div class="vent v4"></div>
        </div>
      </div>
      <div class="neck">
        <div class="neck-light"></div>
      </div>
      <div class="shoulder sh-l"></div>
      <div class="shoulder sh-r"></div>
    </div>
    <div class="text-side">
      <div class="title"><span class="t-main">AiNFL </span><span class="t-gm">GM</span></div>
      <div class="subtitle">AI-Powered NFL Offseason Simulator</div>
      <div class="features">
        <span class="feat">🏈 All 32 Teams</span>
        <span class="feat">💰 Real Salary Cap</span>
        <span class="feat">✍️ Free Agency</span>
        <span class="feat">🔄 Player Trades</span>
        <span class="feat">🎯 Mock Draft</span>
      </div>
      <div class="url">ainflgm.com</div>
    </div>
  </div>
</body>
</html>
