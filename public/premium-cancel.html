<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#050508">
<title>Checkout Cancelled | PlayAiGM</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a0a; color: #e2e2e2; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; -webkit-font-smoothing: antialiased;
}
.card {
  max-width: 480px; width: 100%; text-align: center;
  background: #111; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 48px 36px;
}
.icon { font-size: 3rem; margin-bottom: 16px; }
h1 { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 12px; letter-spacing: -0.03em; }
.subtitle { font-size: 0.95rem; color: #888; line-height: 1.6; margin-bottom: 32px; }
.btn {
  display: inline-block; padding: 14px 28px; background: #FB4F14; color: #fff;
  border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; text-decoration: none; margin: 6px;
  transition: background 0.2s;
}
.btn:hover { background: #e04412; }
.btn-ghost {
  background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #888;
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #ccc; background: transparent; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128337;</div>
  <h1>No worries</h1>
  <p class="subtitle">Your checkout was cancelled. No charge was made. You can upgrade to premium any time to unlock full access to dynasty rankings, cap tools, and AI GM analysis.</p>
  <a href="javascript:history.back()" class="btn">Go Back</a>
  <a href="/" class="btn btn-ghost">Return Home</a>
</div>
</body>
</html>
