<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Rapid Mortgage — Outro</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

  html,body{
    width:1920px;height:1080px;overflow:hidden;
    font-family:'Poppins',system-ui,sans-serif;
    background:#2582B5;
  }

  .scene{
    position:relative;width:1920px;height:1080px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow:hidden;
  }

  /* Particles */
  .particles{
    position:absolute;inset:0;z-index:1;
    opacity:0;
    animation:particlesIn 1s ease 0.2s forwards;
  }
  @keyframes particlesIn{to{opacity:1}}

  /* Vignette */
  .vignette{
    position:absolute;inset:0;z-index:2;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.3) 100%);
    pointer-events:none;
  }

  /* Content */
  .content{
    position:relative;z-index:5;
    display:flex;flex-direction:column;align-items:center;gap:28px;
  }

  .logo-wrap{
    opacity:0;transform:scale(0.92);
    animation:fadeIn 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }
  .logo-wrap img{
    height:120px;width:auto;
    filter:drop-shadow(0 4px 20px rgba(0,0,0,0.25));
  }

  .divider{
    width:0;height:1.5px;
    background:rgba(255,255,255,0.45);
    animation:divGrow 0.7s ease-out 1.2s forwards;
  }
  @keyframes divGrow{to{width:520px}}

  .confidential{
    font-size:22px;font-weight:400;color:rgba(255,255,255,0.9);
    letter-spacing:2px;text-transform:uppercase;
    opacity:0;transform:translateY(12px);
    animation:textUp 0.9s ease-out 1.6s forwards;
    text-shadow:0 1px 8px rgba(0,0,0,0.2);
  }

  .sub{
    font-size:16px;font-weight:300;color:rgba(255,255,255,0.65);
    letter-spacing:0.5px;
    opacity:0;transform:translateY(10px);
    animation:textUp 0.9s ease-out 1.9s forwards;
  }

  .contact-block{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    opacity:0;transform:translateY(10px);
    animation:textUp 0.9s ease-out 2.3s forwards;
  }
  .contact-name{
    font-size:28px;font-weight:600;color:#fff;
    letter-spacing:0.5px;
    text-shadow:0 2px 10px rgba(0,0,0,0.2);
  }
  .contact-info{
    font-size:18px;font-weight:300;color:rgba(255,255,255,0.8);
    letter-spacing:0.5px;
  }
  .contact-info a{
    color:rgba(255,255,255,0.8);text-decoration:none;
  }

  @keyframes fadeIn{to{opacity:1;transform:scale(1)}}
  @keyframes textUp{to{opacity:1;transform:translateY(0)}}

  /* Fade to black at ~5.5s */
  .scene{
    animation:sceneOut 1.2s ease-in 5.3s forwards;
  }
  @keyframes sceneOut{to{opacity:0}}

  /* Black overlay for final state */
  .black-end{
    position:fixed;inset:0;z-index:100;
    background:#000;
    opacity:0;pointer-events:none;
    animation:blackIn 0.8s ease-in 5.8s forwards;
  }
  @keyframes blackIn{to{opacity:1}}
</style>
</head>
<body>
<div class="scene">
  <canvas class="particles" id="particles"></canvas>
  <div class="vignette"></div>

  <div class="content">
    <div class="logo-wrap">
      <img src="https://rapidmortgage.com/wp-content/uploads/2019/01/high-res-no-background-logo.png"
           alt="Rapid Mortgage" crossorigin="anonymous">
    </div>
    <div class="divider"></div>
    <div class="confidential">Confidential</div>
    <div class="sub">For Discussion Purposes Only</div>
    <div class="contact-block">
      <div class="contact-name">Mark Jaynes</div>
      <div class="contact-info">
        <a href="mailto:mjaynes@rapidmortgage.com">mjaynes@rapidmortgage.com</a>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        614-845-5202
      </div>
    </div>
  </div>
</div>
<div class="black-end"></div>

<script>
(function(){
  const c=document.getElementById('particles');
  const ctx=c.getContext('2d');
  c.width=1920;c.height=1080;
  const dots=[];
  for(let i=0;i<60;i++){
    dots.push({
      x:Math.random()*1920,
      y:Math.random()*1080,
      r:Math.random()*2+0.5,
      dx:(Math.random()-0.5)*0.4,
      dy:(Math.random()-0.5)*0.3-0.1,
      a:Math.random()*0.4+0.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,1920,1080);
    dots.forEach(d=>{
      d.x+=d.dx;d.y+=d.dy;
      if(d.x<0)d.x=1920;if(d.x>1920)d.x=0;
      if(d.y<0)d.y=1080;if(d.y>1080)d.y=0;
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${d.a})`;
      ctx.fill();
    });
    for(let i=0;i<dots.length;i++){
      for(let j=i+1;j<dots.length;j++){
        const dx=dots[i].x-dots[j].x;
        const dy=dots[i].y-dots[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){
          ctx.beginPath();
          ctx.moveTo(dots[i].x,dots[i].y);
          ctx.lineTo(dots[j].x,dots[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${0.05*(1-dist/140)})`;
          ctx.lineWidth=0.7;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
