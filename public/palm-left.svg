<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <g fill="#1a8a2a" opacity="0.85">
    <!-- Main trunk coming from top-left corner -->
    <path d="M0 0 C20 40 35 80 30 140 C28 160 20 175 15 190" stroke="#1a8a2a" stroke-width="4" fill="none"/>
    <!-- Large frond 1 - sweeping right -->
    <path d="M0 0 C30 10 70 25 120 20 C100 30 60 35 30 30 C15 28 5 20 0 10Z"/>
    <!-- Large frond 2 - sweeping down-right -->
    <path d="M5 15 C35 40 80 70 130 80 C110 90 65 85 35 65 C18 55 8 35 5 25Z"/>
    <!-- Frond 3 - mid angle -->
    <path d="M0 30 C25 50 55 85 85 120 C70 125 40 100 20 70 C10 52 3 40 0 35Z"/>
    <!-- Frond 4 - steep downward -->
    <path d="M10 5 C40 20 90 40 140 35 C125 48 75 55 40 40 C22 33 12 18 10 10Z"/>
    <!-- Frond 5 - drooping -->
    <path d="M0 50 C15 75 30 120 25 170 C18 155 10 115 5 80 C2 65 0 55 0 50Z"/>
    <!-- Smaller accent frond -->
    <path d="M15 40 C40 55 75 90 100 140 C85 135 55 100 30 65 C20 50 15 42 15 40Z" opacity="0.7"/>
    <!-- Leaf detail lines -->
    <path d="M0 0 C50 15 100 30 150 25" stroke="#1a8a2a" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M5 15 C45 45 95 75 135 80" stroke="#1a8a2a" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
</svg>