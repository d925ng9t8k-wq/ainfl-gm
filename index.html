<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bengals-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FB4F14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AINFLGM" />
    <meta name="description" content="NFL offseason simulator for the Cincinnati Bengals" />
    <title>AINFL GM</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time service worker + cache nuke for theme update
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
        caches.keys().then(k => k.forEach(name => caches.delete(name)));
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Visitor email notification via ntfy.sh
      (function() {
        var key = 'ainfl_visited';
        if (sessionStorage.getItem(key)) return;
        sessionStorage.setItem(key, '1');
        var ref = document.referrer || 'direct';
        var ua = navigator.userAgent;
        var device = /Mobile|iPhone|Android/.test(ua) ? 'Mobile' : 'Desktop';
        var time = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
        var msg = 'New visitor to AINFL GM\n' +
          'Time: ' + time + ' ET\n' +
          'Device: ' + device + '\n' +
          'From: ' + ref.substring(0, 80);
        fetch('https://ntfy.sh/ainfl-gm-visitors-jf2026', {
          method: 'POST',
          headers: {
            'Title': 'AINFL GM - New Visitor',
            'Priority': '3',
            'Tags': 'football',
            'Email': 'emailfishback@gmail.com'
          },
          body: msg
        }).catch(function(){});
      })();
    </script>
  </body>
</html>
