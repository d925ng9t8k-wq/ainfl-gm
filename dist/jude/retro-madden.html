let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Core tone generator with envelope
function playTone(freq, dur, type, vol, delay) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(Math.min(vol || 0.1, 0.25), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start(t);
  o.stop(t + dur);
}

// Noise generator for crowd/hit sounds
function playNoise(dur, vol, filterFreq) {
  if (!audioCtx) return;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();
  s.buffer = buf;
  f.type = 'lowpass';
  f.frequency.value = filterFreq || 3000;
  g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  s.connect(f);
  f.connect(g);
  g.connect(audioCtx.destination);
  s.start();
}

// 5. PARTICLE SYSTEM — Controlled, powerful effects
// =========================================================================

let particles = [];

// Impact sparks for tackles and big plays
function spawnSparks(x, y, count, color1, color2) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.018 + Math.random() * 0.025,
      color: i % 2 === 0 ? (color1 || ORANGE) : (color2 || WHITE),
      size: 1.5 + Math.random() * 3.5,
      type: 'spark'
    });
  }
}

// TD burst — intense but brief
function spawnTDBurst(x, y) {
  for (let i = 0; i < 55; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2.5,
      life: 1.0,
      decay: 0.01 + Math.random() * 0.015,
      color: [ORANGE, ORANGE_GLOW, ORANGE_EMBER, WHITE, GOLD][Math.floor(Math.random() * 5)],
      size: 2 + Math.random() * 5,
      type: 'burst'
    });
  }
}

// Ember trail for speed demon skin
function spawnEmber(x, y) {
  particles.push({
    x: x + (Math.random() - 0.5) * 4,
    y: y + Math.random() * 3,
    vx: (Math.random() - 0.5) * 0.5,
    vy: Math.random() * 0.5 + 0.3,
    life: 0.7,
    decay: 0.04 + Math.random() * 0.02,
    color: Math.random() > 0.5 ? ORANGE : ORANGE_GLOW,
    size: 1 + Math.random() * 2,
    type: 'ember'
  });
}

// Screen flash effect
let screenFlash = 0;
let screenFlashColor = WHITE;

function triggerFlash(color, intensity) {
  screenFlash = intensity || 0.6;
  screenFlashColor = color || WHITE;
}

// Camera shake
let shakeX = 0, shakeY = 0, shakeMag = 0;

function triggerShake(mag) {
  shakeMag = mag || 5;
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'burst') p.vy += 0.12;
    if (p.type === 'ember') { p.vy -= 0.02; p.vx *= 0.98; }
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Screen flash decay
  if (screenFlash > 0) screenFlash *= 0.86;
  if (screenFlash < 0.01) screenFlash = 0;
  // Camera shake decay
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag;
    shakeY = (Math.random() - 0.5) * shakeMag;
    shakeMag *= 0.86;
    if (shakeMag < 0.3) { shakeMag = 0; shakeX = 0; shakeY = 0; }
  }
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      ctx.fillRect(-p.size * 2, -p.size * 0.25, p.size * 4, p.size * 0.5);
      ctx.restore();
    } else if (p.type === 'ember') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

  if (commentary.timer <= 0) return;
  commentary.timer -= dt;
  const alpha = Math.min(1, commentary.timer * 1.5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = '500 ' + Math.min(11, W * 0.026) + 'px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Dark pill background
  const tw = ctx.measureText(commentary.text).width + 20;
  const th = 22;
  const tx = W / 2 - tw / 2;
  const ty = 56;
  ctx.fillStyle = 'rgba(5,5,5,0.85)';
  roundRect(ctx, tx, ty, tw, th, 4);
  ctx.fill();
  ctx.fillStyle = METALLIC_LIGHT;
  ctx.fillText(commentary.text, W / 2, ty + th / 2);
  ctx.restore();
}

};

function purchaseItem(itemId) {
  const item = SHOP_ITEMS[itemId];
  if (!item) return { ok: false, msg: 'Item not found' };
  if (store.unlockedItems.indexOf(itemId) >= 0) return { ok: false, msg: 'Already owned' };
  if (item.proOnly && !hasProPass()) return { ok: false, msg: 'Requires Pro Pass' };
  if (store.coins < item.cost) return { ok: false, msg: 'Not enough coins' };
  store.coins -= item.cost;
  store.unlockedItems.push(itemId);
  saveStore();
  analyticsEvent('purchase', { item: itemId, cost: item.cost });
  return { ok: true, msg: 'Unlocked: ' + item.name };
}

function equipItem(itemId) {
  if (store.unlockedItems.indexOf(itemId) < 0 && itemId.indexOf('default') < 0) return false;
  const item = SHOP_ITEMS[itemId];
  if (!item) {
    if (itemId === 'default_uniform') store.equippedUniform = itemId;
    if (itemId === 'default_field') store.equippedField = itemId;
    if (itemId === 'default') store.equippedHelmet = itemId;
    saveStore();
    return true;
  }
  if (item.type === 'uniform') store.equippedUniform = itemId;
  if (item.type === 'field') store.equippedField = itemId;
  if (item.type === 'helmet') store.equippedHelmet = itemId;
  saveStore();
  return true;
}

// --- Pro Pass ---
function hasProPass() {
  if (store.proPassExpiry === -1) return true;
  if (store.proPassExpiry > Date.now()) return true;
  return false;
}

function purchaseProPass(type) {
  if (type === '7day') {
    if (store.coins < 500) return { ok: false, msg: 'Need 500 coins' };
    store.coins -= 500;
    store.proPassExpiry = Date.now() + 7 * 24 * 60 * 60 * 1000;
  } else {
    if (store.coins < 1500) return { ok: false, msg: 'Need 1500 coins' };
    store.coins -= 1500;
    store.proPassExpiry = -1;
  }
  store.proPas = true;
  saveStore();
  analyticsEvent('pro_pass_purchase', { type });
  return { ok: true, msg: 'Pro Pass activated!' };
}

// --- Daily Login Bonus ---
function checkDailyBonus() {
  const today = new Date().toISOString().split('T')[0];
  if (store.lastDailyLogin === today) return null;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (store.lastDailyLogin === yesterday) {
    store.dailyStreak++;
  } else {
    store.dailyStreak = 1;
  }
  store.lastDailyLogin = today;
  const bonus = Math.min(store.dailyStreak * 15, 150);
  store.coins += bonus;
  store.totalCoins += bonus;
  saveStore();
  analyticsEvent('daily_bonus', { streak: store.dailyStreak, bonus });
  return { streak: store.dailyStreak, bonus };
}

// =========================================================================
// 10. FIELD COORDINATE SYSTEM
// =========================================================================
// Field coords: x = 0..53.3 (width), y = 0..120 (0=top/opp endzone, 120=bottom/own endzone)
// Bengals offense drives upward (toward y=0 / opponent endzone).
// lineOfScrimmage in yard-line-from-own-endzone (0..100).

function yardLineToFieldY(yd) {
  return ENDZONE_YARDS + (FIELD_YARDS - yd);
}

function fieldYToYardLine(fy) {
  return FIELD_YARDS - (fy - ENDZONE_YARDS);
}

let pixelsPerYard = 1;

function fieldToScreenX(fx) {
  return (fx / FIELD_WIDTH) * W + shakeX;
}

function fieldToScreenY(fy) {
  return (fy - camY) * pixelsPerYard + shakeY;
}


// =========================================================================
// 11. PLAYER FACTORY & FORMATIONS

function makePlayer(x, y, color, outline, num, role, team) {
  return {
    x, y, color, outline, num, role, team,
    vx: 0, vy: 0,
    speed: 1.8 + Math.random() * 0.3,
    juked: 0,
    spinAnim: 0,
    // Silhouette rendering data
    shoulderW: 0.9 + Math.random() * 0.2,
    helmet: 0.4 + Math.random() * 0.1
  };
}

function getOffenseColor() {
  switch (store.equippedUniform) {
    case 'white_uniform': return '#F0F0F0';
    case 'stripe_uniform': return '#1a1a1a';
    case 'chrome_uniform': return METALLIC;
    case 'neon_uniform': return ORANGE_GLOW;
    default: return ORANGE;
  }
}

function getOffenseOutline() {
  switch (store.equippedUniform) {
    case 'white_uniform': return ORANGE;
    case 'stripe_uniform': return ORANGE;
    case 'chrome_uniform': return '#555';
    case 'neon_uniform': return '#FF8844';
    default: return BLACK;
  }
}

function setupFormation() {
  offensePlayers = [];
  defensePlayers = [];

  const scrY = yardLineToFieldY(lineOfScrimmage);
  const cx = FIELD_WIDTH / 2;
  const oColor = getOffenseColor();
  const oOutline = getOffenseOutline();

  // --- Offense (driving upward) ---
  // O-Line (0-4)
  for (let i = -2; i <= 2; i++) {
    const ol = makePlayer(cx + i * 2.2, scrY + 1.0, oColor, oOutline, 60 + i + 2, 'line', 'off');
    ol.shoulderW = 1.1;
    offensePlayers.push(ol);
  }
  // QB (5) — Burrow #9
  const qb = makePlayer(cx, scrY + 5.0, oColor, '#fff', 9, 'qb', 'off');
  qb.speed = 2.1;
  offensePlayers.push(qb);
  // RB (6) — Mixon #28
  const rb = makePlayer(cx + 2, scrY + 7.5, oColor, '#fff', 28, 'rb', 'off');
  rb.speed = 2.3;
  offensePlayers.push(rb);
  // WR1 left (7) — Chase #1
  const wr1 = makePlayer(cx - 20, scrY - 0.5, oColor, '#fff', 1, 'wr', 'off');
  wr1.speed = 2.6;
  offensePlayers.push(wr1);
  // WR2 right (8) — Higgins #17
  const wr2 = makePlayer(cx + 20, scrY - 0.5, oColor, '#fff', 17, 'wr', 'off');
  wr2.speed = 2.5;
  offensePlayers.push(wr2);
  // TE (9) — #85
  const te = makePlayer(cx + 6, scrY + 0.5, oColor, '#fff', 85, 'te', 'off');
  te.speed = 2.1;
  offensePlayers.push(te);
  // Slot WR (10) — #11
  const slot = makePlayer(cx - 10, scrY - 0.3, oColor, '#fff', 11, 'wr', 'off');
  slot.speed = 2.4;
  offensePlayers.push(slot);

  // --- Defense (tighter AI for 12-15 yr olds) ---
  // D-Line (0-3) — 4-3 front
  for (let j = -1; j <= 2; j++) {
    const dp = makePlayer(cx + j * 3.0 - 1.5, scrY - 1.5, CPU_NAVY, CPU_SILVER, 90 + j + 1, 'dline', 'def');
    dp.speed = 1.8 + Math.random() * 0.25;
    dp.shoulderW = 1.15;
    defensePlayers.push(dp);
  }
  // Linebackers (4-6) — smarter pursuit angles
  for (let k = 0; k < 3; k++) {
    const xOff = (k - 1) * 8;
    const lb = makePlayer(cx + xOff, scrY - 6 + Math.random() * 0.5, CPU_NAVY, CPU_SILVER, 50 + k * 3, 'lb', 'def');
    lb.speed = 2.0 + Math.random() * 0.2;
    defensePlayers.push(lb);
  }
  // Corners (7-8) — fast, sticky coverage
  const cb1 = makePlayer(cx - 19, scrY - 2, CPU_NAVY, CPU_SILVER, 24, 'cb', 'def');
  cb1.speed = 2.3 + Math.random() * 0.2;
  defensePlayers.push(cb1);
  const cb2 = makePlayer(cx + 19, scrY - 2, CPU_NAVY, CPU_SILVER, 21, 'cb', 'def');
  cb2.speed = 2.3 + Math.random() * 0.2;
  defensePlayers.push(cb2);
  // Safeties (9-10) — deep zone, fast close
  const s1 = makePlayer(cx - 7, scrY - 15, CPU_NAVY, CPU_SILVER, 14, 'safety', 'def');
  s1.speed = 2.4 + Math.random() * 0.2;
  defensePlayers.push(s1);
  const s2 = makePlayer(cx + 7, scrY - 17, CPU_NAVY, CPU_SILVER, 31, 'safety', 'def');
  s2.speed = 2.4 + Math.random() * 0.2;
  defensePlayers.push(s2);

  // Reset play state
  passThrown = false;
  passTarget = -1;
  receiverControlled = false;
  ball.visible = false;
  tackled = false;
  spinCooldown = 0;
  playTimer = 0;
  ballCarrier = null;
  hitStop = 0;
}

// --- Start Play ---
function startPlay(type) {
  playType = type;
  tackled = false;
  playTimer = 0;
  passThrown = false;
  receiverControlled = false;
  ball.visible = false;
  ball.airTime = 0;
  hitStop = 0;
  drivePlays++;

  if (type.indexOf('run') === 0) {
    ballCarrier = offensePlayers[6]; // RB
    gameStats.rushAttempts++;
  } else {
    ballCarrier = offensePlayers[5]; // QB
    gameStats.attempts++;
  }

  sfxSnap();
  showCommentary(COMMENTARY_SNAP);
  gameState = 'snap';
  stateTimer = 0;
  analyticsEvent('play_start', { type, down, yardsToGo, fieldPos: ballOn });
}

function transitionToPlaying() {
  gameState = 'playing';
  stateTimer = 0;
  sfxWhistle();
}

// --- End Play ---
function endPlay(result) {
  if (gameState === 'result' || gameState === 'celebration' || gameState === 'turnover') return;

  const carrierYardLine = fieldYToYardLine(ballCarrier.y);
  const yardsGained = Math.round(carrierYardLine - lineOfScrimmage);

  gameStats.plays++;
  driveYards += Math.max(0, yardsGained);

  // Track yards
  if (playType && playType.indexOf('run') === 0) {
    gameStats.rushYards += Math.max(0, yardsGained);
  } else if (receiverControlled) {
    gameStats.passYards += Math.max(0, yardsGained);
  }
  gameStats.totalYards += Math.max(0, yardsGained);
  if (yardsGained > gameStats.longestPlay) gameStats.longestPlay = yardsGained;
  if (yardsGained >= 20) gameStats.bigPlays.push({ yards: yardsGained, type: playType, quarter });

  // Sack detection
  if (playType && playType.indexOf('pass') === 0 && !passThrown && yardsGained < 0) {
    gameStats.sacks++;
    showCommentary(COMMENTARY_SACK);
  }

  // Track 3rd/4th down conversions
  if (down === 3) {
    gameStats.thirdDownAtt++;
    if (yardsGained >= yardsToGo) gameStats.thirdDownConv++;
  }
  if (down === 4) {
    gameStats.fourthDownAtt++;
    if (yardsGained >= yardsToGo) gameStats.fourthDownConv++;
  }

  // Touchdown check
  if (carrierYardLine >= 100) {
    score.bengals += 7;
    gameStats.touchdowns++;
    gameStats.drives++;
    gameStats.driveResults.push('td');
    store.totalTDs++;
    playsRun++;
    playsThisQuarter++;
    gameState = 'celebration';
    celebTimer = 0;
    resultMsg = 'TOUCHDOWN';
    resultSubMsg = yardsGained + ' YARD ' + (playType.indexOf('pass') === 0 ? 'PASS' : 'RUN');
    sfxTD();
    showCommentary(COMMENTARY_TD);
    triggerFlash(ORANGE, 0.55);
    triggerShake(10);
    const sx = fieldToScreenX(ballCarrier.x);
    const sy = fieldToScreenY(ballCarrier.y);
    spawnTDBurst(sx, sy);
    setTimeout(sfxWhoDey, 600);
    const tdCoins = 20 + Math.min(yardsGained, 50);
    store.coins += tdCoins;
    store.totalCoins += tdCoins;
    saveStore();
    analyticsEvent('touchdown', { yards: yardsGained, coins: tdCoins });
    // Reset drive tracking
    drivePlays = 0;
    driveYards = 0;
    return;
  }

  // Safety check
  if (carrierYardLine <= 0) {
    score.cpu += 2;
    playsRun++;
    playsThisQuarter++;
    gameState = 'result';
    resultMsg = 'SAFETY';
    resultSubMsg = 'CPU scores 2 points';
    resultTimer = 0;
    sfxTurnover();
    triggerShake(5);
    return;
  }

  // Normal result
  lineOfScrimmage = Math.max(1, Math.min(99, carrierYardLine));
  ballOn = lineOfScrimmage;

  if (result === 'incomplete') {
    resultMsg = 'INCOMPLETE';
    resultSubMsg = '';
    sfxIncomplete();
    showCommentary(COMMENTARY_INCOMPLETE);
    down++;
  } else if (result === 'interception') {
    return;
  } else {
    yardsToGo -= yardsGained;
    if (yardsGained > 0) {
      resultMsg = yardsGained + ' YARD GAIN';
      if (yardsGained >= 20) {
        resultSubMsg = 'BIG PLAY!';
        sfxBigPlay();
        showCommentary(COMMENTARY_BIGPLAY);
        triggerShake(6);
        const sx = fieldToScreenX(ballCarrier.x);
        const sy = fieldToScreenY(ballCarrier.y);
        spawnSparks(sx, sy, 18, GOLD_BRIGHT, ORANGE);
      } else {
        resultSubMsg = '';
        showCommentary(COMMENTARY_TACKLE);
      }
    } else if (yardsGained < 0) {
      resultMsg = 'LOSS OF ' + Math.abs(yardsGained);
      resultSubMsg = '';
    } else {
      resultMsg = 'NO GAIN';
      resultSubMsg = '';
      showCommentary(COMMENTARY_TACKLE);
    }
    sfxHit();
    hitStop = 0.1;
    triggerShake(3.5);
    const hx = fieldToScreenX(ballCarrier.x);
    const hy = fieldToScreenY(ballCarrier.y);
    spawnSparks(hx, hy, 12, WHITE, METALLIC);
    down++;
  }

  // First down check
  if (yardsToGo <= 0 && result !== 'incomplete') {
    down = 1;
    yardsToGo = 10;
    gameStats.firstDowns++;
    resultSubMsg = 'FIRST DOWN';
    sfxFirstDown();
    sfxCrowd();
    showCommentary(COMMENTARY_FIRSTDOWN);
    store.coins += 5;
    store.totalCoins += 5;
    saveStore();
  }

  // Turnover on downs
  if (down > 4) {
    playsRun++;
    playsThisQuarter++;
    gameStats.turnovers++;
    gameStats.drives++;
    gameStats.driveResults.push('turnover');
    gameState = 'turnover';
    resultMsg = 'TURNOVER ON DOWNS';
    resultSubMsg = '';
    resultTimer = 0;
    sfxTurnover();
    triggerShake(5);
    drivePlays = 0;
    driveYards = 0;
    return;
  }

  playsRun++;
  playsThisQuarter++;
  gameState = 'result';
  resultTimer = 0;
}

// --- Passing ---
function throwBall(targetIdx) {
  if (passThrown) return;
  passThrown = true;
  passTarget = targetIdx;
  ball.visible = true;
  ball.x = ballCarrier.x;
  ball.y = ballCarrier.y;
  ball.airTime = 0;

  const target = offensePlayers[targetIdx];
  const leadY = target.y - 5.5;
  const leadX = target.x + (target.vx || 0) * 9;
  const dist = Math.hypot(leadX - ball.x, leadY - ball.y);
  const ballSpeed = 46;
  ball.dx = ((leadX - ball.x) / dist) * ballSpeed;
  ball.dy = ((leadY - ball.y) / dist) * ballSpeed;
  sfxCatch();
  showCommentary(COMMENTARY_PASS_THROWN);
}

function findBestReceiver() {
  const receivers = [7, 8, 9, 10];
  let bestIdx = receivers[0];
  let bestScore = -Infinity;
  receivers.forEach(function(idx) {
    const r = offensePlayers[idx];
    let nearestDef = Infinity;
    defensePlayers.forEach(function(d) {
      nearestDef = Math.min(nearestDef, Math.hypot(d.x - r.x, d.y - r.y));
    });
    const downfieldBonus = yardLineToFieldY(lineOfScrimmage) - r.y;
    const sc = downfieldBonus * 2 + nearestDef * 3.5;
    if (sc > bestScore) { bestScore = sc; bestIdx = idx; }
  });
  return bestIdx;
}

// --- Receiver Routes ---
function runReceiverRoutes(dt) {
  const isDeep = playType === 'pass-deep';
  const speed = 2.7;

  // WR1 left (7) — go route or slant
  const wr1 = offensePlayers[7];
  if (isDeep) {
    wr1.y -= speed * dt;
    wr1.x += 0.2 * dt;
  } else {
    if (playTimer < 0.9) { wr1.y -= speed * dt; }
    else { wr1.y -= speed * dt * 0.3; wr1.x += speed * dt * 0.65; }
  }

  // WR2 right (8) — go or out
  const wr2 = offensePlayers[8];
  if (isDeep) {
    wr2.y -= speed * dt;
    wr2.x -= 0.2 * dt;
  } else {
    if (playTimer < 0.75) { wr2.y -= speed * dt; }
    else { wr2.x += speed * dt * 0.55; wr2.y -= speed * dt * 0.35; }
  }

  // TE (9) — crossing route
  const te = offensePlayers[9];
  if (playTimer < 0.55) { te.y -= speed * dt * 0.8; }
  else { te.x -= speed * dt * 0.85; te.y -= speed * dt * 0.3; }

  // Slot WR (10) — quick slant
  const slot = offensePlayers[10];
  if (playTimer < 0.35) { slot.y -= speed * dt * 0.7; }
  else { slot.x += speed * dt * 0.7; slot.y -= speed * dt * 0.2; }
}

// --- Defense AI (TIGHT for 12-15 yr olds) ---
function updateDefense(dt) {
  if (!ballCarrier) return;
  const difficultyScale = 0.78; // Tight but beatable

  defensePlayers.forEach(function(d, i) {
    if (d.juked > 0) { d.juked--; return; }

    let targetX = ballCarrier.x;
    let targetY = ballCarrier.y;
    let chaseSpeed = d.speed;

    if (d.role === 'dline') {
      chaseSpeed *= 0.72;
    } else if (d.role === 'lb') {
      chaseSpeed *= 0.82;
      // Pursuit angle — anticipate runner direction
      if (input.left) targetX -= 3;
      if (input.right) targetX += 3;
      targetX += (ballCarrier.x > FIELD_WIDTH / 2 ? 2.5 : -2.5);
    } else if (d.role === 'cb') {
      chaseSpeed *= 0.85;
    } else if (d.role === 'safety') {
      chaseSpeed *= 0.84;
      targetY -= 1.5; // Angle to cut off
    }

    // Slight organic randomness
    targetX += Math.sin(i * 3.7 + playTimer * 2.8) * 1.0;

    chaseSpeed *= difficultyScale;

    const angle = Math.atan2(targetY - d.y, targetX - d.x);
    d.x += Math.cos(angle) * chaseSpeed * dt;
    d.y += Math.sin(angle) * chaseSpeed * dt;
  });
}

function updatePassCoverage(dt) {
  defensePlayers.forEach(function(d, i) {
    if (d.juked > 0) { d.juked--; return; }

    if (d.role === 'dline') {
      // Pass rush — faster than run chase
      const angle = Math.atan2(ballCarrier.y - d.y, ballCarrier.x - d.x);
      d.x += Math.cos(angle) * d.speed * 0.6 * dt;
      d.y += Math.sin(angle) * d.speed * 0.6 * dt;
    } else if (d.role === 'cb') {
      // Man coverage — tight
      let nearWR = null;
      let nearDist = Infinity;
      [7, 8, 9, 10].forEach(function(idx) {
        const r = offensePlayers[idx];
        const dist = Math.hypot(r.x - d.x, r.y - d.y);
        if (dist < nearDist) { nearDist = dist; nearWR = r; }
      });
      if (nearWR) {
        const angle = Math.atan2(nearWR.y - d.y, nearWR.x - d.x);
        d.x += Math.cos(angle) * d.speed * 0.78 * dt;
        d.y += Math.sin(angle) * d.speed * 0.78 * dt;
      }
    } else if (d.role === 'lb') {
      // Zone with QB read
      const angle = Math.atan2(ballCarrier.y - d.y, ballCarrier.x - d.x);
      d.x += Math.cos(angle) * d.speed * 0.4 * dt;
      d.y += Math.sin(angle) * d.speed * 0.4 * dt;
    } else if (d.role === 'safety') {
      // Deep zone — reactive
      const scrY = yardLineToFieldY(lineOfScrimmage);
      const tgtY = scrY - 20;
      d.y += (tgtY - d.y) * 0.03;
      // Read ball in air
      if (ball.visible) {
        const angle = Math.atan2(ball.y - d.y, ball.x - d.x);
        d.x += Math.cos(angle) * d.speed * 0.5 * dt;
        d.y += Math.sin(angle) * d.speed * 0.5 * dt;
      }
    }
  });
}

// --- Tackle Check ---
function checkTackle() {
  if (!ballCarrier || tackled) return;
  if (playTimer < 0.7) return; // Grace period

  defensePlayers.forEach(function(d) {
    if (tackled || d.juked > 0) return;
    const dist = Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y);
    if (dist < 2.0) {
      // Broken tackle chance — turbo helps, spin move proximity too
      if (input.turbo && Math.random() < 0.30) {
        d.juked = 20;
        sfxSpin();
        showCommentary(COMMENTARY_JUKE);
        return;
      }
      if (Math.random() < 0.15) {
        d.juked = 14;
        return;
      }
      tackled = true;
      sfxHit();
      hitStop = 0.12;
      const sx = fieldToScreenX(ballCarrier.x);
      const sy = fieldToScreenY(ballCarrier.y);
      spawnSparks(sx, sy, 14, WHITE, METALLIC);
      triggerShake(4.5);
      setTimeout(function() { endPlay('tackled'); }, 350);
    }
  });
}

// --- O-Line Blocking ---
function updateOLine(dt) {
  for (let i = 0; i < 5; i++) {
    const lineman = offensePlayers[i];
    let nearDef = null;
    let nearDist = 13;
    defensePlayers.forEach(function(d) {
      const dist = Math.hypot(d.x - lineman.x, d.y - lineman.y);
      if (dist < nearDist) { nearDist = dist; nearDef = d; }
    });
    if (nearDef) {
      const angle = Math.atan2(nearDef.y - lineman.y, nearDef.x - lineman.x);
      lineman.x += Math.cos(angle) * 1.4 * dt;
      lineman.y += Math.sin(angle) * 1.4 * dt;
      if (nearDist < 2.5) {
        nearDef.x += Math.cos(angle) * 1.0 * dt;
        nearDef.y += Math.sin(angle) * 1.0 * dt;
      }
    } else if (ballCarrier) {
      lineman.y += (ballCarrier.y - 3 - lineman.y) * 0.03;
    }
  }
}

// --- Update: Run Play ---
function updateRunPlay(dt) {
  if (!ballCarrier || tackled) return;
  playTimer += dt;

  const speed = ballCarrier.speed * (input.turbo ? 1.7 : 1.0);

  let dx = 0, dy = 0;
  if (input.up) dy = -speed * dt;
  if (input.down) dy = speed * dt * 0.5;
  if (input.left) dx = -speed * dt * 0.85;
  if (input.right) dx = speed * dt * 0.85;

  // Initial burst direction
  if (dx === 0 && dy === 0 && playTimer < 0.65) {
    if (playType === 'run-left') { dx = -speed * dt * 0.5; dy = -speed * dt * 0.3; }
    else if (playType === 'run-right') { dx = speed * dt * 0.5; dy = -speed * dt * 0.3; }
    else { dy = -speed * dt * 0.4; }
  }

  // Commentary for run plays
  if (playTimer > 0.5 && playTimer < 0.55) {
    showCommentary(COMMENTARY_RUN);
  }

  ballCarrier.x += dx;
  ballCarrier.y += dy;
  ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));
  ballCarrier.y = Math.max(0, Math.min(TOTAL_YARDS, ballCarrier.y));

  // Speed demon trail
  if (store.unlockedItems.indexOf('speed_skin') >= 0 && input.turbo && Math.random() < 0.4) {
    spawnEmber(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y));
  }

  // Spin move
  if (input.spin && spinCooldown <= 0) {
    spinCooldown = 1.0;
    gameStats.spinsUsed++;
    sfxSpin();
    showCommentary(COMMENTARY_JUKE);
    ballCarrier.spinAnim = 1.0;
    defensePlayers.forEach(function(d) {
      if (Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y) < 6) d.juked = 26;
    });
    if (input.left) ballCarrier.x -= 3.5;
    else if (input.right) ballCarrier.x += 3.5;
    else ballCarrier.x += (Math.random() > 0.5 ? 3.0 : -3.0);
    ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));
  }
  if (spinCooldown > 0) spinCooldown -= dt;

  updateOLine(dt);
  updateDefense(dt);
  checkTackle();

  if (fieldYToYardLine(ballCarrier.y) >= 100) endPlay('td');
}

// --- Update: Pass Play ---
function updatePassPlay(dt) {
  if (tackled) return;
  playTimer += dt;

  if (!passThrown) {
    // QB pocket movement
    const speed = ballCarrier.speed * 0.7 * (input.turbo ? 1.3 : 1.0);
    if (input.up) ballCarrier.y -= speed * dt * 0.5;
    if (input.down) ballCarrier.y += speed * dt * 0.7;
    if (input.left) ballCarrier.x -= speed * dt;
    if (input.right) ballCarrier.x += speed * dt;
    ballCarrier.x = Math.max(3, Math.min(FIELD_WIDTH - 3, ballCarrier.x));

    runReceiverRoutes(dt);
    updatePassCoverage(dt);

    // Throw on spin button
    if (input.spin) {
      throwBall(findBestReceiver());
    }

    // QB sack — tighter pressure window
    if (playTimer > 1.1) checkTackle();

    updateOLine(dt);
  } else {
    // Ball in air
    ball.x += ball.dx * dt;
    ball.y += ball.dy * dt;
    ball.airTime += dt;

    const target = offensePlayers[passTarget];
    const distToTarget = Math.hypot(ball.x - target.x, ball.y - target.y);

    if (distToTarget < 3.0) {
      // Caught
      ball.visible = false;
      sfxCatch();
      showCommentary(COMMENTARY_CATCH);
      gameStats.completions++;
      ballCarrier = target;
      receiverControlled = true;
      spawnSparks(fieldToScreenX(target.x), fieldToScreenY(target.y), 8, ORANGE, WHITE);
    }

    // Out of bounds
    if (ball.y < -10 || ball.y > TOTAL_YARDS + 10 || ball.x < -10 || ball.x > FIELD_WIDTH + 10) {
      ball.visible = false;
      endPlay('incomplete');
      return;
    }

    // Overthrown
    if (ball.airTime > 2.5 && ball.visible) {
      ball.visible = false;
      endPlay('incomplete');
      return;
    }

    // Interception check — fair but punishing for bad reads
    if (ball.visible) {
      defensePlayers.forEach(function(d) {
        if (!ball.visible) return;
        const distBall = Math.hypot(d.x - ball.x, d.y - ball.y);
        if (distBall < 2.0 && Math.random() < 0.09) {
          ball.visible = false;
          tackled = true;
          score.cpu += 7;
          gameStats.turnovers++;
          gameStats.drives++;
          gameStats.driveResults.push('turnover');
          playsRun++;
          playsThisQuarter++;
          gameState = 'turnover';
          resultMsg = 'INTERCEPTED';
          resultSubMsg = '';
          resultTimer = 0;
          sfxTurnover();
          showCommentary(COMMENTARY_INTERCEPTION);
          triggerFlash('#ff0000', 0.35);
          triggerShake(7);
          spawnSparks(fieldToScreenX(ball.x), fieldToScreenY(ball.y), 18, '#ff3333', WHITE);
          drivePlays = 0;
          driveYards = 0;
        }
      });
    }

    // Receiver control after catch
    if (receiverControlled && !tackled) {
      const rSpeed = ballCarrier.speed * (input.turbo ? 1.7 : 1.0);
      if (input.up) ballCarrier.y -= rSpeed * dt;
      if (input.down) ballCarrier.y += rSpeed * dt * 0.5;
      if (input.left) ballCarrier.x -= rSpeed * dt * 0.85;
      if (input.right) ballCarrier.x += rSpeed * dt * 0.85;
      ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));

      // Speed demon trail
      if (store.unlockedItems.indexOf('speed_skin') >= 0 && input.turbo && Math.random() < 0.4) {
        spawnEmber(fieldToScreenX(ballCarrier.x), fieldToScreenY(ballCarrier.y));
      }

      if (input.spin && spinCooldown <= 0) {
        spinCooldown = 1.0;
        gameStats.spinsUsed++;
        sfxSpin();
        showCommentary(COMMENTARY_JUKE);
        ballCarrier.spinAnim = 1.0;
        defensePlayers.forEach(function(d) {
          if (Math.hypot(d.x - ballCarrier.x, d.y - ballCarrier.y) < 6) d.juked = 26;
        });
        if (input.left) ballCarrier.x -= 3.5;
        else if (input.right) ballCarrier.x += 3.5;
        else ballCarrier.x += (Math.random() > 0.5 ? 3.0 : -3.0);
        ballCarrier.x = Math.max(1, Math.min(FIELD_WIDTH - 1, ballCarrier.x));
      }
      if (spinCooldown > 0) spinCooldown -= dt;

      updateDefense(dt);
      checkTackle();

      if (fieldYToYardLine(ballCarrier.y) >= 100) endPlay('td');
    }

    // Ball still in air
    if (!receiverControlled && ball.visible) {
      runReceiverRoutes(dt);
      defensePlayers.forEach(function(d) {
        if (d.juked > 0) { d.juked--; return; }
        if (d.role === 'cb' || d.role === 'safety') {
          const angle = Math.atan2(ball.y - d.y, ball.x - d.x);
          d.x += Math.cos(angle) * d.speed * 0.88 * dt;
          d.y += Math.sin(angle) * d.speed * 0.88 * dt;
        }
      });
    }
  }
}

// --- CPU Drive Simulation ---
function simulateCPUDrive() {
  const roll = Math.random();
  if (roll < 0.22) {
    score.cpu += 7;
    resultMsg = 'CPU TOUCHDOWN';
    resultSubMsg = 'Defense couldn\'t hold';
  } else if (roll < 0.45) {
    score.cpu += 3;
    resultMsg = 'CPU FIELD GOAL';
    resultSubMsg = '';
  } else {
    resultMsg = 'DEFENSE HOLDS';
    resultSubMsg = 'Your ball';
  }
}

// --- Quarter / Half / Game Transitions ---
function checkQuarterEnd() {
  if (playsThisQuarter >= PLAYS_PER_QUARTER) {
    playsThisQuarter = 0;
    if (quarter === 2) {
      gameState = 'halftime';
      stateTimer = 0;
      return true;
    } else if (quarter >= 4) {
      gameState = 'gameOver';
      stateTimer = 0;
      sfxGameOver();
      store.totalGames++;
      store.totalYards += gameStats.totalYards;
      if (gameStats.longestPlay > store.longestPlay) store.longestPlay = gameStats.longestPlay;
      if (score.bengals > store.bestScore) store.bestScore = score.bengals;
      let gameCoins = 25;
      if (score.bengals > score.cpu) gameCoins += 40;
      store.coins += gameCoins;
      store.totalCoins += gameCoins;
      saveStore();
      analyticsEvent('game_complete', {
        score: score.bengals + '-' + score.cpu,
        win: score.bengals > score.cpu,
        totalYards: gameStats.totalYards,
        tds: gameStats.touchdowns
      });
      return true;
    }
    quarter++;
  }
  return false;
}

function updateCamera() {
  if (!ballCarrier) return;
  const targetCam = ballCarrier.y - (H / pixelsPerYard) * 0.45;
  const minCam = -5;
  const maxCam = TOTAL_YARDS - H / pixelsPerYard + 5;
  camTargetY = Math.max(minCam, Math.min(maxCam, targetCam));
  camY += (camTargetY - camY) * 0.09;
}

// --- Utility: Rounded Rectangle ---
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// --- Tiger Stripe Background Pattern ---
function drawTigerStripes(x, y, w, h, alpha, spacing) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = 'rgba(251,79,20,' + (alpha || 0.04) + ')';
  ctx.lineWidth = Math.max(8, w * 0.03);
  const sp = spacing || 55;
  for (let s = -w; s < w * 2; s += sp) {
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.lineTo(x + s + h * 0.45, y + h);
    ctx.stroke();
  }
  ctx.restore();
}

// --- Draw Field ---
function drawField() {
  pixelsPerYard = H / (TOTAL_YARDS * 0.55);

  // Field theme colors
  let fieldMain = FIELD_GREEN;
  let fieldAlt = FIELD_DARK;
  if (store.equippedField === 'night_field') {
    fieldMain = '#124B16';
    fieldAlt = '#0E3D12';
  } else if (store.equippedField === 'snow_field') {
    fieldMain = '#4A7A4E';
    fieldAlt = '#3E6E42';
  } else if (store.equippedField === 'prime_field') {
    fieldMain = '#1A5E22';
    fieldAlt = '#14521C';
  }

  // Background
  ctx.fillStyle = '#0B320E';
  ctx.fillRect(0, 0, W, H);

  // Field stripes (5-yard increments)
  for (let yd = 0; yd <= 100; yd += 5) {
    const y1 = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    const y2 = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd - 5));
    if (y2 < -50 || y1 > H + 50) continue;
    ctx.fillStyle = (Math.floor(yd / 5) % 2 === 0) ? fieldMain : fieldAlt;
    ctx.fillRect(0, Math.min(y1, y2), W, Math.abs(y2 - y1));
  }

  // Snow particles
  if (store.equippedField === 'snow_field') {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137 + Date.now() / 35) % W);
      const sy = ((i * 89 + Date.now() / 22) % H);
      ctx.beginPath();
      ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Prime time spotlight effect
  if (store.equippedField === 'prime_field') {
    const spotGrad = ctx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, W * 0.6);
    spotGrad.addColorStop(0, 'rgba(255,255,200,0.04)');
    spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // Opponent endzone (Bengals) with tiger stripes
  const ezTop = fieldToScreenY(0);
  const ezBottom = fieldToScreenY(ENDZONE_YARDS);
  if (ezBottom > -50 && ezTop < H + 50) {
    ctx.fillStyle = ENDZONE_ORANGE;
    ctx.fillRect(0, ezTop, W, ezBottom - ezTop);

    // Tiger stripes
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, ezTop, W, ezBottom - ezTop);
    ctx.clip();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = Math.max(6, pixelsPerYard * 1.3);
    for (let s = -W; s < W * 2; s += 26) {
      ctx.beginPath();
      ctx.moveTo(s, ezTop);
      ctx.lineTo(s + 40, ezBottom);
      ctx.stroke();
    }
    ctx.restore();

    // BENGALS text
    ctx.save();
    ctx.font = '700 ' + Math.max(12, pixelsPerYard * 3.2) + 'px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('B E N G A L S', W / 2, (ezTop + ezBottom) / 2);
    ctx.restore();
  }

  // Own endzone (CPU)
  const ownTop = fieldToScreenY(ENDZONE_YARDS + FIELD_YARDS);
  const ownBottom = fieldToScreenY(TOTAL_YARDS);
  if (ownBottom > -50 && ownTop < H + 50) {
    ctx.fillStyle = CPU_NAVY;
    ctx.fillRect(0, ownTop, W, ownBottom - ownTop);
    ctx.save();
    ctx.font = '700 ' + Math.max(12, pixelsPerYard * 3.2) + 'px ' + FONT_UI;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText('C P U', W / 2, (ownTop + ownBottom) / 2);
    ctx.restore();
  }

  // Sidelines
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3;
  const sideLeft = fieldToScreenX(0);
  const sideRight = fieldToScreenX(FIELD_WIDTH);
  ctx.beginPath();
  ctx.moveTo(sideLeft, 0); ctx.lineTo(sideLeft, H);
  ctx.moveTo(sideRight, 0); ctx.lineTo(sideRight, H);
  ctx.stroke();

  // Yard lines and numbers
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 1;
  for (let yd = 0; yd <= 100; yd += 5) {
    const y = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    if (y < -20 || y > H + 20) continue;
    ctx.beginPath();
    ctx.moveTo(fieldToScreenX(1), y);
    ctx.lineTo(fieldToScreenX(FIELD_WIDTH - 1), y);
    ctx.stroke();

    if (yd > 0 && yd < 100 && yd % 10 === 0) {
      const label = yd <= 50 ? yd : 100 - yd;
      ctx.font = '700 ' + Math.max(8, pixelsPerYard * 1.5) + 'px ' + FONT_UI;
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, fieldToScreenX(5), y);
      ctx.fillText(label, fieldToScreenX(FIELD_WIDTH - 5), y);
    }
  }

  // Hash marks
  for (let yd = 0; yd <= 100; yd++) {
    const y = fieldToScreenY(ENDZONE_YARDS + (FIELD_YARDS - yd));
    if (y < -5 || y > H + 5) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(fieldToScreenX(FIELD_WIDTH / 3), y - 0.5, 3, 1);
    ctx.fillRect(fieldToScreenX(FIELD_WIDTH * 2 / 3), y - 0.5, 3, 1);
  }

  // Line of scrimmage
  const losY = fieldToScreenY(yardLineToFieldY(lineOfScrimmage));
  ctx.strokeStyle = 'rgba(46,134,222,0.55)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, losY); ctx.lineTo(W, losY);
  ctx.stroke();
  ctx.setLineDash([]);

  // First down line
  const fdYard = Math.min(100, lineOfScrimmage + yardsToGo);
  const fdY = fieldToScreenY(yardLineToFieldY(fdYard));
  ctx.strokeStyle = 'rgba(232,197,38,0.55)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, fdY); ctx.lineTo(W, fdY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// --- Draw Player (Realistic Silhouette Style) ---
function drawPlayer(p, isBallCarrier) {
  const sx = fieldToScreenX(p.x);
  const sy = fieldToScreenY(p.y);
  const r = Math.max(9, pixelsPerYard * 1.35);

  if (sy < -30 || sy > H + 30) return;

  ctx.save();

  // Spin animation
  if (p.spinAnim > 0) {
    ctx.translate(sx, sy);
    ctx.rotate(p.spinAnim * Math.PI * 4);
    ctx.translate(-sx, -sy);
    p.spinAnim -= 0.05;
    if (p.spinAnim < 0) p.spinAnim = 0;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(sx + 1, sy + 2.5, r * 0.9, r * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (shoulder-width varies by position)
  const sw = r * (p.shoulderW || 0.95);
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.outline;
  ctx.lineWidth = 2;

  // Rounded body shape (not just a circle — slightly wider at shoulders)
  ctx.beginPath();
  ctx.ellipse(sx, sy, sw, r, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Helmet (small arc on top)
  const helmR = r * (p.helmet || 0.45);
  ctx.fillStyle = p.team === 'off' ? p.outline : CPU_NAVY;
  ctx.beginPath();
  ctx.arc(sx, sy - r * 0.65, helmR, Math.PI, 0);
  ctx.fill();

  // Facemask line
  ctx.strokeStyle = 'rgba(200,200,200,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - helmR * 0.4, sy - r * 0.55);
  ctx.lineTo(sx + helmR * 0.4, sy - r * 0.55);
  ctx.stroke();

  // Tiger stripe on Bengals helmet
  if (p.team === 'off') {
    ctx.strokeStyle = 'rgba(251,79,20,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy - r * 0.65 - helmR);
    ctx.lineTo(sx, sy - r * 0.55);
    ctx.stroke();
  }

  // Ball carrier indicator — metallic ring with glow
  if (isBallCarrier) {
    const pulse = Math.sin(Date.now() / 100) * 0.2 + 0.8;
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = 6;
    ctx.strokeStyle = 'rgba(200,168,78,' + pulse + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(sx, sy, r + 3.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Juked indicator — daze dots
  if (p.juked > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let d = 0; d < 3; d++) {
      const dotAngle = (d / 3) * Math.PI * 2 + Date.now() / 180;
      ctx.beginPath();
      ctx.arc(sx + Math.cos(dotAngle) * (r + 4), sy - r - 4 + Math.sin(dotAngle) * 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Jersey number
  ctx.fillStyle = p.team === 'off' ? (p.color === '#F0F0F0' || p.color === METALLIC ? '#000' : WHITE) : '#ccc';
  ctx.font = '700 ' + Math.max(6, r * 0.7) + 'px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.num, sx, sy + 1);

  // Receiver target indicator during pass play
  if (gameState === 'playing' && playType && playType.indexOf('pass') === 0 && !passThrown &&
      (p.role === 'wr' || p.role === 'te')) {
    const tp = Math.sin(Date.now() / 180) * 0.2 + 0.5;
    ctx.strokeStyle = 'rgba(232,197,38,' + tp + ')';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(sx, sy, r + 9, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

// --- Draw Ball ---
function drawBall() {
  if (!ball.visible) return;
  const sx = fieldToScreenX(ball.x);
  const sy = fieldToScreenY(ball.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx + 2, sy + 4, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Football shape
  const angle = Math.atan2(ball.dy, ball.dx);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(angle);

  // Spiral rotation visual
  const spiralPhase = (Date.now() / 40) % (Math.PI * 2);
  const spiralScale = 0.85 + Math.sin(spiralPhase) * 0.15;

  ctx.scale(1, spiralScale);
  ctx.fillStyle = '#5A2D0C';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // Laces
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.lineTo(3, 0);
  ctx.stroke();
  for (let l = -2; l <= 2; l++) {
    ctx.beginPath();
    ctx.moveTo(l * 1.3, -1.2); ctx.lineTo(l * 1.3, 1.2);
    ctx.stroke();
  }
  ctx.restore();
}

// --- HUD (top scoreboard bar) ---
function drawHUD() {
  const hudH = 50;

  // Dark bar
  ctx.fillStyle = 'rgba(5,5,5,0.94)';
  ctx.fillRect(0, 0, W, hudH);

  // Bottom accent line (gradient orange)
  const grad = ctx.createLinearGradient(0, hudH - 2, W, hudH - 2);
  grad.addColorStop(0, 'rgba(251,79,20,0)');
  grad.addColorStop(0.2, ORANGE_DIM);
  grad.addColorStop(0.8, ORANGE_DIM);
  grad.addColorStop(1, 'rgba(251,79,20,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, hudH - 2, W, 2);

  // Score left: CIN
  ctx.font = '700 14px ' + FONT_UI;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = ORANGE;
  ctx.fillText('CIN', 10, hudH / 2 - 10);
  ctx.font = '700 18px ' + FONT_UI;
  ctx.fillStyle = WHITE;
  ctx.fillText('' + score.bengals, 44, hudH / 2 - 10);

  ctx.font = '600 12px ' + FONT_UI;
  ctx.fillStyle = CPU_SILVER;
  ctx.fillText('CPU', 10, hudH / 2 + 10);
  ctx.font = '700 15px ' + FONT_UI;
  ctx.fillStyle = METALLIC;
  ctx.fillText('' + score.cpu, 44, hudH / 2 + 10);

  // Down & distance center
  const ordinals = ['1st', '2nd', '3rd', '4th'];
  const downStr = ordinals[Math.min(down - 1, 3)] + ' & ' + yardsToGo;
  ctx.font = '700 13px ' + FONT_UI;

// --- Controls overlay ---
function drawControls() {
  if (gameState !== 'playing' && gameState !== 'snap') return;

  // D-pad
  const padSize = Math.min(135, W * 0.27);
  const btnSize = padSize * 0.32;
  const padX = 20 + padSize / 2;
  const padY = H - 28 - padSize / 2;

  dpadCenterX = padX;
  dpadCenterY = padY;
  dpadRadius = padSize / 2;

  // D-pad background circle
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.beginPath();
  ctx.arc(padX, padY, padSize / 2 + 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const dirs = [
    { key: 'up',    ox: 0,  oy: -1, label: '\u25B2' },
    { key: 'down',  ox: 0,  oy: 1,  label: '\u25BC' },
    { key: 'left',  ox: -1, oy: 0,  label: '\u25C0' },
    { key: 'right', ox: 1,  oy: 0,  label: '\u25B6' }
  ];

  dirs.forEach(function(d) {
    const bx = padX + d.ox * (btnSize + 3);
    const by = padY + d.oy * (btnSize + 3);
    const active = input[d.key];

    ctx.fillStyle = active ? 'rgba(251,79,20,0.5)' : 'rgba(255,255,255,0.06)';
    ctx.strokeStyle = active ? ORANGE : 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, bx - btnSize / 2, by - btnSize / 2, btnSize, btnSize, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = active ? WHITE : 'rgba(255,255,255,0.45)';
    ctx.font = Math.max(12, btnSize * 0.45) + 'px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.label, bx, by);
  });

  // Action buttons (right side)
  const abtnR = Math.min(40, W * 0.088);
  const rightMargin = 22;

  // Spin/Throw button
  btnSpinX = W - rightMargin - abtnR;
  btnSpinY = H - 28 - abtnR * 2 - 16 - abtnR;
  btnSpinR = abtnR;

  const spinActive = input.spin;
  ctx.fillStyle = spinActive ? 'rgba(251,79,20,0.65)' : 'rgba(251,79,20,0.15)';
  ctx.strokeStyle = 'rgba(251,79,20,0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(btnSpinX, btnSpinY, abtnR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  if (spinActive) {
    ctx.shadowColor = ORANGE;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(btnSpinX, btnSpinY, abtnR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = WHITE;
  ctx.font = '700 ' + Math.max(9, abtnR * 0.35) + 'px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const spinLabel = (playType && playType.indexOf('pass') === 0 && !passThrown) ? 'PASS' : 'JUKE';
  ctx.fillText(spinLabel, btnSpinX, btnSpinY);

  // Turbo button
  btnTurboX = W - rightMargin - abtnR;
  btnTurboY = H - 28 - abtnR;
  btnTurboR = abtnR;

  const turboActive = input.turbo;
  ctx.fillStyle = turboActive ? 'rgba(46,134,222,0.65)' : 'rgba(46,134,222,0.12)';
  ctx.strokeStyle = 'rgba(46,134,222,0.45)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(btnTurboX, btnTurboY, abtnR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  if (turboActive) {
    ctx.shadowColor = LOS_BLUE;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(btnTurboX, btnTurboY, abtnR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = WHITE;
  ctx.fillText('TURBO', btnTurboX, btnTurboY);
}

// --- Screen Flash & Shake Overlay ---
function drawScreenEffects() {
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlash * 0.4;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

// --- Notification Popup ---
function drawNotification(dt) {
  if (notification.timer <= 0) return;
  notification.timer -= dt;
  const alpha = Math.min(1, notification.timer * 2);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = DARK_CARD;
  ctx.strokeStyle = notification.color;
  ctx.lineWidth = 2;
  const nw = Math.min(280, W * 0.7);
  const nh = 38;
  const nx = W / 2 - nw / 2;
  const ny = H - 82;
  roundRect(ctx, nx, ny, nw, nh, 8);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = WHITE;
  ctx.font = '600 12px ' + FONT_UI;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(notification.text, W / 2, ny + nh / 2);
  ctx.restore();
}

    ctx.globalAlpha = 1;

    ctx.font = '700 ' + Math.min(18, W * 0.042) + 'px ' + FONT_UI;
    ctx.fillStyle = GOLD;
    ctx.fillText('CIN ' + score.bengals + '  -  CPU ' + score.cpu, W / 2, H * 0.56);
  }

  // Auto-advance
  if (celebTimer > 3.2) {

      startNewDrive();
    }
  }
}

// =========================================================================
// 15. TOUCH & KEYBOARD INPUT
// =========================================================================

function getDpadDirection(tx, ty) {
  const dx = tx - dpadCenterX;
  const dy = ty - dpadCenterY;
  const dist = Math.hypot(dx, dy);
  if (dist < dpadRadius * 0.2) return null;
  if (dist > dpadRadius * 1.6) return null;
  const angle = Math.atan2(dy, dx);
  const deg = angle * 180 / Math.PI;
  const result = { up: false, down: false, left: false, right: false };
  if (deg > -67.5 && deg < 67.5) result.right = true;
  if (deg > 22.5 && deg < 157.5) result.down = true;
  if (deg > 112.5 || deg < -112.5) result.left = true;
  if (deg > -157.5 && deg < -22.5) result.up = true;
  return result;
}

function isInCircle(tx, ty, cx, cy, r) {
  return Math.hypot(tx - cx, ty - cy) <= r * 1.4;
}

function isInRect(tx, ty, rx, ry, rw, rh) {
  return tx >= rx && tx <= rx + rw && ty >= ry && ty <= ry + rh;
}

function handleTouchStart(e) {
  e.preventDefault();
  e.stopPropagation();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    const tx = touch.clientX;
    const ty = touch.clientY;

    // Splash screen
    if (gameState === 'splash') {
      initAudio();
      for (let m = 0; m < menuButtons.length; m++) {
        const mb = menuButtons[m];
        if (isInRect(tx, ty, mb.x, mb.y, mb.w, mb.h)) {
          if (mb.action === 'shop') {
            sfxMenuSelect();
            gameState = 'shop';
            shopButtons = [];
            return;
          }
        }
      }
      if (isInRect(tx, ty, splashBtnBounds.x, splashBtnBounds.y, splashBtnBounds.w, splashBtnBounds.h)) {
        sfxMenuSelect();
        dailyBonusData = checkDailyBonus();
        if (dailyBonusData) {
          gameState = 'dailyBonus';
          stateTimer = 0;
        } else {
          newGame();
        }
        return;
      }
      return;
    }

    // Daily bonus
    if (gameState === 'dailyBonus') {
      newGame();
      return;
    }

    // Shop screen
    if (gameState === 'shop') {
      for (let b = 0; b < shopButtons.length; b++) {
        const btn = shopButtons[b];
        if (isInRect(tx, ty, btn.x, btn.y, btn.w, btn.h)) {
          sfxMenuSelect();
          if (btn.action === 'back') {
            gameState = 'splash';
            return;
          }
          if (btn.action.indexOf('tab_') === 0) {
            shopTab = btn.action.replace('tab_', '');
            shopButtons = [];
            return;
          }
          if (btn.action === 'watch_ad') {
            showRewardedAd(function(watched) {
              if (watched) {
                const reward = claimAdReward();
                showNotification('+' + reward + ' Coins!', GOLD);
              }
            });
            return;
          }
          if (btn.action === 'propass_7day') {
            const res = purchaseProPass('7day');
            showNotification(res.msg, res.ok ? GOLD : DANGER_RED);
            return;
          }
          if (btn.action === 'propass_perm') {
            const res = purchaseProPass('permanent');
            showNotification(res.msg, res.ok ? GOLD : DANGER_RED);
            return;
          }
          if (btn.action.indexOf('item_') === 0) {
            const itemId = btn.action.replace('item_', '');
            const owned = store.unlockedItems.indexOf(itemId) >= 0;
            if (owned) {
              equipItem(itemId);
              showNotification('Equipped!', ORANGE);
            } else {
              const res = purchaseItem(itemId);
              showNotification(res.msg, res.ok ? GOLD : DANGER_RED);
              if (res.ok) equipItem(itemId);
            }
            shopButtons = [];
            return;
          }
        }
      }
      return;
    }

    // Halftime
    if (gameState === 'halftime' && stateTimer > 1.5) {
      quarter = 3;
      playsThisQuarter = 0;
      startNewDrive();
      return;
    }

    // Game over
    if (gameState === 'gameOver') {
      for (let m = 0; m < menuButtons.length; m++) {
        const mb = menuButtons[m];
        if (isInRect(tx, ty, mb.x, mb.y, mb.w, mb.h)) {
          if (mb.action === 'newgame') {
            sfxMenuSelect();
            gameState = 'splash';
            stateTimer = 0;
            menuButtons = [];
            return;
          }
        }
      }
      return;
    }

    // Play select
    if (gameState === 'playSelect') {
      initAudio();
      for (let b = 0; b < playButtons.length; b++) {
        const btn = playButtons[b];
        if (isInRect(tx, ty, btn.x, btn.y, btn.w, btn.h)) {
          sfxMenuSelect();
          startPlay(btn.play);
          return;
        }
      }
      return;
    }

    // During play
    if (gameState === 'playing' || gameState === 'snap') {
      // D-pad
      const ddir = getDpadDirection(tx, ty);
      if (ddir) {
        dpadTouchId = touch.identifier;
        input.up = ddir.up;
        input.down = ddir.down;
        input.left = ddir.left;
        input.right = ddir.right;
        continue;
      }

      // Spin/Throw button
      if (isInCircle(tx, ty, btnSpinX, btnSpinY, btnSpinR)) {
        spinTouchId = touch.identifier;
        input.spin = true;
        continue;
      }

      // Turbo button
      if (isInCircle(tx, ty, btnTurboX, btnTurboY, btnTurboR)) {
        turboTouchId = touch.identifier;
        input.turbo = true;
        continue;
      }

      // Tap on receiver during pass play
      if (gameState === 'playing' && playType && playType.indexOf('pass') === 0 && !passThrown) {
        const receivers = [7, 8, 9, 10];
        let closest = -1;
        let closestDist = 75;
        receivers.forEach(function(idx) {
          const p = offensePlayers[idx];
          const sx = fieldToScreenX(p.x);
          const sy = fieldToScreenY(p.y);
          const d = Math.hypot(tx - sx, ty - sy);
          if (d < closestDist) { closestDist = d; closest = idx; }
        });
        if (closest >= 0) {
          throwBall(closest);
        }
      }
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  e.stopPropagation();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    const tx = touch.clientX;
    const ty = touch.clientY;

    if (touch.identifier === dpadTouchId) {
      const ddir = getDpadDirection(tx, ty);
      if (ddir) {
        input.up = ddir.up;
        input.down = ddir.down;
        input.left = ddir.left;
        input.right = ddir.right;
      } else {
        input.up = false;
        input.down = false;
        input.left = false;
        input.right = false;
      }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  e.stopPropagation();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    if (touch.identifier === dpadTouchId) {
      dpadTouchId = -1;
      input.up = false;
      input.down = false;
      input.left = false;
      input.right = false;
    }
    if (touch.identifier === spinTouchId) {
      spinTouchId = -1;
      input.spin = false;
    }
    if (touch.identifier === turboTouchId) {
      turboTouchId = -1;
      input.turbo = false;
    }
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// Mouse fallback for desktop
let mouseDown = false;
canvas.addEventListener('mousedown', function(e) {
  mouseDown = true;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }] };
  fake.preventDefault = function() {};
  fake.stopPropagation = function() {};
  handleTouchStart(fake);
});
canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }] };
  fake.preventDefault = function() {};
  fake.stopPropagation = function() {};
  handleTouchMove(fake);
});
canvas.addEventListener('mouseup', function(e) {
  mouseDown = false;
  const fake = { changedTouches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }] };
  fake.preventDefault = function() {};
  fake.stopPropagation = function() {};
  handleTouchEnd(fake);
});

// Keyboard (desktop)
window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp') input.up = true;
  if (e.key === 'ArrowDown') input.down = true;
  if (e.key === 'ArrowLeft') input.left = true;
  if (e.key === 'ArrowRight') input.right = true;
  if (e.key === 'z' || e.key === 'Z') input.spin = true;
  if (e.key === 'x' || e.key === 'X') input.turbo = true;
  if (e.key === ' ') {
    if (gameState === 'splash') {
      initAudio();
      dailyBonusData = checkDailyBonus();
      if (dailyBonusData) {
        gameState = 'dailyBonus';
        stateTimer = 0;
      } else {
        newGame();
      }
    }
  }
  if (gameState === 'playSelect') {
    const playMap = { '1': 'run-left', '2': 'run-middle', '3': 'run-right', '4': 'pass-short', '5': 'pass-deep' };
    if (playMap[e.key]) {
      initAudio();
      sfxMenuSelect();
      startPlay(playMap[e.key]);
    }
  }
});
window.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowUp') input.up = false;
  if (e.key === 'ArrowDown') input.down = false;
  if (e.key === 'ArrowLeft') input.left = false;
  if (e.key === 'ArrowRight') input.right = false;
  if (e.key === 'z' || e.key === 'Z') input.spin = false;
  if (e.key === 'x' || e.key === 'X') input.turbo = false;
});


// =========================================================================
// 16. MAIN GAME LOOP — 60fps locked via requestAnimationFrame
// =========================================================================

let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  let dt = Math.min((timestamp - lastTime) / 1000, 0.035); // Cap at 35ms (~28fps min)
  lastTime = timestamp;

  // Hit-stop effect: freeze gameplay briefly on tackle
  if (hitStop > 0) {
    hitStop -= dt;
    dt = 0;
  }

  // Clear with black (opaque canvas)
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, W, H);

  switch (gameState) {
    case 'splash':
      drawSplash();
      break;

    case 'dailyBonus':
      drawDailyBonus(dt);
      break;

    case 'shop':
      drawShop();
      break;

    case 'playSelect':
      updateCamera();
      drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, false); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawPlaySelect();
      break;

    case 'snap':
      stateTimer += dt;
      updateCamera();
      drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawHUD();
      drawControls();

      // HIKE text
      const hikeFont = fontsLoaded ? FONT_TITLE : ('"Arial Black",Arial,sans-serif');
      ctx.font = '400 ' + Math.min(26, W * 0.06) + 'px ' + hikeFont;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = GOLD;
      ctx.shadowBlur = 10;
      ctx.fillStyle = GOLD_BRIGHT;
      ctx.fillText('HIKE', W / 2, H * 0.38);
      ctx.shadowBlur = 0;

      drawCommentary(dt);
      if (stateTimer > 0.35) transitionToPlaying();
      break;

    case 'playing':
      if (playType && playType.indexOf('run') === 0) {
        updateRunPlay(dt);
      } else if (playType && playType.indexOf('pass') === 0) {
        updatePassPlay(dt);
      }
      updateCamera();
      drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      drawBall();
      updateParticles(dt);
      drawParticles();
      drawScreenEffects();
      drawHUD();
      drawControls();
      drawCommentary(dt);
      break;

    case 'result':
      resultTimer += dt;
      updateCamera();
      drawField();
      offensePlayers.forEach(function(p) { drawPlayer(p, p === ballCarrier); });
      defensePlayers.forEach(function(p) { drawPlayer(p, false); });
      updateParticles(dt);
      drawParticles();
      drawScreenEffects();
      drawHUD();
      drawResultMsg();
      drawCommentary(dt);

      if (resultTimer > 2.0) {
        if (!checkQuarterEnd()) {
          setupFormation();
          gameState = 'playSelect';
          resultMsg = '';
          resultSubMsg = '';
        }
      }
      break;

    case 'celebration':
      updateCamera();
      updateParticles(dt);
      drawCelebration(dt);
      drawHUD();
      drawCommentary(dt);
      break;

    case 'turnover':
      drawTurnoverScreen(dt);
      drawCommentary(dt);
      break;

    case 'halftime':
      drawHalftime(dt);
      break;

    case 'gameOver':
      drawGameOver(dt);
      break;
  }

  drawNotification(dt);
}

requestAnimationFrame(gameLoop);
