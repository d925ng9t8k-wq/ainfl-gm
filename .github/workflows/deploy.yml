name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Syntax check — critical scripts
        run: |
          node --check scripts/comms-hub.mjs
          node --check scripts/voice-server.mjs
          node --check scripts/jules-telegram.mjs
          node --check scripts/trader9-bot.mjs
          node --check scripts/trinity-agent.mjs
          node --check scripts/pilot-server.mjs
          node --check scripts/session-handoff.mjs
          node --check scripts/memory-db.mjs
          node --check scripts/health-monitor.mjs
          node --check scripts/agent-base.mjs

      - run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
