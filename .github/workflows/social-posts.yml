name: Post to X

on:
  schedule:
    - cron: '0 14 * * *'   # 10:00 AM ET (UTC-4 during EDT)
    - cron: '0 22 * * *'   # 6:00 PM ET (UTC-4 during EDT)
  workflow_dispatch:         # Allow manual trigger from Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to push updated content.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post next tweet to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node social/post.js

      - name: Commit updated content.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/content.json
          git diff --staged --quiet || git commit -m "Mark post as posted [skip ci]"
          git push
