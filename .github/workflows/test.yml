name: Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Syntax check new test files
        run: |
          node --check scripts/run-regression-tests.mjs
          node --check scripts/test-wal-replay.mjs
          node --check scripts/test-imap-uid-dedup.mjs
          node --check scripts/test-bridge-protocol.mjs

      - name: Run regression tests
        # --skip-destructive because the crash-survival test requires a running
        # comms-hub that would get SIGKILL'd; the runner also auto-skips any
        # test tagged REQUIRES_HUB when the hub is unreachable. On hosted CI we
        # exercise only the hermetic subset (wal-replay, imap-uid-dedup,
        # bridge-protocol, memory-db). Live-hub tests run on the Mac.
        run: node scripts/run-regression-tests.mjs --skip-destructive

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: |
            /tmp/regression-test-report-*.json
          if-no-files-found: warn
          retention-days: 30
